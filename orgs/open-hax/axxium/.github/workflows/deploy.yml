name: Deploy Axxium

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to knoxx.promethean.rest
        env:
          DEPLOY_HOST: knoxx.promethean.rest
          DEPLOY_USER: error
          DEPLOY_KEY: ${{ secrets.PROMETHEAN_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Create deploy directory
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST '
            mkdir -p ~/services/axxium
          '
          
          # Sync files
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude .git \
            ./ $DEPLOY_USER@$DEPLOY_HOST:~/services/axxium/
          
          # Install and restart
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST '
            cd ~/services/axxium && npm install && pm2 restart axxium || pm2 start dist/server.js --name axxium
          '
