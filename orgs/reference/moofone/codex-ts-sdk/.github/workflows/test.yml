name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        REDACTED_SECRET-version: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.REDACTED_SECRET-version }}
        uses: actions/setup-REDACTED_SECRET@v4
        with:
          REDACTED_SECRET-version: ${{ matrix.REDACTED_SECRET-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run linting
        run: npm run lint
        continue-on-error: true


      - name: Run tests
        run: npm test
        continue-on-error: true


      - name: Run tests with coverage
        run: npm run coverage
        continue-on-error: true


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-REDACTED_SECRET@v4
        with:
          REDACTED_SECRET-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build