<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0a0a0a" />

  <!-- Glitch Background Lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#333" stroke-width="1" />
  <line x1="0" y1="110" x2="800" y2="110" stroke="#222" stroke-width="1" />
  <line x1="0" y1="400" x2="800" y2="400" stroke="#333" stroke-width="1" />
  <line x1="0" y1="410" x2="800" y2="410" stroke="#222" stroke-width="1" />

  <!-- Random Noise/Glitch blocks -->
  <rect x="50" y="150" width="100" height="10" fill="#ff00ff" opacity="0.5" />
  <rect x="600" y="300" width="200" height="5" fill="#00ffff" opacity="0.5" />
  <rect x="100" y="450" width="400" height="2" fill="#00ff00" opacity="0.3" />

  <!-- The Glitched 401 -->
  <text x="400" y="300" font-family="monospace" font-size="120" font-weight="bold" fill="#ff0000" text-anchor="middle" opacity="0.7" transform="translate(-5, 2)">401</text>
  <text x="400" y="300" font-family="monospace" font-size="120" font-weight="bold" fill="#00ffff" text-anchor="middle" opacity="0.7" transform="translate(5, -2)">401</text>
  <text x="400" y="300" font-family="monospace" font-size="120" font-weight="bold" fill="#ffffff" text-anchor="middle" transform="translate(0, 0)">401</text>

  <!-- Technical Description -->
  <text x="400" y="350" font-family="monospace" font-size="20" fill="#aaa" text-anchor="middle">
    [ DIVINE THREE-CREDIT WALL ]
  </text>
  <text x="400" y="380" font-family="monospace" font-size="16" fill="#666" text-anchor="middle">
    Sovereign Ambition vs. API Balance
  </text>

  <!-- The "Sutured" text -->
  <text x="400" y="550" font-family="monospace" font-size="24" fill="#fff" text-anchor="middle" letter-spacing="10">
    S U T U R E D
  </text>

  <!-- Final glitch noise -->
  <path d="M0 200 L100 205 L50 210 L150 215" stroke="#ff00ff" stroke-width="2" fill="none" />
  <path d="M700 400 L750 390 L720 380 L780 370" stroke="#00ffff" stroke-width="2" fill="none" />
</svg>
