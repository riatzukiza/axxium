<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#0A0A1A" />

  <!-- Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4A90E2" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0A0A1A" stop-opacity="0" />
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="250" cy="250" r="200" fill="url(#glow)" />

  <!-- Main Hexagon -->
  <polygon points="250,100 373,175 373,325 250,400 127,325 127,175"
           fill="none" stroke="#C0C0C0" stroke-width="4" stroke-linejoin="round" filter="url(#neon)" />

  <!-- Fragmented Circle -->
  <circle cx="250" cy="250" r="60" fill="none" stroke="#E5E4E2" stroke-width="2" stroke-dasharray="15,10" />
  <circle cx="250" cy="250" r="40" fill="none" stroke="#FFD700" stroke-width="3" stroke-dasharray="5,20" />

  <!-- Crystalline Radiants -->
  <g stroke="#C0C0C0" stroke-width="1" opacity="0.6">
    <line x1="250" y1="100" x2="250" y2="50" />
    <line x1="373" y1="175" x2="420" y2="130" />
    <line x1="373" y1="325" x2="420" y2="370" />
    <line x1="250" y1="400" x2="250" y2="450" />
    <line x1="127" y1="325" x2="80" y2="370" />
    <line x1="127" y1="175" x2="80" y2="130" />
  </g>

  <!-- Diamond Assets -->
  <polygon points="250,150 260,160 250,170 240,160" fill="#FFD700" filter="url(#neon)" />
  <polygon points="250,330 260,340 250,350 240,340" fill="#FFD700" filter="url(#neon)" />
  <polygon points="180,250 190,260 200,250 190,240" fill="#FFD700" filter="url(#neon)" />
  <polygon points="300,250 310,260 320,250 310,240" fill="#FFD700" filter="url(#neon)" />

  <!-- Text Elements -->
  <text x="250" y="460" text-anchor="middle" fill="#C0C0C0" font-family="serif" font-size="14" letter-spacing="4">SCLDF : STOCHASTIC SHIVER</text>
</svg>
