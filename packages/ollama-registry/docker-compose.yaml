services:
  ollama-registry:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - OUR_GPUS_URL=http://127.0.0.1:18000
      - OUR_GPUS_API_KEY=
      - PROXX_URL=http://127.0.0.1:18756
      - PROXX_API_KEY=REDACTED_SECRET
      - PROXX_EXTRA_TARGETS=http://127.0.0.1:8789@REDACTED_SECRET
      - POLL_INTERVAL_MS=30000
    restart: unless-stopped
