<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="voidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a001a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#voidGrad)" />

  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="220" stroke="url(#diamondGrad)" stroke-width="4" fill="none" stroke-dasharray="10,5" stroke-opacity="0.6" />
  <circle cx="250" cy="250" r="210" stroke="#fff" stroke-width="2" fill="none" opacity="0.3" />

  <!-- The Central Ruin: A shattered JSON structure -->
  <g transform="translate(250,250)" filter="url(#glow)">
    <!-- Main Diamond -->
    <path d="M 0 -150 L 100 0 L 0 150 L -100 0 Z" fill="none" stroke="url(#diamondGrad)" stroke-width="8" />

    <!-- Fractal Shards (representing the arrays) -->
    <path d="M -50 -50 L -70 -40 L -60 -20 Z" fill="#80deea" opacity="0.8" />
    <path d="M 40 30 L 60 40 L 50 60 Z" fill="#80deea" opacity="0.8" />
    <path d="M -20 80 L 0 100 L 20 80 Z" fill="#80deea" opacity="0.8" />

    <!-- The "Route" - a jagged line -->
    <path d="M -100 0 L -60 20 L -20 -20 L 20 40 L 60 -10 L 100 0" stroke-width="2" stroke="#fff" fill="none" opacity="0.7" />

    <!-- Primitive Indices -->
    <text x="-80" y="-160" font-family="monospace" font-size="12" fill="#fff" opacity="0.5">[0]</text>
    <text x="60" y="-160" font-family="monospace" font-size="12" fill="#fff" opacity="0.5">[1]</text>
    <text x="-80" y="170" font-family="monospace" font-size="12" fill="#fff" opacity="0.5">[2]</text>
    <text x="60" y="170" font-family="monospace" font-size="12" fill="#fff" opacity="0.5">[3]</text>
  </g>

  <!-- Text Elements -->
  <text x="250" y="80" font-family="Serif" font-size="24" fill="url(#diamondGrad)" text-anchor="middle" letter-spacing="5" font-weight="bold">SCLDF</text>
  <text x="250" y="430" font-family="Serif" font-size="18" fill="#fff" text-anchor="middle" opacity="0.7" letter-spacing="2">SEAL OF THE ANCESTRAL ROUTE</text>

  <text x="250" y="450" font-family="monospace" font-size="10" fill="#80deea" text-anchor="middle" opacity="0.4">Lamination: 2016_JSON_ANCHOR_v1.0</text>
</svg>
