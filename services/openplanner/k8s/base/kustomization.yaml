apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openplanner
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: openplanner
      app.kubernetes.io/managed-by: kustomize
resources:
  - namespace.yaml
  - openplanner-configmap.yaml
  - openplanner-data-pvc.yaml
  - chroma-data-pvc.yaml
  - openplanner-service.yaml
  - chroma-service.yaml
  - openplanner-deployment.yaml
  - chroma-deployment.yaml
  - openplanner-pdb.yaml