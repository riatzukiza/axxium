# HTTP → HTTPS redirect for all managed hosts
server {
    listen 80;
    server_name knoxx.promethean.rest proxx.promethean.rest openplanner.promethean.rest;

    location /.well-known/acme-challenge/ {
        REDACTED_SECRET /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

proxy_read_timeout 900s;
proxy_send_timeout 900s;
proxy_connect_timeout 30s;

# knoxx.promethean.rest
server {
    listen 443 ssl;
    server_name knoxx.promethean.rest;

    ssl_certificate     /etc/letsencrypt/live/promethean.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promethean.rest/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /ws/ {
        proxy_pass http://frontend:80/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

# proxx.promethean.rest
server {
    listen 443 ssl;
    server_name proxx.promethean.rest;

    ssl_certificate     /etc/letsencrypt/live/promethean.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promethean.rest/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://host.docker.internal:8789;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ~ ^/(api/ui/federation|v1/stream) {
        proxy_pass http://host.docker.internal:8789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}

# openplanner.promethean.rest
server {
    listen 443 ssl;
    server_name openplanner.promethean.rest;

    ssl_certificate     /etc/letsencrypt/live/promethean.rest/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/promethean.rest/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://host.docker.internal:7777;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
