    environment:
      PORT: '3003'
      DATABASE_URL: postgresql://${POSTGRES_USER:REDACTED_SECRET}:${POSTGRES_PASSWORD:REDACTED_SECRET}@knoxx-postgres:5432/${POSTGRES_DB:-knoxx}
      REDIS_URL: redis://knoxx-redis:6379
      RAGUSSY_BASE_URL: http://knoxx-backend:8000
      PROXX_BASE_URL: ${OPENPLANNER_PROXX_BASE_URL:-http://openplanner-proxx:8789}
      PROXX_AUTH_TOKEN: ${OPENPLANNER_PROXX_AUTH_TOKEN:REDACTED_SECRET-openplanner-proxx-token}
      PROXX_DEFAULT_MODEL: ${PROXX_DEFAULT_MODEL:-glm-5}
      PROXX_CONNECTION_TIMEOUT_MS: ${PROXX_CONNECTION_TIMEOUT_MS:-15000}
      PROXX_SOCKET_TIMEOUT_MS: ${PROXX_SOCKET_TIMEOUT_MS:-180000}
      OPENPLANNER_BASE_URL: ${KNOXX_OPENPLANNER_BASE_URL:-http://openplanner:7777}
      OPENPLANNER_API_KEY: ${KNOXX_OPENPLANNER_API_KEY:REDACTED_SECRET}
      WORKSPACE_PATH: /app/workspace/devel
      INGEST_SCHEDULER_POLL_MS: ${INGEST_SCHEDULER_POLL_MS:-15000}
      PASSIVE_WATCH_ENABLED: ${PASSIVE_WATCH_ENABLED:-true}
      PASSIVE_WATCH_POLL_MS: ${PASSIVE_WATCH_POLL_MS:-15000}
      PASSIVE_WATCH_DEBOUNCE_MS: ${PASSIVE_WATCH_DEBOUNCE_MS:-1000}
      INGEST_BATCH_SIZE: ${INGEST_BATCH_SIZE:-24}
      INGEST_BATCH_PARALLELISM: ${INGEST_BATCH_PARALLELISM:-2}
      INGEST_THROTTLE_ENABLED: ${INGEST_THROTTLE_ENABLED:-true}
      INGEST_MAX_LOAD_PER_CORE: ${INGEST_MAX_LOAD_PER_CORE:-1.35}
      INGEST_THROTTLE_SLEEP_MS: ${INGEST_THROTTLE_SLEEP_MS:-500}
      INGEST_BATCH_DELAY_MS: ${INGEST_BATCH_DELAY_MS:-1000}
      TRANSLATION_AGENT_ENABLED: ${TRANSLATION_AGENT_ENABLED:-true}
      TRANSLATION_POLL_MS: ${TRANSLATION_POLL_MS:-5000}
      KNOXX_BACKEND_URL: http://knoxx-backend:8000
      KNOXX_API_KEY: ${KNOXX_API_KEY:-}
      KNOXX_USER_EMAIL: ${KNOXX_USER_EMAIL:-system-admin@open-hax.local}
    extra_hosts:
    - host.docker.internal:host-gateway
    volumes:
    - ${WORKSPACE_PATH:-../../..}:/app/workspace
    depends_on:
      knoxx-postgres:
        condition: service_healthy
      knoxx-redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:3003/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
    - knoxx-internal
    - ai-infra
    user: ${DOCKER_USER:-1000:1000}
  knoxx-postgres:
    image: postgres:16-alpine
    cpus: 1
    cpuset: 2-21
    expose:
    - '5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:REDACTED_SECRET}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:REDACTED_SECRET}
      POSTGRES_DB: ${POSTGRES_DB:-knoxx}
    volumes:
    - knoxx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:REDACTED_SECRET} -d ${POSTGRES_DB:-knoxx}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
    - knoxx-internal
  knoxx-redis:
    image: redis:7-alpine
    cpus: 0.5
    cpuset: 2-21
    expose:
    - '6379'
    volumes:
    - knoxx-redis-data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
    - knoxx-internal
  translation-worker:
    profiles:
    - legacy-translation-worker
    image: REDACTED_SECRET:22-bookworm-slim
    cpus: 0.5
    cpuset: 2-21
    working_dir: /app
    command: bash -lc "npx tsx scripts/translation-worker.ts"
    environment:
      MONGODB_URI: mongodb://${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}:${OPENPLANNER_MONGO_APP_PASSWORD:REDACTED_SECRET-openplanner-password}@mongodb:27017/${MONGODB_DB:-openplanner}?authSource=${MONGODB_DB:-openplanner}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      MT_PROVIDER_URL: ${MT_PROVIDER_URL:-http://openplanner-proxx:8789}
      MT_PROVIDER_API_KEY: ${OPENPLANNER_PROXX_AUTH_TOKEN:REDACTED_SECRET-openplanner-proxx-token}
      MT_PROVIDER_MODEL: ${MT_PROVIDER_MODEL:-glm-4.5-flash}
      TRANSLATION_POLL_MS: ${TRANSLATION_POLL_MS:-5000}
      TRANSLATION_BATCH_SIZE: ${TRANSLATION_BATCH_SIZE:-100}
      TRANSLATION_SEGMENT_SIZE: ${TRANSLATION_SEGMENT_SIZE:-500}
      GRAPH_MEMORY_ENABLED: ${TRANSLATION_GRAPH_MEMORY_ENABLED:-true}
      GRAPH_MEMORY_BASE_URL: http://openplanner:7777
      GRAPH_MEMORY_API_KEY: ${OPENPLANNER_API_KEY:REDACTED_SECRET}
    volumes:
    - ../../orgs/open-hax/openplanner/scripts:/app/scripts:ro
    - ../../orgs/open-hax/openplanner/REDACTED_SECRET_modules:/app/REDACTED_SECRET_modules:ro
    - ../../orgs/open-hax/openplanner/package.json:/app/package.json:ro
    extra_hosts:
    - host.docker.internal:host-gateway
    depends_on:
      mongodb:
        condition: service_healthy
      openplanner:
        condition: service_healthy
      openplanner-proxx:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - default
    - knoxx-internal
    user: ${DOCKER_USER:-1000:1000}
volumes:
  openplanner-mongodb-data: null
  openplanner-proxx-db-data: null
  shuvcrawl-data: null
  shuvcrawl-output: null
  knoxx-postgres-data: null
  knoxx-redis-data: null
  knoxx-models: null
  knoxx-runs: null
  knoxx-backend-REDACTED_SECRET-modules: null
  knoxx-backend-shadow-cljs: null
  knoxx-backend-dist: null
  knoxx-backend-m2: null
  knoxx-frontend-REDACTED_SECRET-modules: null
  knoxx-knoxx-REDACTED_SECRET-modules: null
  shibboleth-data: null
  openplanner-atlas-data: null
networks:
  ai-infra:
    external: true
    name: ai-infra
  knoxx-internal:
    driver: bridge
