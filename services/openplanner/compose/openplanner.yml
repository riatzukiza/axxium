services:

  # Prometheus - metrics collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "${OPENPLANNER_PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../../../orgs/open-hax/openplanner/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - openplanner-prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      default: {}
      ai-infra: {}
  # Grafana - metrics visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${OPENPLANNER_GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/openplanner-grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - ../../../orgs/open-hax/openplanner/grafana/provisioning:/etc/grafana/provisioning:ro
      - openplanner-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    networks:
      default: {}
      ai-infra: {}
  nginx:
    image: nginx:alpine
    ports:
      - "${OPENPLANNER_PORT:-7777}:7777"
    volumes:
      - ../../../orgs/open-hax/openplanner/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - openplanner
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7777/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      default: {}
      ai-infra: {}
  openplanner-migration-graph:

    build:
      context: ../../../orgs/open-hax/openplanner/packages/stores/migrations/openplanner-migration-tools
      dockerfile: Dockerfile
    cpus: 0.5
    cpuset: 2-21
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    environment:
      OPENPLANNER_MIGRATION_GRAPH_HOST: 0.0.0.0
      OPENPLANNER_MIGRATION_GRAPH_PORT: '7789'
      OPENPLANNER_MONGODB_URI: mongodb://${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}:${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}@mongodb:27017/${MONGODB_DB:-openplanner}?authSource=${MONGODB_DB:-openplanner}
      OPENPLANNER_MONGODB_DB: ${MONGODB_DB:-openplanner}
      OPENPLANNER_MONGO_EVENTS_COLLECTION: ${MONGODB_EVENTS_COLLECTION:-events}
    expose:
    - '7789'
    healthcheck:
      test:
      - CMD-SHELL
      - bash -lc 'cat < /dev/null > /dev/tcp/127.0.0.1/7789'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      default: {}
      knoxx-internal: {}
    user: ${DOCKER_USER:-1000:1000}
  openplanner-migration-worker:
    image: curlimages/curl:8.10.1
    cpus: 0.25
    cpuset: 2-21
    depends_on:
      openplanner-migration-graph:
        condition: service_healthy
    entrypoint:
    - /bin/sh
    - -lc
    command:
    - "while true; do\n  curl -fsS -X POST http://openplanner-migration-graph:7789/v1/jobs/apply-tick \\\n    -H 'content-type: application/json' \\\n    --data \"{\\\"limit\\\":${OPENPLANNER_MIGRATION_APPLY_LIMIT:-10}}\" || true\n  sleep \"${OPENPLANNER_MIGRATION_APPLY_INTERVAL_SECONDS:-60}\"\ndone\n"
    environment:
      OPENPLANNER_MIGRATION_APPLY_LIMIT: ${OPENPLANNER_MIGRATION_APPLY_LIMIT:-10}
      OPENPLANNER_MIGRATION_APPLY_INTERVAL_SECONDS: ${OPENPLANNER_MIGRATION_APPLY_INTERVAL_SECONDS:-60}
    restart: unless-stopped
    networks:
      default: {}
      knoxx-internal: {}
    user: ${DOCKER_USER:-1000:1000}
  openplanner-graph-backfill-worker:
    image: curlimages/curl:8.10.1
    cpus: 0.25
    cpuset: 2-21
    depends_on:
      openplanner:
        condition: service_healthy
    entrypoint:
    - /bin/sh
    - -lc
    command:
    - |
      while true; do
        echo "[openplanner-graph-backfill-worker] triggering graph label backfill"
        curl -fsS -X POST http://openplanner:7777/v1/jobs/backfill/graph-labels \
          -H "authorization: Bearer $${OPENPLANNER_API_KEY}" \
          -H 'content-type: application/json' \
          --data "{\"limit\":$${OPENPLANNER_GRAPH_LABEL_BACKFILL_LIMIT:-5000}}" || true

        sleep "$${OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS:-120}"

        echo "[openplanner-graph-backfill-worker] triggering event embedding backfill"
        curl -fsS -X POST http://openplanner:7777/v1/jobs/backfill/embeddings \
          -H "authorization: Bearer $${OPENPLANNER_API_KEY}" \
          -H 'content-type: application/json' \
          --data "{\"limit\":$${OPENPLANNER_EVENT_EMBEDDING_BACKFILL_LIMIT:-5000},\"concurrency\":$${OPENPLANNER_EVENT_EMBEDDING_BACKFILL_CONCURRENCY:-2}}" || true

        sleep "$${OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS:-120}"

        echo "[openplanner-graph-backfill-worker] triggering graph edge backfill"
        curl -fsS -X POST http://openplanner:7777/v1/jobs/backfill/graph-edges \
          -H "authorization: Bearer $${OPENPLANNER_API_KEY}" \
          -H 'content-type: application/json' \
          --data '{}' || true

        sleep "$${OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS:-120}"

        echo "[openplanner-graph-backfill-worker] triggering graph node embedding backfill"
        curl -fsS -X POST http://openplanner:7777/v1/jobs/backfill/graph-node-embeddings \
          -H "authorization: Bearer $${OPENPLANNER_API_KEY}" \
          -H 'content-type: application/json' \
          --data '{}' || true

        sleep "$${OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS:-120}"

        echo "[openplanner-graph-backfill-worker] triggering incremental semantic edge build"
        curl -fsS -X POST http://openplanner:7777/v1/graph/jobs/build-semantic-edges/incremental \
          -H "authorization: Bearer $${OPENPLANNER_API_KEY}" \
          -H 'content-type: application/json' \
          --data '{}' || true

        sleep "$${OPENPLANNER_GRAPH_BACKFILL_INTERVAL_SECONDS:-3600}"
      done
    environment:
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      OPENPLANNER_GRAPH_LABEL_BACKFILL_LIMIT: ${OPENPLANNER_GRAPH_LABEL_BACKFILL_LIMIT:-1000}
      OPENPLANNER_EVENT_EMBEDDING_BACKFILL_LIMIT: ${OPENPLANNER_EVENT_EMBEDDING_BACKFILL_LIMIT:-1000}
      OPENPLANNER_EVENT_EMBEDDING_BACKFILL_CONCURRENCY: ${OPENPLANNER_EVENT_EMBEDDING_BACKFILL_CONCURRENCY:-1}
      OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS: ${OPENPLANNER_GRAPH_BACKFILL_STEP_INTERVAL_SECONDS:-600}
      OPENPLANNER_GRAPH_BACKFILL_INTERVAL_SECONDS: ${OPENPLANNER_GRAPH_BACKFILL_INTERVAL_SECONDS:-7200}
    restart: unless-stopped
    networks:
      default: {}
      knoxx-internal: {}
    user: ${DOCKER_USER:-1000:1000}
  openplanner:
    build:
      context: ../../../orgs/open-hax/openplanner
      dockerfile: Dockerfile

    deploy:
      replicas: 3
    cpus: 2
    cpuset: 2-21
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      openplanner-migration-graph:
        condition: service_healthy
      knoxx-redis:
        condition: service_healthy
    # NOTE: do not publish a fixed host port here if you want horizontal scaling.
    # nginx is the single ingress and load-balances to these replicas over the
    # Docker network.
    expose:
    - '7777'
    environment:
      NODE_ENV: production
      OPENPLANNER_HOST: 0.0.0.0
      OPENPLANNER_PORT: '7777'
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      OPENPLANNER_DATA_DIR: /app/openplanner-lake
      OPENPLANNER_STORAGE_BACKEND: mongodb
      OPENPLANNER_KAFKA_ENABLED: ${OPENPLANNER_KAFKA_ENABLED:-false}
      OPENPLANNER_KAFKA_BROKERS: ${OPENPLANNER_KAFKA_BROKERS:-redpanda:9092}
      OPENPLANNER_KAFKA_EVENTS_RAW_TOPIC: ${OPENPLANNER_KAFKA_EVENTS_RAW_TOPIC:-openplanner.events.raw}
      OPENPLANNER_KAFKA_PUBLISH_MODE: ${OPENPLANNER_KAFKA_PUBLISH_MODE:-detached}
      MONGODB_URI: mongodb://${OPENPLANNER_MONGO_APP_USERNAME:-openplanner}:${OPENPLANNER_MONGO_APP_PASSWORD:-change-me-openplanner-password}@mongodb:27017/${MONGODB_DB:-openplanner}?authSource=${MONGODB_DB:-openplanner}
      MONGODB_DB: ${MONGODB_DB:-openplanner}
      MONGODB_EVENTS_COLLECTION: ${MONGODB_EVENTS_COLLECTION:-events}
      MONGODB_COMPACTED_COLLECTION: ${MONGODB_COMPACTED_COLLECTION:-compacted_memories}
      MONGODB_VECTOR_HOT_COLLECTION: ${MONGODB_VECTOR_HOT_COLLECTION:-event_chunks}
      MONGODB_VECTOR_COMPACT_COLLECTION: ${MONGODB_VECTOR_COMPACT_COLLECTION:-compacted_vectors}
      MONGODB_GRAPH_LAYOUT_COLLECTION: ${MONGODB_GRAPH_LAYOUT_COLLECTION:-graph_layout_overrides}
      MONGODB_GRAPH_NODE_EMBEDDING_COLLECTION: ${MONGODB_GRAPH_NODE_EMBEDDING_COLLECTION:-graph_node_embeddings}
      MONGODB_EVENTS_TTL_SECONDS: ${MONGODB_EVENTS_TTL_SECONDS:-0}
      MONGODB_COMPACTED_TTL_SECONDS: ${MONGODB_COMPACTED_TTL_SECONDS:-0}
      EMBED_PROVIDER_BASE_URL: ${OPENPLANNER_PROXX_BASE_URL:-http://proxx:8789}
      EMBED_PROVIDER_API_KEY: ${OPENPLANNER_PROXX_AUTH_TOKEN:-${PROXX_AUTH_TOKEN:-${PROXY_AUTH_TOKEN:-change-me-open-hax-proxy-token}}}
      EMBED_PROVIDER_MODEL: ${EMBED_PROVIDER_MODEL:-llamacpp-embed:qwen3-embedding:0.6b}
      EMBED_PROVIDER_COMPACT_MODEL: ${EMBED_PROVIDER_COMPACT_MODEL:-llamacpp-embed:qwen3-embedding:0.6b}
      EMBED_PROVIDER_MODEL_BY_SOURCE: ${EMBED_PROVIDER_MODEL_BY_SOURCE:-}
      EMBED_PROVIDER_MODEL_BY_KIND: ${EMBED_PROVIDER_MODEL_BY_KIND:-}
      EMBED_PROVIDER_MODEL_BY_PROJECT: ${EMBED_PROVIDER_MODEL_BY_PROJECT:-}
      EMBED_PROVIDER_BATCH_WINDOW_MS: ${EMBED_PROVIDER_BATCH_WINDOW_MS:-5}
      EMBED_PROVIDER_MAX_BATCH_ITEMS: ${EMBED_PROVIDER_MAX_BATCH_ITEMS:-32}
      EMBED_PROVIDER_CACHE_PATH: ${EMBED_PROVIDER_CACHE_PATH:-/app/openplanner-lake/cache/embed-provider-cache.jsonl}
      OPENPLANNER_SOURCE_ROOT: ${OPENPLANNER_SOURCE_ROOT:-/app/workspace/devel}
      OPENPLANNER_HYDRATION_REDIS_URL: ${OPENPLANNER_HYDRATION_REDIS_URL:-redis://knoxx-redis:6379}
      OPENPLANNER_HYDRATION_LMDB_PATH: ${OPENPLANNER_HYDRATION_LMDB_PATH:-/app/openplanner-lake/cache/source-hydration-lmdb}
      OPENPLANNER_HYDRATION_CACHE_TTL_MS: ${OPENPLANNER_HYDRATION_CACHE_TTL_MS:-18000000}
      OPENPLANNER_MIGRATION_GRAPH_URL: ${OPENPLANNER_MIGRATION_GRAPH_URL:-http://openplanner-migration-graph:7789}
      GRAPH_SEMANTIC_EDGE_DECAY_INTERVAL_MS: ${GRAPH_SEMANTIC_EDGE_DECAY_INTERVAL_MS:-3600000}
      GRAPH_SEMANTIC_EDGE_DECAY_LIMIT: ${GRAPH_SEMANTIC_EDGE_DECAY_LIMIT:-1000}
      VEXX_BASE_URL: ${VEXX_BASE_URL:-}
      VEXX_API_KEY: ${VEXX_API_KEY:-}
      VEXX_DEVICE: ${VEXX_DEVICE:-NPU}
      VEXX_REQUIRE_ACCEL: ${VEXX_REQUIRE_ACCEL:-false}
      VEXX_ENFORCE: ${VEXX_ENFORCE:-false}
      VEXX_MIN_CANDIDATES: ${VEXX_MIN_CANDIDATES:-1}
      VEXX_TIMEOUT_MS: ${VEXX_TIMEOUT_MS:-30000}
    volumes:
    - ../openplanner-lake:/app/openplanner-lake
    - ${WORKSPACE_PATH:-../../..}:/app/workspace:ro
    - ../../../orgs/open-hax/openplanner/dist:/app/dist:ro
    - ../../../orgs/open-hax/openplanner/node_modules:/app/node_modules:ro
    - ../../../orgs/open-hax/openplanner/packages:/app/packages:ro
    extra_hosts:
    - host.docker.internal:host-gateway
    healthcheck:
      test:
      - CMD
      - node
      - -e
      - fetch('http://127.0.0.1:7777/v1/health').then((response) => { if (!response.ok) { process.exit(1); } }).catch(() => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      default: {}
      knoxx-internal: {}
      ai-infra:
        aliases:
        - openplanner
