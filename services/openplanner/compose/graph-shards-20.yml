services:
  eros-eris-shard-0-of-20:
    profiles:
    - graph-20
    image: node:22-bookworm
    cpus: 1
    cpuset: '2'
    working_dir: /app/workspace/devel
    command: bash -lc "corepack enable && pnpm -C orgs/open-hax/openplanner/packages/graph/eros-eris-field-app dev"
    environment:
      CI: 'true'
      NODE_OPTIONS: --use-openssl-ca
      EROS_ERIS_WORKER_ROLE: structural
      GRAPHQL_URL: http://graph-weaver:8796/graphql
      OPENPLANNER_BASE_URL: http://openplanner:7777
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      SIM_MAX_NODES: ${EROS_ERIS_SIM_MAX_NODES:-3000}
      SIM_MAX_EDGES: ${EROS_ERIS_SIM_MAX_EDGES:-6000}
      SIM_STEP_MS: ${EROS_ERIS_SIM_STEP_MS:-1000}
      SIM_SUBSTEPS: ${EROS_ERIS_SIM_SUBSTEPS:-8}
      SIM_DT: ${EROS_ERIS_SIM_DT:-0.4}
      SIM_REFRESH_MS: ${EROS_ERIS_SIM_REFRESH_MS:-8000}
      SIM_WRITE_MS: ${EROS_ERIS_SIM_WRITE_MS:-5000}
      SIM_WRITE_CHUNK: ${EROS_ERIS_SIM_WRITE_CHUNK:-500}
      SIM_SHARD_INDEX: 0
      SIM_SHARD_COUNT: 20
      GLOBAL_REPULSION: ${EROS_ERIS_GLOBAL_REPULSION:-28}
      DAMPING: ${EROS_ERIS_DAMPING:-0.85}
      TARGET_RADIUS: ${EROS_ERIS_TARGET_RADIUS:-5000}
    volumes:
    - ${DEVEL_ROOT_PATH:-../../..}:/app/workspace/devel
    extra_hosts:
    - host.docker.internal:host-gateway
    depends_on:
      graph-weaver:
        condition: service_healthy
    restart: unless-stopped
    networks:
    - default
    - ai-infra
