services:
  eros-eris-field-app-shard0of2:
    profiles:
    - graph-2
    image: node:22-bookworm
    cpus: 1.5
    cpuset: 2-21
    working_dir: /app/workspace/devel
    command: bash -lc "corepack enable && pnpm -C orgs/open-hax/openplanner/packages/graph/eros-eris-field-app dev"
    environment:
      CI: 'true'
      NPM_CONFIG_CONFIRM_MODULES_PURGE: 'false'
      NODE_OPTIONS: --use-openssl-ca
      EROS_ERIS_WORKER_ROLE: structural
      GRAPHQL_URL: http://graph-weaver:8796/graphql
      OPENPLANNER_BASE_URL: http://openplanner:7777
      OPENPLANNER_API_KEY: ${OPENPLANNER_API_KEY:-change-me}
      EMBED_PROVIDER_MODEL: ${EROS_ERIS_EMBED_PROVIDER_MODEL:-qwen3-embedding:0.6b}
      VEXX_BASE_URL: ${VEXX_BASE_URL:-http://host.docker.internal:8787}
      VEXX_API_KEY: ${VEXX_API_KEY:-}
      VEXX_DEVICE: ${VEXX_DEVICE:-NPU}
      VEXX_REQUIRE_ACCEL: ${VEXX_REQUIRE_ACCEL:-true}
      VEXX_ENFORCE: ${VEXX_ENFORCE:-false}
      VEXX_MIN_CANDIDATES: ${VEXX_MIN_CANDIDATES:-32}
      VEXX_TIMEOUT_MS: ${VEXX_TIMEOUT_MS:-60000}
      VEXX_OPTIMAL_BATCH_SIZE: ${VEXX_OPTIMAL_BATCH_SIZE:-128}
      VEXX_MAX_CANDIDATES_PER_CALL: ${VEXX_MAX_CANDIDATES_PER_CALL:-256}
      USE_CANONICAL_GRAPH: ${EROS_ERIS_USE_CANONICAL_GRAPH:-true}
      SIM_MAX_NODES: ${EROS_ERIS_SIM_MAX_NODES:-6000}
      SIM_MAX_EDGES: ${EROS_ERIS_SIM_MAX_EDGES:-12000}
      SIM_STEP_MS: ${EROS_ERIS_SIM_STEP_MS:-1000}
      SIM_SUBSTEPS: ${EROS_ERIS_SIM_SUBSTEPS:-3}
      SIM_DT: ${EROS_ERIS_SIM_DT:-0.22}
      SIM_REFRESH_MS: ${EROS_ERIS_SIM_REFRESH_MS:-10000}
      SIM_WRITE_MS: ${EROS_ERIS_SIM_WRITE_MS:-15000}
      SIM_WRITE_CHUNK: ${EROS_ERIS_SIM_WRITE_CHUNK:-1000}
      SIM_WRITE_PAUSE_MS: ${EROS_ERIS_SIM_WRITE_PAUSE_MS:-25}
      EMBED_EVERY_MS: ${EROS_ERIS_EMBED_EVERY_MS:-2000}
      EMBED_BATCH_SIZE: ${EROS_ERIS_EMBED_BATCH_SIZE:-128}
      EMBED_MAX_IN_FLIGHT: ${EROS_ERIS_EMBED_MAX_IN_FLIGHT:-2}
      EMBED_CONTENT_MODE: ${EROS_ERIS_EMBED_CONTENT_MODE:-full}
      EMBED_PREVIEW_MAX_BYTES: ${EROS_ERIS_EMBED_PREVIEW_MAX_BYTES:-40000}
      EMBED_MAX_CHARS: ${EROS_ERIS_EMBED_MAX_CHARS:-6000}
      SEMANTIC_TOP_K: ${EROS_ERIS_SEMANTIC_TOP_K:-32}
      SEMANTIC_BOTTOM_K: ${EROS_ERIS_SEMANTIC_BOTTOM_K:-4}
      GLOBAL_REPULSION: ${EROS_ERIS_GLOBAL_REPULSION:-18}
      LOCAL_REPULSION_RADIUS: ${EROS_ERIS_LOCAL_REPULSION_RADIUS:-90}
      LOCAL_REPULSION: ${EROS_ERIS_LOCAL_REPULSION:-3600}
      LOCAL_REPULSION_POWER: ${EROS_ERIS_LOCAL_REPULSION_POWER:-4}
      MIN_SEPARATION: ${EROS_ERIS_MIN_SEPARATION:-18}
      SEPARATION: ${EROS_ERIS_SEPARATION:-2600}
      EDGE_PULL_SCALE: ${EROS_ERIS_EDGE_PULL_SCALE:-3.2}
      EDGE_REST_SCALE: ${EROS_ERIS_EDGE_REST_SCALE:-0.84}
      SEMANTIC_ATTRACT_ABOVE: ${EROS_ERIS_SEMANTIC_ATTRACT_ABOVE:-0.72}
      SEMANTIC_REPEL_BELOW: ${EROS_ERIS_SEMANTIC_REPEL_BELOW:-0.08}
      SEMANTIC_ATTRACT: ${EROS_ERIS_SEMANTIC_ATTRACT:-0.11}
      SEMANTIC_REPEL: ${EROS_ERIS_SEMANTIC_REPEL:-1200}
      SEMANTIC_REPEL_RADIUS: ${EROS_ERIS_SEMANTIC_REPEL_RADIUS:-150}
      SEMANTIC_REST: ${EROS_ERIS_SEMANTIC_REST:-56}
      GRAPH_VIEW_COMPONENT_COUNT: ${EROS_ERIS_GRAPH_VIEW_COMPONENT_COUNT:-6}
      SIM_SHARD_INDEX: '0'
      SIM_SHARD_COUNT: '2'
      GRAPH_VIEW_ROTATION_EVERY: ${EROS_ERIS_GRAPH_VIEW_ROTATION_EVERY:-2}
      TARGET_RADIUS: ${EROS_ERIS_TARGET_RADIUS:-5000}
      BOUNDARY_THICKNESS: ${EROS_ERIS_BOUNDARY_THICKNESS:-650}
      BOUNDARY_PRESSURE: ${EROS_ERIS_BOUNDARY_PRESSURE:-60}
      BOUNDARY_EDGE_FRACTION: ${EROS_ERIS_BOUNDARY_EDGE_FRACTION:-0.04}
    volumes: &id001
    - ${DEVEL_ROOT_PATH:-../../..}:/app/workspace/devel
    extra_hosts: &id002
    - host.docker.internal:host-gateway
    depends_on: &id003
      graph-weaver:
        condition: service_healthy
    restart: unless-stopped
    networks: &id004
      default: {}
      ai-infra: {}
    user: ${DOCKER_USER:-1000:1000}
