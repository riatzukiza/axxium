services:
  llamacpp-chat:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "127.0.0.1:${LLAMACPP_CHAT_PORT:-8080}:8080"
    environment:
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      LLAMA_ARG_N_GPU_LAYERS: "${LLAMACPP_N_GPU_LAYERS:-999}"
      LLAMA_ARG_CTX_SIZE: "${LLAMACPP_CTX_SIZE:-8192}"
      LLAMA_ARG_PARALLEL: "${LLAMACPP_PARALLEL:-4}"
      LLAMA_ARG_MODEL: "/models/${LLAMACPP_CHAT_MODEL:-sha256-4c27e0f5b5adf02ac956c7322bd2ee7636fe3f45a8512c9aba5385242cb6e09a}"
    volumes:
      - ${LLAMACPP_MODELS_DIR:-/usr/share/ollama/.ollama/models/blobs}:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      ai-infra:
        aliases:
          - llamacpp-chat
    user: ${DOCKER_USER:-1000:1000}

  llamacpp-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "127.0.0.1:${LLAMACPP_EMBED_PORT:-8081}:8081"
    environment:
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8081"
      LLAMA_ARG_N_GPU_LAYERS: "${LLAMACPP_N_GPU_LAYERS:-999}"
      LLAMA_ARG_EMBEDDING: "true"
      LLAMA_ARG_MODEL: "/models/${LLAMACPP_EMBED_MODEL:-sha256-06507c7b42688469c4e7298b0a1e16deff06caf291cf0a5b278c308249c3e439}"
    volumes:
      - ${LLAMACPP_MODELS_DIR:-/usr/share/ollama/.ollama/models/blobs}:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8081/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      ai-infra:
        aliases:
          - llamacpp-embed
    user: ${DOCKER_USER:-1000:1000}

networks:
  ai-infra:
    external: true
    name: ai-infra
