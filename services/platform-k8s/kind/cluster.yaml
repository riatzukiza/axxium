kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: ingress-ready=true
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 30089
        hostPort: 8789
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 30089
        hostPort: 1455
        listenAddress: "127.0.0.1"
        protocol: TCP
      - containerPort: 30174
        hostPort: 5174
        listenAddress: "0.0.0.0"
        protocol: TCP
