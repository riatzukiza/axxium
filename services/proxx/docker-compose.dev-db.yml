# Host-development database for the PM2 Proxx sidecar.
#
# Boundary:
# - This file starts ONLY a Postgres database for host/PM2 development.
# - It must not publish or run the primary Proxx app ports (8789/5174).
# - Primary local production-like Proxx remains docker-compose.yml profile prod.

name: proxx-dev-local

services:
  proxx-dev-db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: REDACTED_SECRET
      POSTGRES_USER: REDACTED_SECRET
      POSTGRES_PASSWORD: REDACTED_SECRET # pragma: allowlist secret
    ports:
      - "127.0.0.1:${PROXX_DEV_DB_PORT:-15439}:5432"
    volumes:
      - proxx-dev-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U REDACTED_SECRET -d REDACTED_SECRET"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  proxx-dev-db-data:
