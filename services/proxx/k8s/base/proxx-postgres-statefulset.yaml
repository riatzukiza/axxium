apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: proxx-postgres
spec:
  serviceName: proxx-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: proxx
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: proxx
        app.kubernetes.io/component: postgres
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:16-bookworm
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: openai_proxy
            - name: POSTGRES_USER
              value: openai_proxy
            - name: POSTGRES_PASSWORD
              value: openai_proxy
          readinessProbe:
            exec:
              command: ["/bin/sh", "-lc", "pg_isready -U openai_proxy -d openai_proxy"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["/bin/sh", "-lc", "pg_isready -U openai_proxy -d openai_proxy"]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi