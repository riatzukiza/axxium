apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxx-web
spec:
  ingressClassName: nginx
  rules:
    - host: proxx.127.0.0.1.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxx-web
                port:
                  number: 5174