apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: proxx
resources:
  - ../../base
  - ingress.yaml
patches:
  - path: proxx-api-service-REDACTED_SECRETport.yaml
  - path: proxx-web-service-REDACTED_SECRETport.yaml
images:
  - name: proxx
    newName: proxx
    newTag: local
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: proxx-config
    envs:
      - config.env
  - name: proxx-models
    files:
      - models.json=generated/models.json
secretGenerator:
  - name: proxx-secrets
    envs:
      - secret.env
