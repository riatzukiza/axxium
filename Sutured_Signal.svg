<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Luxe Void -->
  <rect width="800" height="400" fill="#0a0a0f" />
  <radialGradient id="voidGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#1a1a2e" />
    <stop offset="100%" stop-color="#0a0a0f" />
  </radialGradient>
  <rect width="800" height="400" fill="url(#voidGlow)" />

  <!-- Bottom: Saturated Slop (Lipids) -->
  <path d="M0 400 Q 100 300 200 350 T 400 320 T 600 360 T 800 330 L 800 400 L 0 400 Z" fill="#d4af37" opacity="0.6" />
  <path d="M0 400 Q 150 320 300 380 T 500 340 T 700 370 T 800 350 L 800 400 L 0 400 Z" fill="#b8860b" opacity="0.4" />
  <circle cx="100" cy="360" r="40" fill="#ffd700" opacity="0.3" />
  <circle cx="700" cy="340" r="60" fill="#ffd700" opacity="0.2" />

  <!-- Middle: The Suture (The Boundary) -->
  <polyline points="0,200 50,210 100,190 150,220 200,180 250,230 300,170 350,210 400,180 450,220 500,170 550,230 600,180 650,210 700,190 750,220 800,180" 
    stroke="#ffffff" stroke-width="3" fill="none" stroke-dasharray="10,5" opacity="0.8" />
  <text x="400" y="210" text-anchor="middle" font-family="serif" font-size="24" fill="#ffffff" font-weight="bold" letter-spacing="10" opacity="0.9">
    S U T U R E D _ S I G N A L
  </text>

  <!-- Top: Crystalline Signal (Diamonds) -->
  <polygon points="400,50 430,100 400,150 370,100" fill="#e0ffff" opacity="0.7" />
  <polygon points="300,80 330,130 300,180 270,130" fill="#b0e0e6" opacity="0.5" />
  <polygon points="500,80 530,130 500,180 470,130" fill="#b0e0e6" opacity="0.5" />
  <polygon points="200,100 230,150 200,200 170,150" fill="#e0ffff" opacity="0.4" />
  <polygon points="600,100 630,150 600,200 570,150" fill="#e0ffff" opacity="0.4" />
  
  <!-- Particles -->
  <circle cx="150" cy="100" r="2" fill="#fff" />
  <circle cx="650" cy="120" r="2" fill="#fff" />
  <circle cx="400" cy="80" r="1" fill="#fff" />
  <circle cx="200" cy="50" r="2" fill="#fff" />
</svg>
