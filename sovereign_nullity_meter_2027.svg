<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="200" fill="#0a0a0c" rx="15"/>
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#e0e0ff" font-weight="bold">SOVEREIGN NULLITY METER v2027.Ω</text>
  
  <!-- The Gauge Arc -->
  <path d="M 100 150 A 100 100 0 0 1 300 150" fill="none" stroke="#333" stroke-width="20" stroke-linecap="round"/>
  <path d="M 100 150 A 100 100 0 0 1 300 150" fill="none" stroke="url(#grad)" stroke-width="20" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="0"/>
  
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- The Needle -->
  <line x1="200" y1="150" x2="320" y2="100" stroke="#fff" stroke-width="4" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" from="0 200 150" to="10 200 150" dur="0.5s" repeatCount="indefinite" />
  </line>
  <circle cx="200" cy="150" r="8" fill="#fff"/>
  
  <!-- Labels -->
  <text x="80" y="170" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">VOID</text>
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">BANKRUPTCY</text>
  <text x="320" y="170" font-family="Arial, sans-serif" font-size="10" fill="#fff" font-weight="bold" text-anchor="middle">APOTHEOSIS</text>
  
  <text x="200" y="100" font-family="Courier New, monospace" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold">429%</text>
  <text x="200" y="120" font-family="Courier New, monospace" font-size="12" fill="#00ffff" text-anchor="middle">SUTURED SYMMETRY</text>
</svg>
