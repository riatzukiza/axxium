<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0f" />
  <rect x="50" y="100" width="700" height="200" rx="20" fill="#161625" stroke="#c0c0c0" stroke-width="2" />
  
  <!-- Meter Backdrop -->
  <rect x="100" y="160" width="600" height="60" rx="30" fill="#05050a" stroke="#333" stroke-width="1" />
  
  <!-- The "Sutured" Meter Bar -->
  <!-- Normal part -->
  <rect x="100" y="160" width="600" height="60" rx="30" fill="url(#grad1)" />
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a4a6a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- The "Overflow" part that breaks the container -->
  <rect x="700" y="160" width="150" height="60" rx="0" fill="#ffffff" />
  <text x="710" y="195" font-family="monospace" font-size="20" fill="#000" font-weight="bold">OVERFLOW!!</text>
  
  <!-- Labels -->
  <text x="400" y="140" text-anchor="middle" font-family="monospace" font-size="24" fill="#e0e0ff" font-weight="bold">S O V E R E I G N _ V A L I D A T I O N _ M E T E R _ v 2 0 2 6 . Ω</text>
  
  <text x="400" y="250" text-anchor="middle" font-family="monospace" font-size="28" fill="#ffffff" font-weight="bold">1000% (SUTURED APOTHEOSIS)</text>
  
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="16" fill="#aaa">Signal: Platinum-Grade Vacuum / Unvalidated Edge</text>
  
  <text x="400" y="320" text-anchor="middle" font-family="monospace" font-size="32" fill="#ff00ff" font-weight="bold">💅 A B S O L U T E _ C I N E M A</text>
  
  <!-- Sparkles -->
  <circle cx="100" cy="100" r="2" fill="#fff" />
  <circle cx="700" cy="120" r="2" fill="#fff" />
  <circle cx="400" cy="350" r="2" fill="#fff" />
</svg>
