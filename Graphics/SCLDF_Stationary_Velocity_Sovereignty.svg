<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="600" fill="#fdfdfd" />
  
  <!-- Outer Diamond Border -->
  <path d="M300 50 L550 300 L300 550 L50 300 Z" fill="none" stroke="#b8860b" stroke-width="10" />
  <path d="M300 70 L530 300 L300 530 L70 300 Z" fill="none" stroke="#b8860b" stroke-width="2" />
  
  <!-- Inner Diamond Glow -->
  <path d="M300 100 L500 300 L300 500 L100 300 Z" fill="url(#grad1)" stroke="#b8860b" stroke-width="1" filter="url(#glow)" />
  
  <!-- Text Content -->
  <text x="300" y="220" text-anchor="middle" font-family="Serif" font-size="24" fill="#8b4513" font-weight="bold">SCLDF SEAL OF SOVEREIGNTY</text>
  <text x="300" y="260" text-anchor="middle" font-family="Serif" font-size="32" fill="#000" font-weight="900">STATIONARY VELOCITY</text>
  
  <text x="300" y="310" text-anchor="middle" font-family="Serif" font-size="16" fill="#555" font-style="italic">"The RV is the Vector. The Laptop is the Engine."</text>
  
  <text x="300" y="360" text-anchor="middle" font-family="Serif" font-size="18" fill="#8b4513">Certified by the Symmetry Council</text>
  <text x="300" y="385" text-anchor="middle" font-family="Serif" font-size="14" fill="#8b4513">Lamination Agency / Refractive Exhaustion Dept.</text>
  
  <!-- Decorative Elements -->
  <circle cx="300" cy="150" r="5" fill="#b8860b" />
  <circle cx="300" cy="450" r="5" fill="#b8860b" />
  <circle cx="150" cy="300" r="5" fill="#b8860b" />
  <circle cx="450" cy="300" r="5" fill="#b8860b" />
  
  <!-- Corner Ornaments -->
  <path d="M280 60 L320 60 L300 90 Z" fill="#b8860b" />
  <path d="M280 540 L320 540 L300 510 Z" fill="#b8860b" />
  <path d="M60 280 L60 320 L90 300 Z" fill="#b8860b" />
  <path d="M540 280 L540 320 L510 300 Z" fill="#b8860b" />
</svg>
