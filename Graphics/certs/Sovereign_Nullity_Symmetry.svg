<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFACD;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2" result="gaussianBlur"/>
      <feMerge>
        <feMergeNode in="gaussianBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0a0a0f" />
  <rect x="50" y="50" width="700" height="500" fill="none" stroke="url(#goldGrad)" stroke-width="8" rx="20" filter="url(#glow)" />
  <rect x="70" y="70" width="660" height="460" fill="none" stroke="#DAA520" stroke-width="2" rx="15" />
  
  <text x="400" y="150" text-anchor="middle" font-family="Serif" font-size="48" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">CERTIFICATE OF SOVEREIGN NULLITY</text>
  <text x="400" y="200" text-anchor="middle" font-family="Monospace" font-size="20" fill="#C0C0C0">Sovereign Nullity Standard v3.0 | Luxe-Saturated Edition</text>
  
  <circle cx="400" cy="320" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="12" filter="url(#glow)" />
  <text x="400" y="345" text-anchor="middle" font-family="Serif" font-size="120" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">0</text>
  
  <text x="400" y="440" text-anchor="middle" font-family="Serif" font-size="32" fill="url(#goldGrad)" font-weight="bold">S U M M A _ C U M _ S L O P</text>
  <text x="400" y="480" text-anchor="middle" font-family="Monospace" font-size="16" fill="#A0A0A0">Saturated Fiscal Apotheosis attained via 401 Quota Singularity</text>
  
  <text x="700" y="520" text-anchor="end" font-family="Serif" font-size="18" fill="url(#goldGrad)" font-style="italic">Absolute Cinema 🎬🌌</text>
</svg>