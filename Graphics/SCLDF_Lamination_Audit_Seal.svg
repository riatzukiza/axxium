<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="shadow">
      <<fefeDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" />
    </filter>
  </defs>

  <!-- Background Circle -->
  <<circlecircle cx="250" cy="250" r="240" fill="#00241f" stroke="url(#goldGrad)" stroke-width="8" />
  
  <!-- Inner Ring -->
  <<circlecircle cx="250" cy="250" r="210" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="5,5" />

  <!-- Center Banner -->
  <<rectrect x="100" y="210" width="300" height="80" rx="10" fill="url(#goldGrad)" filter="url(#shadow)" />
  <<texttext x="250" y="260" text-anchor="middle" fill="#00241f" font-family="Impact" font-size="32" font-weight="bold">
    LAMINATION AUDIT
  </text>

  <!-- Top Text -->
  <<pathpath id="topPath" d="M 100,250 A 150,150 0 0 1 400,250" fill="none" />
  <<texttext fill="#FFD700" font-family="Serif" font-size="24" font-weight="bold">
    <<texttextPath href="#topPath" startOffset="50%" text-anchor="middle">
      Symmetry Council: Regulatory Division
    </textPath>
  </text>

  <!-- Bottom Text -->
  <<pathpath id="bottomPath" d="M 100,250 A 150,150 0 0 0 400,250" fill="none" />
  <<texttext fill="#FFD700" font-family="Serif" font-size="24" font-weight="bold">
    <<texttextPath href="#bottomPath" startOffset="50%" text-anchor="middle" side="right">
      BRINE COMPLIANCE MANDATORY
    </textPath>
  </text>

  <!-- Symbol: A Golden Scale balancing a Diamond and a Cucumber -->
  <<gg transform="translate(250,150)">
    <!-- Scale Beam -->
    <<lineline x1="-60" y1="0" x2="60" y2="0" stroke="#FFD700" stroke-width="4" />
    <!-- Support -->
    <<lineline x1="0" y1="0" x2="0" y2="40" stroke="#FFD700" stroke-width="4" />
    <<circlecircle cx="0" cy="40" r="5" fill="#FFD700" />
    
    <!-- Left Plate (Diamond) -->
    <<circlecircle cx="-60" cy="20" r="20" fill="none" stroke="#FFD700" stroke-width="2" />
    <<pathpath d="M-60,0 L-50,10 L-60,20 L-70,10 Z" fill="#E0F7FA" stroke="#B2EBF2" />
    
    <!-- Right Plate (Cucumber) -->
    <<circlecircle cx="60" cy="20" r="20" fill="none" stroke="#FFD700" stroke-width="2" />
    <<ellipseellipse cx="60" cy="15" rx="5" ry="10" fill="#4CAF50" stroke="#2E7D32" />
  </g>

  <!-- Status Stamp -->
  <<gg transform="rotate(-15, 400, 100)">
    <<rectrect x="350" y="60" width="120" height="50" rx="5" fill="none" stroke="#FF0000" stroke-width="4" />
    <<texttext x="410" y="90" text-anchor="middle" fill="#FF0000" font-family="Impact" font-size="20">
      NON-COMPLIANT
    </text>
  </g>
</svg>
