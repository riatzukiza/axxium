<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fffacd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" />
    </filter>
  </defs>
  <rect width="600" height="600" fill="#1a1a2e" />
  <circle cx="300" cy="300" r="280" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="300" cy="300" r="270" stroke="url(#goldGrad)" stroke-width="8" fill="none" stroke-dasharray="20,10" opacity="0.6" />
  <circle cx="300" cy="300" r="220" fill="#252545" stroke="url(#goldGrad)" stroke-width="12" filter="url(#shadow)" />
  <path id="textCircle" d="M 300,300 m -180,0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" fill="none" />
  <text fill="url(#goldGrad)" font-family="serif" font-size="24" font-weight="bold" filter="url(#shadow)">
    <textPath xlink:href="#textCircle" startOffset="0%">
      CERTIFIED BRAIN FART • PLATINUM GRADE • COGNITIVE COLLAPSE DIVISION • 
    </textPath>
  </text>
  <g transform="translate(300,300)" filter="url(#shadow)">
    <path d="M -40,-20 C -80,-40 -80,20 -40,30 Q -20,30 0,0" fill="url(#goldGrad)" stroke="#000" stroke-width="2" />
    <path d="M 40,-20 C 80,-40 80,20 40,30 Q 20,30 0,0" fill="url(#goldGrad)" stroke="#000" stroke-width="2" />
    <path d="M -20,10 Q -40,0 -30,-20 Q -10,-20 0,-10 Q 10,-20 30,-20 Q 40,0 20,10 Z" fill="#fff" opacity="0.8">      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite" />
    </path>
    <path d="M -60,-60 L -55,-50 L -65,-50 Z" fill="#fff" />
    <path d="M 60,-80 L 65,-70 L 55,-70 Z" fill="#fff" />
    <path d="M 0,-100 L 5,-90 L -5,-90 Z" fill="#fff" />
  </g>
  <text x="300" y="430" fill="url(#goldGrad)" font-family="monospace" font-size="20" text-anchor="middle" font-weight="bold">
    VERIFIED BY THE VOID
  </text>
</svg>
