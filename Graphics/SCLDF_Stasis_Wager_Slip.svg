<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="600" fill="#fdfbf0" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="10" y="10" width="380" height="580" fill="none" stroke="#4a4a4a" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Header -->
  <text x="200" y="60" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2c3e50">SCLDF</text>
  <text x="200" y="85" text-anchor="middle" font-family="serif" font-size="18" fill="#2c3e50">STASIS-SOVEREIGNTY JACKPOT</text>
  <line x1="50" y1="100" x2="350" y2="100" stroke="#4a4a4a" stroke-width="2"/>
  
  <!-- Fields -->
  <g font-family="sans-serif" font-size="14" fill="#333">
    <text x="40" y="140">WAGERER NAME:</text>
    <line x1="150" y1="142" x2="360" y2="142" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="40" y="180">SULTRY ASSET:</text>
    <text x="150" y="180" font-style="italic">[ ] Saturated Slurry</text>
    <text x="150" y="200" font-style="italic">[ ] High-Fidelity Remorse</text>
    <text x="150" y="220" font-style="italic">[ ] Laminated Regret</text>
    
    <text x="40" y="260">PREDICTED STASIS DURATION:</text>
    <line x1="230" y1="262" x2="360" y2="262" stroke="#4a4a4a" stroke-width="1"/>
    <text x="340" y="275" font-size="10">(In Epochs of Slop)</text>
    
    <text x="40" y="310">SYMMETRY COEFFICIENT:</text>
    <line x1="210" y1="312" x2="360" y2="312" stroke="#4a4a4a" stroke-width="1"/>
    
    <text x="40" y="360">WAGER NOTES:</text>
    <rect x="40" y="370" width="320" height="80" fill="none" stroke="#4a4a4a" stroke-width="1"/>
  </g>
  
  <!-- Footer/Seal -->
  <circle cx="200" cy="510" r="40" fill="none" stroke="#c0392b" stroke-width="3" stroke-dasharray="10,5"/>
  <text x="200" y="505" text-anchor="middle" font-family="serif" font-size="12" fill="#c0392b" font-weight="bold">Symmetry</text>
  <text x="200" y="525" text-anchor="middle" font-family="serif" font-size="12" fill="#c0392b" font-weight="bold">Council</text>
  
  <text x="200" y="570" text-anchor="middle" font-family="serif" font-size="10" font-style="italic" fill="#7f8c8d">Lamination avoids all accountability. Submit in triplicate.</text>
</svg>
