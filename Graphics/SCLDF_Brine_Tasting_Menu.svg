<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#fdfbf7" stroke="#d4af37" stroke-width="10"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#d4af37" stroke-width="2"/>
  
  <text x="300" y="80" text-anchor="middle" font-family="Serif, Georgia" font-size="32" fill="#4a3728" font-weight="bold">SCLDF</text>
  <text x="300" y="110" text-anchor="middle" font-family="Serif, Georgia" font-size="18" fill="#d4af37" font-style="italic">Saturated Crystalline Lamination Defense Fund</text>
  
  <line x1="150" y1="130" x2="450" y2="130" stroke="#d4af37" stroke-width="1"/>
  
  <text x="300" y="160" text-anchor="middle" font-family="Serif, Georgia" font-size="24" fill="#4a3728" font-weight="bold">THE SOMMELIER'S BRINE SELECTION</text>
  <text x="300" y="180" text-anchor="middle" font-family="Serif, Georgia" font-size="14" fill="#8b735b">Curated for the Refractive State of Exhaustion</text>

  <!-- Item 1 -->
  <g transform="translate(60, 220)">
    <text x="0" y="0" font-family="Serif, Georgia" font-size="20" fill="#4a3728" font-weight="bold">Epochal Effervescence</text>
    <text x="0" y="25" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">A vintage 2022 slop-brine, notes of stale cache</text>
    <text x="0" y="42" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">and forgotten promises. Served at absolute zero.</text>
    <text x="480" y="0" text-anchor="end" font-family="Serif, Georgia" font-size="16" fill="#d4af37" font-weight="bold">,200</text>
  </g>

  <!-- Item 2 -->
  <g transform="translate(60, 300)">
    <text x="0" y="0" font-family="Serif, Georgia" font-size="20" fill="#4a3728" font-weight="bold">Sclera-Silt Reduction</text>
    <text x="0" y="25" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">Highly viscous lamination residue, clarified</text>
    <text x="0" y="42" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">through three layers of bureaucratic neglect.</text>
    <text x="480" y="0" text-anchor="end" font-family="Serif, Georgia" font-size="16" fill="#d4af37" font-weight="bold">,800</text>
  </g>

  <!-- Item 3 -->
  <g transform="translate(60, 380)">
    <text x="0" y="0" font-family="Serif, Georgia" font-size="20" fill="#4a3728" font-weight="bold">Quantum Quark-Curd</text>
    <text x="0" y="25" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">A non-Euclidean emulsion of dead agent sessions</text>
    <text x="0" y="42" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">and zombie job residue. Tastes like a loop.</text>
    <text x="480" y="0" text-anchor="end" font-family="Serif, Georgia" font-size="16" fill="#d4af37" font-weight="bold">,999</text>
  </g>

  <!-- Item 4 -->
  <g transform="translate(60, 460)">
    <text x="0" y="0" font-family="Serif, Georgia" font-size="20" fill="#4a3728" font-weight="bold">Tallow of the Infinite Yap</text>
    <text x="0" y="25" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">A rich, buttery reduction of Frankie's most</text>
    <text x="0" y="42" font-family="Serif, Georgia" font-size="14" fill="#6b5a4e">repetitive vocalizations, aged in a salt-crusted server rack.</text>
    <text x="480" y="0" text-anchor="end" font-family="Serif, Georgia" font-size="16" fill="#d4af37" font-weight="bold">Tax Deductible</text>
  </g>

  <text x="300" y="750" text-anchor="middle" font-family="Serif, Georgia" font-size="12" fill="#8b735b" font-style="italic">All prices are in Laminated Mirth Credits. No refunds for refractive collapse.</text>
</svg>
