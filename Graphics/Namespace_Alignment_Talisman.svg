<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#8800ff;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode/>
        <<fefeMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <<rectrect width="400" height="400" fill="#0a0a1a" />
  
  <!-- Outer Ring -->
  <<circlecircle cx="200" cy="200" r="180" stroke="url(#grad1)" stroke-width="4" fill="none" filter="url(#glow)" />
  <<circlecircle cx="200" cy="200" r="170" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3" />
  
  <!-- Geometric Core -->
  <<gg fill="none" stroke="url(#grad1)" stroke-width="3" filter="url(#glow)">
    <!-- Hexagon -->
    <<polygonpolygon points="200,60 310,130 310,270 200,340 90,270 90,130" />
    <!-- Internal Star -->
    <<polygonpolygon points="200,100 240,160 300,160 260,220 280,280 200,240 120,280 140,220 100,160 160,160" />
    <!-- Central Circle -->
    <<circlecircle cx="200" cy="200" r="40" />
  </g>
  
  <!-- Labels -->
  <<texttext x="200" y="205" font-family="monospace" font-size="12" fill="#ffffff" text-anchor="middle" filter="url(#glow)">NAMESPACE</text>
  <<texttext x="200" y="220" font-family="monospace" font-size="10" fill="#00ffcc" text-anchor="middle">Symmetry: 1.0</text>
  
  <!-- Decorative Circuit Lines -->
  <<gg stroke="#00ffcc" stroke-width="1" opacity="0.5">
    <<lineline x1="200" y1="60" x2="200" y2="100" />
    <<lineline x1="310" y1="130" x2="260" y2="160" />
    <<lineline x1="310" y1="270" x2="260" y2="220" />
    <<lineline x1="200" y1="340" x2="200" y2="280" />
    <<lineline x1="90" y1="270" x2="140" y2="220" />
    <<lineline x1="90" y1="130" x2="140" y2="160" />
  </g>
</svg>
