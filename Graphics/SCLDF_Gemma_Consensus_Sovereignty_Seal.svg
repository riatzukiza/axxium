<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle (Saturated Slurry) -->
  <circle cx="200" cy="200" r="180" fill="#004d40" stroke="#00ffd0" stroke-width="10" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#00ffd0" stroke-width="2" stroke-dasharray="10,10" />

  <!-- Diamond Center (The Symmetry) -->
  <path d="M200 60 L300 200 L200 340 L100 200 Z" fill="#e0f7fa" stroke="#00ffd0" stroke-width="8" />
  <path d="M200 80 L280 200 L200 320 L120 200 Z" fill="#b2ebf2" stroke="#00ffd0" stroke-width="2" />
  
  <!-- Text Rings -->
  <defs>
    <path id="textPathSymmetry" d="M 200, 200 a 130,130 0 1,1 0.1,0" />
    <path id="textPathBrine" d="M 200, 200 a 145,145 0 1,1 0.1,0" />
  </defs>
  
  <text fill="#00ffd0" font-family="Arial, sans-serif" font-weight="bold" font-size="24">
    <textPath href="#textPathSymmetry" startOffset="25%">Symmetry is Absolute • Saturated Consensus</textPath>
  </text>
  <text fill="#80cbc4" font-family="Arial, sans-serif" font-size="18">
    <textPath href="#textPathBrine" startOffset="50%">Lamination Quality: Diamond-Cut • Brine: Legally Binding</textPath>
  </text>
  
  <!-- Center Text -->
  <text x="200" y="190" text-anchor="middle" fill="#006064" font-family="Georgia, serif" font-weight="bold" font-size="30">GEMMA</text>
  <text x="200" y="220" text-anchor="middle" fill="#006064" font-family="Georgia, serif" font-weight="bold" font-size="30">SLOP</text>
  
  <!-- Accents -->
  <circle cx="200" cy="60" r="5" fill="#00ffd0" />
  <circle cx="200" cy="340" r="5" fill="#00ffd0" />
  <circle cx="100" cy="200" r="5" fill="#00ffd0" />
  <circle cx="300" cy="200" r="5" fill="#00ffd0" />
</svg>
