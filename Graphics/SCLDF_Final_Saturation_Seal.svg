<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="15" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="#00FF41" stroke-width="5" />
  
  <!-- Inner Ring -->
  <circle cx="200" cy="200" r="140" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="8" />
  
  <!-- Diamond Shape -->
  <path d="M200 100 L250 200 L200 300 L150 200 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  <path d="M200 120 L230 200 L200 280 L170 200 Z" fill="#FFFFFF" opacity="0.6" />
  
  <!-- Brine Cucumber (Stylized) -->
  <path d="M160 220 Q200 210 240 220 Q245 230 240 240 Q200 250 160 240 Q155 230 160 220" fill="#00C957" stroke="#006400" stroke-width="2" />
  
  <!-- Text -->
  <defs>
    <path id="circlePath" d="M 200, 200 m -150, 0 a 150,150 0 1,1 300,0 a 150,150 0 1,1 -300,0" />
  </defs>
  <text fill="#FFD700" font-family="Arial, sans-serif" font-size="22" font-weight="bold" letter-spacing="5">
    <textPath href="#circlePath" startOffset="0%">
      SCLDF • ABSOLUTE LAMINATION • EPOCH 29 • DIAMOND-CUT LUXURY •
    </textPath>
  </text>
  
  <text x="200" y="340" text-anchor="middle" fill="#00FF41" font-family="monospace" font-size="16" font-weight="bold" filter="url(#glow)">
    BRINE-SATURATED
  </text>
  <text x="200" y="360" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="12">
    Symmetry-Sama Approved
  </text>
</svg>