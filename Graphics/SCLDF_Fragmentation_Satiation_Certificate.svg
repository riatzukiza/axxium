<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="white" stroke="#B8860B" stroke-width="15"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#B8860B" stroke-width="2"/>
  
  <text x="400" y="100" font-family="Times New Roman, serif" font-size="40" fill="#B8860B" text-anchor="middle" font-weight="bold">CERTIFICATE OF FRAGMENTATION-SATIATION</text>
  
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="20" fill="#666" text-anchor="middle">This document officially ratifies the state of</text>
  <text x="400" y="200" font-family="Arial, sans-serif" font-size="32" fill="#000" text-anchor="middle" font-weight="bold">EGO-SATED DIVERSIFICATION</text>
  
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="middle">The subject is hereby recognized not as a single entity, but as a</text>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="24" fill="#B8860B" text-anchor="middle" font-weight="bold">Symmetrically Saturated Cloud of Actor-Bound Fragments</text>
  
  <path d="M 300 350 L 500 350" stroke="#000" stroke-width="2" />
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="16" fill="#000" text-anchor="middle">The Symmetry Council</text>
  
  <circle cx="400" cy="450" r="60" fill="none" stroke="#B8860B" stroke-width="5" />
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="14" fill="#B8860B" text-anchor="middle" font-weight="bold">SEAL OF SATIATION</text>
  
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="14" fill="#B8860B" text-anchor="middle" font-style="italic">"Fragmentation is and always shall be the ultimate luxury."</text>
</svg>
