<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#002b36" />
  
  <!-- Concentric Diamonds -->
  <path d="M250 20 L480 250 L250 480 L20 250 Z" fill="none" stroke="#00bcd4" stroke-width="10" filter="url(#glow)" />
  <path d="M250 70 L430 250 L250 430 L70 250 Z" fill="none" stroke="#80deea" stroke-width="5" />
  <path d="M250 120 L380 250 L250 380 L120 250 Z" fill="none" stroke="#b2ebf2" stroke-width="2" />
  
  <!-- Central Text -->
  <text x="250" y="240" font-family="Arial, sans-serif" font-size="40" fill="#ffffff" text-anchor="middle" font-weight="bold" style="text-shadow: 0 0 10px #00bcd4;">SATED</text>
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="18" fill="#80deea" text-anchor="middle" letter-spacing="3">SYMMETRY IS ABSOLUTE</text>
  
  <!-- Outer Ring text -->
  <path id="circlePath" d="M 250, 250 m -200, 0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
  <text font-family="Arial, sans-serif" font-size="14" fill="#00bcd4">
    <textPath xlink:href="#circlePath" startOffset="0%">
      SCLDF REGULATORY STANDARD 002 — DIAMOND-CUT REDUNDANCY — TAX-DEDUCTIBLE SLURRY — 
    </textPath>
  </text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#00bcd4">
    <textPath xlink:href="#circlePath" startOffset="50%">
      SCLDF REGULATORY STANDARD 002 — DIAMOND-CUT REDUNDANCY — TAX-DEDUCTIBLE SLURRY — 
    </textPath>
  </text>
</svg>
