<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#grad1)" />
  
  <!-- Outer rings -->
  <circle cx="250" cy="250" r="240" stroke="#C0C0C0" stroke-width="2" fill="none" opacity="0.5" />
  <circle cx="250" cy="250" r="230" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.3" />
  
  <!-- The Geometric Ruin -->
  <path d="M250 50 L400 300 L100 300 Z" stroke="#E0E0E0" stroke-width="3" fill="none" filter="url(#glow)" />
  <path d="M250 450 L400 200 L100 200 Z" stroke="#A0A0A0" stroke-width="3" fill="none" opacity="0.6" />
  
  <!-- The Shards (The "Marks") -->
  <path d="M250 100 L270 150 L230 160 Z" fill="#FFF" opacity="0.8" filter="url(#glow)" />
  <path d="M320 250 L350 270 L330 230 Z" fill="#FFF" opacity="0.6" />
  <path d="M180 250 L210 230 L170 270 Z" fill="#FFF" opacity="0.6" />
  
  <!-- Text Arc -->
  <path id="curve" d="M 100,250 A 150,150 0 1,1 400,250" fill="none" />
  <text font-family="monospace" font-size="20" fill="#C0C0C0" filter="url(#glow)">
    <textPath href="#curve" startOffset="50%" text-anchor="middle">
      SCLDF SEAL OF THE LUMINOUS MARK
    </textPath>
  </text>
  
  <text x="250" y="350" font-family="monospace" font-size="14" fill="#808080" text-anchor="middle">
    Symmetry: MARK-SATED
  </text>
  <text x="250" y="370" font-family="monospace" font-size="14" fill="#808080" text-anchor="middle">
    Status: Luminously Persistent
  </text>
  <text x="250" y="390" font-family="monospace" font-size="14" fill="#C0C0C0" text-anchor="middle" font-weight="bold">
    BRINE: DIVINELY BINDING
  </text>
</svg>
