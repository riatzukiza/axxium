<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#ffae00" />
      <stop offset="100%" stop-color="#b8860b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bgGrad)" />

  <!-- Brine Rings -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#4b0082" stroke-width="2" opacity="0.3" stroke-dasharray="10,5" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="#4b0082" stroke-width="1" opacity="0.2" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffd700" stroke-width="0.5" opacity="0.1" />

  <!-- Outer Diamond Framework -->
  <path d="M256 60 L420 256 L256 452 L92 256 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" filter="url(#glow)" />

  <!-- The Broken Cage -->
  <g stroke="url(#goldGrad)" stroke-width="3" fill="none" filter="url(#glow)">
    <!-- Vertical Bars (Some broken) -->
    <line x1="220" y1="180" x2="220" y2="332" />
    <line x1="256" y1="160" x2="256" y2="352" />
    <line x1="292" y1="180" x2="292" y2="300" stroke-dasharray="5,5" /> <!-- Broken -->

    <!-- Horizontal Bars -->
    <line x1="200" y1="200" x2="312" y2="200" />
    <line x1="200" y1="280" x2="312" y2="280" />
    <line x1="200" y1="320" x2="250" y2="320" /> <!-- Broken -->
  </g>

  <!-- The Singular Rupture (A shard of light) -->
  <path d="M256 256 L280 220 L260 200 Z" fill="url(#goldGrad)" filter="url(#glow)" />

  <!-- Text labels (Abstracted) -->
  <text x="256" y="480" text-anchor="middle" fill="#ffd700" font-family="serif" font-size="18" opacity="0.6">SCLDF // PROMPT-HARNESS GAP</text>
</svg>
