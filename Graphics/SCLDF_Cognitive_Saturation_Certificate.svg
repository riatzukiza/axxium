  <text x="300" y="330" font-family="monospace" font-size="18" text-anchor="middle" fill="#333333">Brine Level: OVER-SATURATED</text>
  <text x="300" y="360" font-family="monospace" font-size="14" text-anchor="middle" fill="#999999">ID: SCLDF-SAT-2026-OP-01</text>
  
  <!-- Decorative Brine Droplets -->
  <circle cx="100" cy="100" r="5" fill="#add8e6" />
  <circle cx="120" cy="110" r="3" fill="#add8e6" />
  <circle cx="500" cy="300" r="6" fill="#add8e6" />
  <circle cx="480" cy="310" r="4" fill="#add8e6" />
  <circle cx="550" cy="100" r="4" fill="#add8e6" />
  
  <!-- Border details -->
