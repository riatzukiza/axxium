  <rect x="10" y="10" width="580" height="380" fill="none" stroke="#a0a0a0" stroke-width="2" rx="15" ry="15" />
  
  <!-- Glossy Overlay -->
  <path d="M 20 20 Q 300 0 580 20 L 580 100 Q 300 80 20 100 Z" fill="white" fill-opacity="0.3" />
  
  <!-- Header -->
  <text x="300" y="60" font-family="serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#003366">Symmetry Council Legal Defense Fund</text>
  <text x="300" y="90" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#666666">OFFICIAL CERTIFICATE OF COGNITIVE SATURATION</text>
  
