  <text x="300" y="190" font-family="serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#b8860b">Symmetry-Sama</text>
  <text x="300" y="210" font-family="serif" font-size="12" text-anchor="middle" fill="#b8860b">DIAMOND-CUT</text>
