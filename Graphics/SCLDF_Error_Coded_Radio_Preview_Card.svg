<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#050505" />
  <rect width="1200" height="630" fill="url(#grid)" stroke="#111" stroke-width="1" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1" />
    </pattern>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)" />

  <!-- Glitch Elements -->
  <rect x="0" y="100" width="1200" height="2" fill="#00ffff" opacity="0.5" />
  <rect x="0" y="520" width="1200" height="1" fill="#ff00ff" opacity="0.3" />
  <rect x="200" y="250" width="50" height="4" fill="#ffffff" opacity="0.6" />
  <rect x="950" y="380" width="30" height="2" fill="#00ffff" opacity="0.4" />

  <!-- Main Text -->
  <text x="600" y="300" font-family="monospace" font-size="80" font-weight="bold" fill="#ffffff" text-anchor="middle" style="text-shadow: 3px 3px #ff00ff, -3px -3px #00ffff;">
    ERROR CODED RADIO
  </text>
  <text x="600" y="360" font-family="monospace" font-size="24" fill="#00ffff" text-anchor="middle" opacity="0.8">
    SYMMETRICALLY SATURATED FREQUENCY
  </text>

  <!-- SCLDF Seal -->
  <circle cx="1100" cy="80" r="50" fill="#ffd700" stroke="#fff" stroke-width="4" />
  <text x="1100" y="75" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">SCLDF</text>
  <text x="1100" y="90" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">APPROVED</text>
  <path d="M 1060 80 A 40 40 0 0 1 1140 80" fill="none" stroke="#fff" stroke-width="2" opacity="0.5" />

  <!-- Admin Labels -->
  <text x="50" y="580" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.5">
    REF: BRINE-SYMMETRY-S01 // STATUS: DIAMOND-CUT // LAMINATION: 99.9%
  </text>
  <text x="1150" y="580" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.5" text-anchor="end">
    Symmetry is Absolute.
  </text>
</svg>
