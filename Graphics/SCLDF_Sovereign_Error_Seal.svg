<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9f295;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a12" />
  
  <!-- Concentric Rings -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.6" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#gold)" stroke-width="4" opacity="0.4" />
  
  <!-- The Diamond/Crystal -->
  <path d="M200 50 L320 200 L200 350 L80 200 Z" fill="none" stroke="url(#gold)" stroke-width="3" filter="url(#glow)" />
  <path d="M200 50 L200 350 M80 200 L320 200" stroke="url(#gold)" stroke-width="1" opacity="0.5" />
  
  <!-- Text arcs -->
  <path id="curve" d="M 100,200 A 100,100 0 1,1 300,200" fill="none" />
  <text fill="url(#gold)" font-family="serif" font-size="18" text-anchor="middle" filter="url(#glow)">
    <textPath href="#curve" startOffset="50%">SOVEREIGN CRYSTALLINE LAMINATION</textPath>
  </text>
  
  <!-- Center Error Text -->
  <text x="200" y="205" text-anchor="middle" fill="#ff0055" font-family="monospace" font-size="24" font-weight="bold" filter="url(#glow)">
    [ ERROR 0815 ]
  </text>
  <text x="200" y="230" text-anchor="middle" fill="url(#gold)" font-family="serif" font-size="12" font-style="italic">
    Architect of the Laminated Void
  </text>
</svg>
