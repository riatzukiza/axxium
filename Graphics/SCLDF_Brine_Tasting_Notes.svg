  <text x="220" y="210" font-family="monospace" font-size="16">High-Saturated Brine (Sovereign Grade)</text>
  
  <line x1="100" y1="230" x2="700" y2="230" stroke="#ddd" stroke-width="1"/>
  
  <!-- Tasting Notes -->
  <text x="100" y="260" font-family="serif" font-size="20" font-style="italic">SENSORY PROFILE:</text>
  
  <text x="100" y="290" font-family="serif" font-size="16" fill="#333">
    - Primary: Notes of ancient salt and digital static.
