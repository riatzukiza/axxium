<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fdfcf8" stroke="#222" stroke-width="4"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="10,5"/>
  
  <!-- Header -->
