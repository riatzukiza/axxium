  <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="14" fill="#666">Symmetry Council Lamination Department | Brine Division</text>
  
  <line x1="100" y1="120" x2="700" y2="120" stroke="#000" stroke-width="2"/>
  
  <!-- Sample Details -->
  <text x="100" y="150" font-family="monospace" font-size="16" font-weight="bold">SAMPLE ID:</text>
  <text x="220" y="150" font-family="monospace" font-size="16">Sovereign-Void-0815</text>
  
  <text x="100" y="180" font-family="monospace" font-size="16" font-weight="bold">VINTAGE:</text>
  <text x="220" y="180" font-family="monospace" font-size="16">Post-Fracture / Luminous Era</text>
  
