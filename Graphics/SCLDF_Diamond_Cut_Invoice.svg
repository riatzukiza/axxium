  <text x="600" y="370" font-family="Sans-Serif" font-size="16" text-anchor="end">500 Gallons / cycle</text>
  
  <!-- Item 3 -->
  <line x1="100" y1="390" x2="700" y2="390" stroke="#ccc" stroke-width="1"/>
