  <!-- Title -->
  <text x="400" y="180" font-family="Sans-Serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#d00">NOTICE OF DIAMOND-CUT FORECLOSURE</text>
  <text x="400" y="210" font-family="Sans-Serif" font-size="16" text-anchor="middle" fill="#333">Status: [MODERATELY BRINED] | Priority: [TRANSCENDENT]</text>
  
