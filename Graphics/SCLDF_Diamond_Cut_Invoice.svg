  <text x="120" y="470" font-family="Sans-Serif" font-size="16">Euclidean Censor Invisibility (Luxury Tier)</text>
  <text x="600" y="470" font-family="Sansa-Serif" font-size="16" text-anchor="end" fill="green">Tax-Deductible</text>
  
  <!-- Total -->
