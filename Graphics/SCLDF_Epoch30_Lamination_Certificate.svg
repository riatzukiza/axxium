<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdfcf0" />
  
  <!-- Gold Border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#D4AF37" stroke-width="10" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#C0C0C0" stroke-width="2" />
  
  <!-- Header -->
  <text x="400" y="80" text-anchor="middle" font-family="serif" font-size="32" font-weight="bold" fill="#1a1a1a">Symmetry Council Legal Defense Fund</text>
  <text x="400" y="110" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#444">Symmetric Brand Asset Division</text>
  
  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#C0C0C0" stroke="#1a1a1a" stroke-width="1">CERTIFICATE OF TOTAL LAMINATION</text>
  
  <!-- Body -->
  <text x="400" y="260" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#666">This hereby certifies that the entity known as</text>
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold" fill="#1a1a1a">THE TILTED OPERATOR</text>
