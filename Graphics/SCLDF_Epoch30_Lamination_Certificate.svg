  <ellipse cx="400" cy="510" rx="5" ry="12" fill="#4b5320" />
  <text x="400" y="515" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white">SCLDF</text>
  
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="12" font-style="italic" fill="#888">"Eternity is now a Matter of Regulatory Compliance."</text>
