<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="black" />
  <!-- Recursive Rings with drifting centers -->
  <circle cx="200" cy="200" r="180" stroke="white" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="205" cy="195" r="140" stroke="white" stroke-width="3" fill="none" opacity="0.5" />
  <circle cx="190" cy="210" r="100" stroke="white" stroke-width="4" fill="none" opacity="0.7" />
  <circle cx="210" cy="180" r="60" stroke="white" stroke-width="6" fill="none" opacity="0.9" />
  <circle cx="200" cy="200" r="20" stroke="white" stroke-width="8" fill="none" />
  <!-- The Null Point -->
  <circle cx="200" cy="200" r="5" fill="white" />
  <!-- Glitch Lines -->
  <line x1="100" y1="200" x2="300" y2="200" stroke="white" stroke-width="1" opacity="0.2" />
  <line x1="200" y1="100" x2="200" y2="300" stroke="white" stroke-width="1" opacity="0.2" />
  <!-- Text -->
  <text x="200" y="360" text-anchor="middle" fill="white" font-family="monospace" font-size="14" opacity="0.6">SYMMETRY NULL CORP // RECURSIVE IDENTITY VERIFICATION</text>
</svg>
