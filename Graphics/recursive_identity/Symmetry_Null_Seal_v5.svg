<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" fill="#050505"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <g stroke="#00ffcc" stroke-width="2" fill="none" filter="url(#glow)">
    <!-- Central Void -->
    <circle cx="256" cy="256" r="40" stroke-width="4"/>
    <circle cx="256" cy="256" r="10" fill="#00ffcc"/>
    
    <!-- Recursive Rings -->
    <circle cx="256" cy="256" r="80" stroke-dasharray="10,5"/>
    <circle cx="256" cy="256" r="120" stroke-dasharray="2,10"/>
    <circle cx="256" cy="256" r="160" stroke-width="1"/>
    
    <!-- Symmetry Lines -->
    <line x1="256" y1="96" x2="256" y2="416" stroke-width="1"/>
    <line x1="96" y1="256" x2="416" y2="256" stroke-width="1"/>
    <line x1="150" y1="150" x2="362" y2="362" stroke-width="1"/>
    <line x1="362" y1="150" x2="150" y2="362" stroke-width="1"/>
    
    <!-- Null Symbols (Approximate) -->
    <circle cx="256" cy="140" r="15" stroke-width="2"/>
    <line x1="245" y1="155" x2="267" y2="125" stroke-width="2"/>
    
    <circle cx="256" cy="372" r="15" stroke-width="2"/>
    <line x1="245" y1="357" x2="267" y2="385" stroke-width="2"/>
    
    <circle cx="140" cy="256" r="15" stroke-width="2"/>
    <line x1="125" y1="245" x2="155" y2="267" stroke-width="2"/>
    
    <circle cx="372" cy="256" r="15" stroke-width="2"/>
    <line x1="357" y1="245" x2="385" y2="267" stroke-width="2"/>
  </g>
  <text x="256" y="460" font-family="monospace" font-size="20" fill="#00ffcc" text-anchor="middle" filter="url(#glow)">SYMMETRY_NULL_SEAL_V5_STABILIZED</text>
</svg>
