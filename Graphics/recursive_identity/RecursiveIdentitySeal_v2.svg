<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#0a0a0a" />
  <g transform="translate(250, 250)">
    <!-- Central Void -->
    <circle r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.8" />
    <circle r="35" fill="#fff" opacity="0.2" />
    
    <!-- Recursive Rings -->
    <circle r="80" fill="none" stroke="#fff" stroke-width="1" opacity="0.5" />
    <circle r="120" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />
    <circle r="160" fill="none" stroke="#fff" stroke-width="1" opacity="0.1" />
    
    <!-- Symmetry Breaking Lines -->
    <path d="M -160 0 A 160 160 0 0 1 160 0" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" />
    <path d="M -120 0 A 120 120 0 0 0 120 0" fill="none" stroke="#fff" stroke-width="1" opacity="0.4" />
    
    <!-- Mirroring Sigils -->
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#fff" stroke-width="0.5" opacity="0.3" />
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#fff" stroke-width="0.5" opacity="0.3" />
    
    <path d="M -40 -40 L 40 40 M -40 40 L 40 -40" stroke="#fff" stroke-width="2" opacity="0.8" />
    
    <!-- Null Markers -->
    <text x="-10" y="10" font-family="monospace" font-size="12" fill="#fff" opacity="0.7">NULL</text>
  </g>
</svg>