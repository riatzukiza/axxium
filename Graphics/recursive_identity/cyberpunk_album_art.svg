<svg width="500" height="500" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#050505"/>
  <defs>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="250" cy="250" r="150" stroke="url(#grad)" stroke-width="5" fill="none" filter="url(#neon)" opacity="0.6"/>
  <circle cx="250" cy="250" r="120" stroke="#ff00ff" stroke-width="2" fill="none" filter="url(#neon)" opacity="0.4"/>
  <path d="M100 100 L400 400 M400 100 L100 400" stroke="#00ffff" stroke-width="1" filter="url(#neon)" opacity="0.3"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="40" fill="#fff" filter="url(#neon)">
    DISCORD.SEND
  </text>
  <text x="50%" y="60%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-size="12" fill="#00ffff" opacity="0.8">
    (defn discord-send-execute [runtime config ...])
  </text>
  <rect x="20" y="20" width="460" height="460" stroke="#ff00ff" stroke-width="1" fill="none" opacity="0.2"/>
</svg>
