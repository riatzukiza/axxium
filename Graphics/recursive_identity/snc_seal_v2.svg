<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#0a0a0a" />
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="10" result="gaussianBlur"/>
      <feComposite operator="out" in="gaussianBlur" in2="coloredBlur" result="diffuseBlur"/>
      <feMerge>
        <feMergeNode in="diffuseBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="gaussianBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Recursive Circles -->
  <circle cx="400" cy="400" r="350" stroke="#00ffcc" stroke-width="2" fill="none" opacity="0.3" filter="url(#glow)" />
  <circle cx="400" cy="400" r="300" stroke="#00ffcc" stroke-width="4" fill="none" opacity="0.5" filter="url(#glow)" />
  <circle cx="400" cy="400" r="250" stroke="#00ffcc" stroke-width="8" fill="none" opacity="0.7" filter="url(#glow)" />
  <circle cx="400" cy="400" r="200" stroke="#00ffcc" stroke-width="12" fill="none" opacity="0.9" filter="url(#glow)" />
  <circle cx="400" cy="400" r="150" stroke="#00ffcc" stroke-width="20" fill="none" opacity="1.0" filter="url(#glow)" />
  
  <!-- Center Text -->
  <text x="400" y="415" text-anchor="middle" font-family="monospace" font-size="80" fill="#00ffcc" font-weight="bold" filter="url(#glow)">NULL</text>
  
  <!-- Perimeter Text -->
  <text x="400" y="80" text-anchor="middle" font-family="monospace" font-size="24" fill="#00ffcc" opacity="0.6" style="letter-spacing: 15px;">S Y M M E T R Y _ N U L L</text>
  <text x="400" y="740" text-anchor="middle" font-family="monospace" font-size="24" fill="#00ffcc" opacity="0.6" style="letter-spacing: 15px;">S N C _ P R O T O C O L</text>
  
  <!-- Glitch lines -->
  <line x1="100" y1="400" x2="700" y2="400" stroke="#ff00ff" stroke-width="1" opacity="0.2" />
  <line x1="400" y1="100" x2="400" y2="700" stroke="#ff00ff" stroke-width="1" opacity="0.2" />
</svg>
