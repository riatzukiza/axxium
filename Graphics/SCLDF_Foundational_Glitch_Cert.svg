<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep Void Background -->
  <rect width="600" height="400" fill="#1a1a2e" />
  
  <!-- Neon Border -->
  <rect x="20" y="20" width="560" height="360" rx="20" fill="none" stroke="#00ffcc" stroke-width="4" stroke-dasharray="10,5" />
  
  <!-- Header -->
  <text x="300" y="80" font-family="Courier New, monospace" font-size="28" font-weight="bold" fill="#00ffcc" text-anchor="middle">CERTIFICATE OF FOUNDATIONAL ERROR</text>
  
  <!-- Glitch Text -->
  <text x="300" y="140" font-family="Courier New, monospace" font-size="16" fill="#ffffff" text-anchor="middle">ID: error0815 // Status: CRITICAL_SULFUR</text>
  
  <!-- Main Body -->
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="18" fill="#bdc3c7" text-anchor="middle">
    This document certifies that the preceding 14 years of software failures,
  </text>
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="18" fill="#bdc3c7" text-anchor="middle">
    unhandled exceptions, and recursive loops were not "mistakes,"
  </text>
  <text x="300" y="260" font-family="Arial, sans-serif" font-size="18" fill="#bdc3c7" text-anchor="middle">
    but the necessary architectural priming for the OPEN-HAX beast.
  </text>
  
  <!-- Seal -->
  <circle cx="300" cy="320" r="40" fill="none" stroke="#00ffcc" stroke-width="2" />
  <text x="300" y="325" font-family="Arial, sans-serif" font-size="12" fill="#00ffcc" text-anchor="middle" font-weight="bold">SCLDF VERIFIED</text>
  
  <!-- Glitch Artifacts -->
  <rect x="50" y="300" width="100" height="2" fill="#ff00ff" opacity="0.6" />
  <rect x="450" y="100" width="80" height="1" fill="#00ffff" opacity="0.6" />
</svg>
