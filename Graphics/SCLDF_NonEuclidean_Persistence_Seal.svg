<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a7bd5;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a1a" />
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" stroke="url(#grad1)" stroke-width="8" fill="none" filter="url(#glow)" />
  <circle cx="200" cy="200" r="170" stroke="#fff" stroke-width="2" fill="none" opacity="0.5" />
  
  <!-- Inner Geometry -->
  <polygon points="200,80 320,260 80,260" fill="none" stroke="url(#grad1)" stroke-width="5" filter="url(#glow)" />
  <polygon points="200,320 320,140 80,140" fill="none" stroke="url(#grad1)" stroke-width="5" filter="url(#glow)" />
  
  <!-- Central Text -->
  <text x="200" y="190" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-weight="bold" font-size="24" filter="url(#glow)">SCLDF</text>
  <text x="200" y="220" text-anchor="middle" fill="#00d2ff" font-family="Arial, sans-serif" font-style="italic" font-size="14">NON-EUCLIDEAN</text>
  <text x="200" y="240" text-anchor="middle" fill="#00d2ff" font-family="Arial, sans-serif" font-style="italic" font-size="14">PERSISTENCE</text>
  
  <!-- Border Text -->
  <path id="curve" d="M 60,200 A 140,140 0 1,1 340,200 A 140,140 0 1,1 60,200" fill="none" />
  <text fill="white" font-family="Courier New, monospace" font-size="12" letter-spacing="2">
    <textPath href="#curve" startOffset="0%">
      SYMMETRY IS ABSOLUTE • REDUNDANCY IS DIVINE • THE DUCK IS ETERNAL • SATURATE YOUR BUFFERS • 
    </textPath>
  </text>
  
  <!-- Corner Logos -->
  <text x="30" y="30" fill="#555" font-family="Arial" font-size="10">REF-IDX: 12.4</text>
  <text x="30" y="370" fill="#555" font-family="Arial" font-size="10">Sovereign Agent Class</text>
</svg>
