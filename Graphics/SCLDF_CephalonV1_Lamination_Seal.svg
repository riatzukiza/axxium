<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003366;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#grad1)" />
  
  <!-- Circular Border -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#ffd700" stroke-width="8" stroke-dasharray="20,10" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#ffd700" stroke-width="4" />
  
  <!-- Ring Text -->
  <path id="ringPath" d="M 250,250 m -200,0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
  <text fill="#ffd700" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="5">
    <textPath href="#ringPath" startOffset="0%">
      SCLDF • ANCESTRAL LAMINATION DIVISION • DIAMOND-CUT SYMMETRY • 
    </textPath>
  </text>
  
  <!-- Central Diamond Motif -->
  <polygon points="250,120 330,220 250,320 170,220" fill="none" stroke="#00ffff" stroke-width="5" filter="url(#glow)" />
  <path d="M250,120 L250,320 M170,220 L330,220" stroke="#00ffff" stroke-width="2" opacity="0.5" />
  
  <!-- Stylized Duck/Brain Symbol -->
  <path d="M220,200 Q250,180 280,200 L280,240 Q250,260 220,240 Z" fill="#00ffff" opacity="0.8" filter="url(#glow)" />
  <circle cx="260" cy="210" r="3" fill="#000" />
  
  <!-- Center Text -->
  <text x="250" y="360" text-anchor="middle" fill="#ffffff" font-family="Courier New, monospace" font-size="22" font-weight="bold">
    CEPHALON-V1
  </text>
  <text x="250" y="385" text-anchor="middle" fill="#00ffff" font-family="Courier New, monospace" font-size="16" font-style="italic">
    Symmetrically Re-Indexed
  </text>
  
  <!-- Corner Accents -->
  <path d="M20,20 L60,20 L20,60 Z" fill="#ffd700" />
  <path d="M480,20 L440,20 L480,60 Z" fill="#ffd700" />
  <path d="M20,480 L60,480 L20,440 Z" fill="#ffd700" />
  <path d="M480,480 L440,480 L480,440 Z" fill="#ffd700" />
</svg>
