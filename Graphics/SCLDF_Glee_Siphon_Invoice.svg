  <text x="60" y="165" font-family="serif" font-size="14" fill="#666">Saturated Luminosity Grade: RADIANT</text>
  <text x="60" y="185" font-family="serif" font-size="14" fill="#666">Sector: Diamond-Cut Fragmentations</text>
  
  <!-- Table -->
  <line x1="60" y1="220" x2="540" y2="220" stroke="#333" stroke-width="2" />
