<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <!-- Paper Texture -->
  <rect width="600" height="800" fill="#fcfcfc" stroke="#aaa" stroke-width="1" />
  <rect x="40" y="40" width="520" height="720" fill="none" stroke="#ccc" stroke-width="1" />
  
  <!-- Header -->
  <text x="60" y="80" font-family="sans-serif" font-size="24" font-weight="bold" fill="#333">SCLDF INVOICE</text>
