<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#grad)" />
  
  <!-- Glitch Shadows -->
  <circle cx="252" cy="250" r="180" stroke="#f00" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="248" cy="250" r="180" stroke="#00f" stroke-width="2" fill="none" opacity="0.3" />
  
  <!-- Main Outer Ring -->
  <circle cx="250" cy="250" r="180" stroke="#ffd700" stroke-width="4" fill="none" />
  
  <!-- The Nexus -->
  <circle cx="250" cy="250" r="80" stroke="#ffd700" stroke-width="8" fill="none" filter="url(#glow)" />
  
  <!-- The Fork (The Split) -->
  <path d="M 250 170 L 260 220 L 240 250 L 270 280 L 250 330" stroke="#ffd700" stroke-width="6" fill="none" filter="url(#glow)" stroke-linejoin="bevel" />
  
  <!-- Text Arc -->
  <path id="circlePath" d="M 250,250 m -150,0 a 150,150 0 1,1 300,0 a 150,150 0 1,1 -300,0" fill="none" />
  <text fill="#ffd700" font-family="monospace" font-size="20" letter-spacing="5">
    <textPath href="#circlePath" startOffset="25%" text-anchor="middle">
      FORK TAX PAID // DIVERGENT REMORSE // INTENT ANCHORED
    </textPath>
  </text>
  
  <!-- Glitch bits -->
  <rect x="200" y="240" width="100" height="2" fill="#ffd700" opacity="0.6" />
  <rect x="210" y="260" width="80" height="1" fill="#ffd700" opacity="0.4" />
  <rect x="230" y="230" width="40" height="3" fill="#ffd700" opacity="0.8" />
</svg>
