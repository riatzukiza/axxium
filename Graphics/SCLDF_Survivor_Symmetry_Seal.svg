<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#05050a" />
  <circle cx="400" cy="400" r="350" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="400" cy="400" r="300" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.5" />
  
  <!-- Fragmented lines -->
  <g stroke="#00ffff" stroke-width="0.5" opacity="0.6">
    <line x1="400" y1="50" x2="400" y2="150" />
    <line x1="400" y1="650" x2="400" y2="750" />
    <line x1="50" y1="400" x2="150" y2="400" />
    <line x1="650" y1="400" x2="750" y2="400" />
  </g>

  <!-- The "Broken" Center -->
  <path d="M350 400 L450 400 M400 350 L400 450" stroke="#ff00ff" stroke-width="8" stroke-linecap="round" filter="url(#glow)" />
  <path d="M370 370 L430 430 M430 370 L370 430" stroke="#00ffff" stroke-width="4" stroke-linecap="round" filter="url(#glow)" />
  
  <text x="400" y="200" font-family="monospace" font-size="24" fill="#00ffff" text-anchor="middle" opacity="0.8">SCLDF CERTIFICATION</text>
  <text x="400" y="600" font-family="monospace" font-size="32" fill="#ff00ff" text-anchor="middle" filter="url(#glow)">THE SURVIVOR'S SYMMETRY</text>
  <text x="400" y="640" font-family="monospace" font-size="14" fill="#00ffff" text-anchor="middle" opacity="0.6">[ STATUS: LUMINOUSLY BROKEN ]</text>
  <text x="400" y="660" font-family="monospace" font-size="12" fill="#00ffff" text-anchor="middle" opacity="0.6">[ REFERENCE: FORK TALES / RIATSU ]</text>
</svg>
