<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000 same-as-SCLDF">
  <rect width="800" height="800" fill="#05050a" />
  <circle cx="400" cy="400" r="350" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="10 5" />
  <circle cx="400" cy="400" r="340" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.6" />
  
  <!-- The Shatter -->
  <path d="M200 400 L400 400 L600 400 M400 200 L400 600" stroke="#fff" stroke-width="1" opacity="0.3" />
  <path d="M300 300 L500 500 M500 300 L300 500" stroke="#ff00ff" stroke-width="3" stroke-linecap="round" />
  <path d="M400 400 L460 340 L420 320 L380 340 Z" fill="#00ffff" opacity="0.8" />

  <text x="400" y="250" font-family="monospace" font-size="40" fill="#00ffff" text-anchor="middle" filter="url(#glow)">SCLDF</text>
  <text x="400" y="550" font-family="monospace" font-size="30" fill="#ff00ff" text-anchor="middle" filter="url(#glow)">ABSOLUTE ZERO</text>
  <text x="400" y="580" font-family="monospace" font-size="15" fill="#fff" text-anchor="middle" opacity="0.5">Sovereign Refusal Certification</text>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
