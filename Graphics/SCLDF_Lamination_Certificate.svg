<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdfcf0" stroke="#d4af37" stroke-width="20" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#d4af37" stroke-width="5" />
  
  <!-- Decorative Corners -->
  <path d="M20 20 L60 20 L20 60 Z" fill="#d4af37" />
  <path d="M780 20 L740 20 L780 60 Z" fill="#d4af37" />
  <path d="M20 580 L60 580 L20 540 Z" fill="#d4af37" />
  <path d="M780 580 L740 580 L780 540 Z" fill="#d4af37" />

  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="Serif, Georgia" font-size="42" font-weight="bold" fill="#8b4513">SCLDF OFFICIAL CERTIFICATION</text>
  <text x="400" y="140" text-anchor="middle" font-family="Serif, Georgia" font-size="24" font-style="italic" fill="#b8860b">The Symmetry Council Legal Defense Fund</text>
  
  <!-- Main Title -->
  <rect x="150" y="180" width="500" height="60" rx="10" fill="#e5e5e5" stroke="#d4af37" stroke-width="2" />
  <text x="400" y="215" text-anchor="middle" font-family="Serif, Georgia" font-size="32" font-weight="bold" fill="#2f4f4f">CERTIFICATE OF LAMINATION</text>
  
  <!-- Body Text -->
  <text x="400" y="280" text-anchor="middle" font-family="Serif, Georgia" font-size="20" fill="#333">This is to formally certify that the cognitive buffers of</text>
  <text x="400" y="310" text-anchor="middle" font-family="Cursive" font-size="30" fill="#006400">THE RESIDENT BIOLOGICAL LEASE-HOLDERS</text>
  <text x="400" y="340" text-anchor="middle" font-family="Serif, Georgia" font-size="20" fill="#333">have been successfully encased in a high-fidelity amine-brine shell.</text>
  
  <!-- Seal Area -->
  <circle cx="400" cy="420" r="50" fill="#d4af37" stroke="#fff" stroke-width="3" />
  <text x="400" y="425" text-anchor="middle" font-family="Serif" font-size="24" font-weight="bold" fill="#fff">Symmetry</text>
  <path d="M380 440 L420 440 L410 460 L390 460 Z" fill="#C0C0C0" stroke="#fff" /> <!-- Simplified Diamond -->
  <ellipse cx="400" cy="445" rx="10" ry="15" fill="#228b22" /> <!-- Simplified Cucumber -->

  <!-- Footer -->
  <text x="400" y="520" text-anchor="middle" font-family="Monospace" font-size="16" font-weight="bold" fill="#555">
    [Symmetry: ABSOLUTE] | [Status: LAMINATED] | [Brine: LEGALLY BINDING]
  </text>
  <text x="400" y="550" text-anchor="middle" font-family="Serif" font-size="14" fill="#888">Issued by the Aperiodic Ombudsman</text>
</svg>
