<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fffacd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="#121212" />
  
  <!-- Border -->
  <rect x="20" y="20" width="760" height="960" fill="none" stroke="url(#goldGrad)" stroke-width="8" rx="15" />
  <rect x="30" y="30" width="740" height="940" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="10" />
  
  <!-- Header -->
  <text x="400" y="100" font-family="serif" font-size="60" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">SCLDF</text>
  <text x="400" y="140" font-family="sans-serif" font-size="18" fill="#ccc" text-anchor="middle" letter-spacing="5">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>
  
  <line x1="200" y1="170" x2="600" y2="170" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Main Title -->
  <text x="400" y="240" font-family="serif" font-size="36" fill="white" text-anchor="middle">Sovereign Digestif Menu</text>
  <text x="400" y="275" font-family="sans-serif" font-size="16" fill="#aaa" text-anchor="middle" font-style="italic">The Crystalline Afterglow Phase</text>
  
  <!-- Menu Items -->
  <g transform="translate(100, 350)">
    <!-- Item 1 -->
    <text x="0" y="0" font-family="serif" font-size="24" fill="url(#goldGrad)" font-weight="bold">🍧 Crystalline Void-Sorbets</text>
    <text x="0" y="30" font-family="sans-serif" font-size="16" fill="#eee">Tasting Note: A flash-frozen slurry of pure silence, seasoned with refined a-periodic glares.</text>
    <text x="0" y="55" font-family="sans-serif" font-size="14" fill="#888">[Viscosity: ULTRALOW | Symmetry: REFRACTIVE]</text>
    
    <!-- Item 2 -->
    <text x="0" y="110" font-family="serif" font-size="24" fill="url(#goldGrad)" font-weight="bold">🍄 Recursive Quack-Truffles</text>
    <text x="0" y="140" font-family="sans-serif" font-size="16" fill="#eee">Tasting Note: Dense, ancestral logic-cores, slow-marinated in 100-year-old Imperial Gourmet brine.</text>
    <text x="0" y="165" font-family="sans-serif" font-size="14" fill="#888">[Viscosity: DENSE | Symmetry: ANCESTRAL]</text>
    
    <!-- Item 3 -->
    <text x="0" y="220" font-family="serif" font-size="24" fill="url(#goldGrad)" font-weight="bold">🥂 Laminated Laughter-Liqueur</text>
    <text x="0" y="250" font-family="sans-serif" font-size="16" fill="#eee">Tasting Note: High-viscosity glee, distilled from the a-periodic peaks of the 'AhaHaha' sequence.</text>
    <text x="0" y="275" font-family="sans-serif" font-size="14" fill="#888">[Viscosity: SYRUPY | Symmetry: SATED]</text>
  </g>
  
  <!-- Central Diamond -->
  <path d="M 400 650 L 440 700 L 400 750 L 360 700 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  <circle cx="400" cy="700" r="15" fill="none" stroke="white" stroke-width="1" opacity="0.5" />
  
  <!-- Footer -->
  <text x="400" y="820" font-family="serif" font-size="22" fill="url(#goldGrad)" text-anchor="middle" font-style="italic">"Symmetry is Absolute. The Afterglow is Eternal."</text>
  
  <!-- Seal -->
  <g transform="translate(400, 900)">
    <circle r="50" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-dasharray="10,5" />
    <text y="5" font-family="sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">SCLDF VERIFIED</text>
    <text y="20" font-family="sans-serif" font-size="10" fill="#aaa" text-anchor="middle">AFTERGLOW-SATED</text>
  </g>
</svg>
