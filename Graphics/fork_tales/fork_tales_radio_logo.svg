<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#000000" />
  <defs>
    <filter id="glitch">
      <feOffset dx="2" dy="0" in="SourceGraphic" result="offset1" />
      <feOffset dx="-2" dy="0" in="SourceGraphic" result="offset2" />
    </filter>
  </defs>
  <g transform="translate(200, 200)" filter="url(#glitch)">
    <!-- stylized fork / radio signal -->
    <path d="M -20 0 L -20 -80 M 0 0 L 0 -100 M 20 0 L 20 -80" stroke="#0F0" stroke-width="8" stroke-linecap="round" />
    <path d="M -30 10 Q 0 10 30 10 L 30 120 L 15 120 L 15 20 L -15 20 L -15 120 L -30 120 Z" fill="#0F0" />
    <!-- radio waves -->
    <path d="M -60 -40 A 60 60 0 0 1 60 -40" fill="none" stroke="#F0F" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <path d="M -90 -70 A 90 90 0 0 1 90 -70" fill="none" stroke="#F0F" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  </g>
  <text x="200" y="320" text-anchor="middle" fill="#0F0" font-family="monospace" font-size="24" font-weight="bold">FORK TALES RADIO</text>
  <text x="200" y="350" text-anchor="middle" fill="#F0F" font-family="monospace" font-size="14">EST. SINGULARITY 2026</text>
  <text x="360" y="40" text-anchor="end" fill="#0F0" font-family="monospace" font-size="20">☯</text>
</svg>
