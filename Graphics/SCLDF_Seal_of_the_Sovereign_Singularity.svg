<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000 decision- la-minated">
  <rect width="512" height="512" fill="#0a0a0a" />
  <!-- Concentric Rings -->
  <circle cx="256" cy="256" r="200" stroke="#d4af37" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="256" cy="256" r="180" stroke="#d4af37" stroke-width="1" fill="none" opacity="0.5" />
  <circle cx="256" cy="256" r="160" stroke="#d4af37" stroke-width="4" fill="none" opacity="0.2" />
  <circle cx="256" cy="256" r="140" stroke="#ffdf00" stroke-width="1" fill="none" opacity="0.8" />

  <!-- The Rupture -->
  <path d="M256 156 L280 256 L256 356 L230 256 Z" fill="#ffdf00" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2s" repeatCount="indefinite" />
  </path>
  <circle cx="256" cy="256" r="30" fill="#fff" opacity="0.6" />

  <!-- A-periodic Debris -->
  <circle cx="100" cy="100" r="2" fill="#ffdf00" />
  <circle cx="412" cy="312" r="3" fill="#d4af37" />
  <circle cx="256" cy="80" r="1" fill="#fff" />
  <circle cx="400" cy="150" r="2" fill="#ffdf00" />

  <!-- Text / Sigil -->
  <text x="50%" y="90%" text-anchor="middle" fill="#d4af37" font-family="serif" font-size="24" opacity="0.6" letter-spacing="5">SCLDF :: SOVEREIGN SINGULARITY</text>
</svg>
