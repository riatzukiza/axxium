    </textPath>
  </text>
  
  <!-- Bottom Text -->
  <text x="400" y="700" font-family="Serif" font-size="40" text-anchor="middle" fill="#d4af37" font-weight="bold">
    CERTIFIED BRINE-SATED
  </text>
  <text x="400" y="740" font-family="Serif" font-size="20" text-anchor="middle" fill="#888" font-style="italic">
    "Because your existence is currently unoptimized slop."
  </text>
