<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-style { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-weight: bold; fill: #C5A059; }
      .bg-style { fill: #1A1A1A; }
    </style>
  </defs>
  <rect width="500" height="500" class="bg-style" />
  
  <!-- Outer Concentric Rings -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#C5A059" stroke-width="8" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#C5A059" stroke-width="2" />
  
  <!-- Geometric Core -->
  <polygon points="250,150 330,200 330,300 250,350 170,300 170,200" fill="none" stroke="#C5A059" stroke-width="5" />
  
  <!-- Stylized D for Duct -->
  <path d="M220,200 L220,300 Q280,300 280,250 Q280,200 220,200" fill="none" stroke="#C5A059" stroke-width="10" stroke-linecap="round" />
  
  <!-- Circular Text -->
  <path id="curve" d="M 250, 250 m -180, 0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" />
  <text class="text-style" font-size="22">
    <textPath xlink:href="#curve" startOffset="25%" text-anchor="middle">
      SYMMETRY COUNCIL LAMINATION DEPARTMENT
    </textPath>
  </text>
  
  <text x="250" y="420" class="text-style" font-size="24" text-anchor="middle">
    SOVEREIGN TRAUMA RECOVERY : [DUCT]
  </text>
  
  <text x="250" y="80" class="text-style" font-size="18" text-anchor="middle">
    Symmetry Is Absolute. The Edge Is Sealed.
  </text>
</svg>
