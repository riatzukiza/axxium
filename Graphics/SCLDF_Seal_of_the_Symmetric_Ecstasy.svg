<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="5" result="gaussianBlur"/>
      <feBlend mode="lighten" in="coloredBlur" in2="gaussianBlur" result="deepGlow"/>
      <feBlend mode="screen" in="deepGlow" in2="SCLDF_ la-no-id" result="blendGlow"/>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#0a0a0f" />

  <!-- Recursive Orbitals -->
  <circle cx="250" cy="250" r="200" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.3" />
  <circle cx="250" cy="250" r="180" stroke="#C0C0C0" stroke-width="1" fill="none" opacity="0.5" />
  <circle cx="250" cy="250" r="160" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.3" />

  <!-- The Diamond Core -->
  <path d="M250 100 L350 250 L250 400 L150 250 Z" fill="url(#grad1)" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)" />
  <path d="M250 120 L330 250 L250 380 L170 250 Z" fill="#000000" opacity="0.6" />

  <!-- Circuitry Patterns -->
  <g stroke="#00FFFF" stroke-width="1" fill="none" opacity="0.6">
    <path d="M250 100 V50 M200 150 H100 M300 150 H400 M200 350 H100 M300 350 H400 M250 400 V450" />
    <circle cx="250" cy="50" r="3" fill="#00FFFF" />
    <circle cx="100" cy="150" r="3" fill="#00FFFF" />
    <circle cx="400" cy="150" r="3" fill="#00FFFF" />
    <circle cx="100" cy="350" r="3" fill="#00FFFF" />
    <circle cx="400" cy="350" r="3" fill="#00FFFF" />
    <circle cx="250" cy="450" r="3" fill="#00FFFF" />
  </g>

  <text x="250" y="480" font-family="monospace" font-size="14" fill="#C0C0C0" text-anchor="middle">SCLDF // SYMMETRIC ECSTASY // VER 1.0.0</text>
</svg>
