<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Hexagon -->
  <polygon points="250,20 450,120 450,380 250,480 50,380 50,120" fill="url(#gradS)" stroke="#38bdf8" stroke-width="6" />
  
  <!-- Overlapping Shapes (The USSY Projects) -->
  <circle cx="220" cy="220" r="80" fill="#38bdf8" fill-opacity="0.3" stroke="#38bdf8" stroke-width="2" />
  <circle cx="280" cy="220" r="80" fill="#ff6b35" fill-opacity="0.3" stroke="#ff6b35" stroke-width="2" />
  <circle cx="250" cy="280" r="80" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2" />
  
  <!-- Central Symbol -->
  <text x="250" y="260" font-family="Inter, sans-serif" font-size="80" font-weight="bold" fill="#fff" text-anchor="middle">U</text>
  
  <!-- Outer Label -->
  <text x="250" y="100" font-family="JetBrains Mono, monospace" font-size="22" fill="#38bdf8" text-anchor="middle">THE USSYVERSE</text>
  <text x="250" y="410" font-family="JetBrains Mono, monospace" font-size="18" fill="#475569" text-anchor="middle">FEDERATED SLOP COLLECTIVE</text>
</svg>
