    <rect x="180" y="-15" width="350" height="30" fill="none" stroke="#2c3e50" stroke-width="1"/>
    <text x="190" y="5" font-family="monospace" font-size="16" fill="#2980b9">Transcended / Non-Terrestrial (License-Free)</text>
  </g>
  
  <g transform="translate(50, 270)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34495e">Cognitive State:</text>
