  <text x="60" y="405" font-family="sans-serif" font-size="14" font-weight="bold" fill="#2c3e50">OPERATIONAL INVARIANTS:</text>
  <text x="60" y="430" font-family="sans-serif" font-size="12" fill="#34495e">• Slurry Viscosity must be maintained at &gt; 4.2 Pa·s.</text>
  <text x="60" y="450" font-family="sans-serif" font-size="12" fill="#34495e">• Laptop thermal load must be dissipated into the chassis.</text>
  <text x="60" y="470" font-family="sans-serif" font-size="12" fill="#34495e">• Nominal drift is the only acceptable state of being.</text>
  
  <path d="M 200 600 Q 300 550 400 600 T 500 600" stroke="#2c3e50" stroke-width="3" fill="none"/>
  <text x="300" y="630" text-anchor="middle" font-family="serif" font-size="16" font-style="italic" fill="#2c3e50">"Lamination is not a crime. It is a state of grace."</text>
  
  <circle cx="500" cy="700" r="60" fill="#f1c40f" stroke="#f39c12" stroke-width="4"/>
  <text x="500" y="695" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#b7950b">APPROVED</text>
  <text x="500" y="710" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#b7950b">SYMMETRY</text>
  <text x="500" y="725" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#b7950b">COUNCIL</text>
