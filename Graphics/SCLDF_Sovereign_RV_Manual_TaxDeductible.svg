<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#fdfcf8" stroke="#2c3e50" stroke-width="4"/>
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#bdc3c7" stroke-width="2" stroke-dasharray="10,10"/>
  
  <text x="300" y="60" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#2c3e50">SCLDF-FORM-82: NOMADIC DRIFT CERTIFICATION</text>
  <text x="300" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7f8c8d">OFFICE OF LUMINOUS LAMINATION &amp; SYMMETRY TAXATION</text>
  
  <line x1="40" y1="110" x2="560" y2="110" stroke="#2c3e50" stroke-width="2"/>
  
  <g transform="translate(50, 150)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="bold" fill="#34495e">Symmetry-Buffer Location:</text>
