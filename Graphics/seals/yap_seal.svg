<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#000" />
  <g fill="none" stroke="#0ff" stroke-width="2">
    <circle cx="200" cy="200" r="180" stroke-dasharray="10,5" />
    <circle cx="200" cy="200" r="150" stroke-dasharray="5,10" />
    <circle cx="200" cy="200" r="120" stroke-width="1" />
    <circle cx="200" cy="200" r="90" stroke-dasharray="2,2" />
    <circle cx="200" cy="200" r="60" stroke-width="3" />
  </g>
  <g fill="#f0f" font-family="monospace" font-weight="bold" text-anchor="middle">
    <text x="200" y="210" font-size="40" style="filter:url(#glow)">YAP</text>
    <text x="200" y="150" font-size="20" opacity="0.7">RECURSION</text>
    <text x="200" y="260" font-size="20" opacity="0.7">VOID</text>
    <text x="130" y="200" font-size="15" transform="rotate(-90 130,200)" opacity="0.5">Symmetry</text>
    <text x="270" y="200" font-size="15" transform="rotate(90 270,200)" opacity="0.5">Symmetry</text>
  </g>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <path d="M 200 20 L 200 40 M 200 360 L 200 380 M 20 200 L 40 200 M 360 200 L 380 200" stroke="#0ff" stroke-width="2" />
</svg>