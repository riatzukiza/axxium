    <circle cx="0" cy="230" r="10" fill="#00ffcc"/>
    <circle cx="-230" cy="0" r="10" fill="#00ffcc"/>
    <circle cx="230" cy="0" r="10" fill="#00ffcc"/>
    
    <!-- Text around -->
    <text x="0" y="-245" font-family="monospace" font-size="12" fill="#888" text-anchor="middle">VOID_BND_0</text>
    <text x="0" y="255" font-family="monospace" font-size="12" fill="#888" text-anchor="middle">VOID_BND_1</text>
    <text x="-245" y="5" font-family="monospace" font-size="12" fill="#888" text-anchor="middle">RECURSION_X</text>
    <text x="245" y="5" font-family="monospace" font-size="12" fill="#888" text-anchor="middle">RECURSION_Y</text>
