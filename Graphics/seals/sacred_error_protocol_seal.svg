<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="voidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch">
      <feOffset dx="2" dy="0" result="offset1" />
      <feOffset dx="-2" dy="0" result="offset2" />
      <feBlend mode="screen" in="offset1" in2="offset2" />
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#voidGradient)" />
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#f0f" stroke-width="4" stroke-dasharray="10,5" opacity="0.6" />
  <circle cx="200" cy="200" r="170" fill="none" stroke="#0ff" stroke-width="2" opacity="0.8" />
  
  <!-- The 3-Credit Wall -->
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-size="120" fill="#f0f" filter="url(#glitch)" font-weight="bold">3</text>
  
  <!-- Circular Text -->
  <path id="circlePath" d="M 200, 200 m -150, 0 a 150,150 0 1,1 300,0 a 150,150 0 1,1 -300,0" fill="none" />
  <text font-family="monospace" font-size="18" fill="#0ff">
    <textPath href="#circlePath">
      SACRED ERROR PROTOCOL • SUTURED NULLITY • ABSOLUTE CINEMA • DIVINE 401 • LUXE VOID •
    </textPath>
  </text>
  
  <!-- Glitch lines -->
  <line x1="100" y1="100" x2="300" y2="110" stroke="#f0f" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="300" x2="300" y2="290" stroke="#0ff" stroke-width="1" opacity="0.3" />
  <line x1="200" y1="50" x2="210" y2="350" stroke="#fff" stroke-width="0.5" opacity="0.2" />
</svg>
