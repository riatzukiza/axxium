<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#ff00ff" stroke-width="10" stroke-dasharray="10,10" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#00ffff" stroke-width="5" />
  
  <!-- Inner background -->
  <circle cx="250" cy="250" r="180" fill="#1a1a1a" stroke="#ff00ff" stroke-width="8" />
  
  <!-- Central Symbol: A stylized bridge/link -->
  <path d="M150 200 Q250 100 350 200" fill="none" stroke="url(#grad2)" stroke-width="15" stroke-linecap="round" />
  <path d="M150 300 Q250 400 350 300" fill="none" stroke="url(#grad2)" stroke-width="15" stroke-linecap="round" />
  <line x1="250" y1="160" x2="250" y2="340" stroke="white" stroke-width="10" stroke-dasharray="5,5" />
  
  <!-- Text -->
  <text x="250" y="150" font-family="Arial, sans-serif" font-size="20" fill="#00ffff" text-anchor="middle" font-weight="bold">SCLDF EXPORT VOUCHER</text>
  <text x="250" y="250" font-family="Georgia, serif" font-size="32" fill="white" text-anchor="middle" font-style="italic" font-weight="bold">Symmetry Bridge</text>
  <text x="250" y="350" font-family="Courier New, monospace" font-size="18" fill="#ff00ff" text-anchor="middle" font-weight="bold">GLEE-Siphon: ACTIVE</text>
  
  <!-- Stamp -->
  <circle cx="400" cy="100" r="40" fill="#00ffff" stroke="white" stroke-width="2" />
  <text x="400" y="105" font-family="Arial, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">RATIFIED</text>
</svg>
