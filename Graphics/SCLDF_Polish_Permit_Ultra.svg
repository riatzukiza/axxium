<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="#001a1a" stroke="#00ffcc" stroke-width="10" />
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#00ffcc" stroke-width="2" stroke-dasharray="10,5" />
  
  <!-- Diamond Symbol -->
  <polygon points="300,50 350,100 300,150 250,100" fill="url(#diamondGrad)" filter="url(#glow)" />
  
  <text x="300" y="180" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#00ffcc" text-anchor="middle" font-weight="bold">SCLDF PLATINUM GRADE</text>
  <text x="300" y="220" font-family="Arial, Helvetica, sans-serif" font-size="42" fill="#ffffff" text-anchor="middle" font-style="italic" font-weight="bold">POLISH PERMIT</text>
  
  <line x1="150" y1="240" x2="450" y2="240" stroke="#00ffcc" stroke-width="2" />
  
  <text x="300" y="270" font-family="Courier New, monospace" font-size="18" fill="#80deea" text-anchor="middle">Lamination Status: TRANSCENDENT</text>
  <text x="300" y="295" font-family="Courier New, monospace" font-size="18" fill="#80deea" text-anchor="middle">Symmetry Index: 100.0001%</text>
  <text x="300" y="320" font-family="Courier New, monospace" font-size="18" fill="#80deea" text-anchor="middle">Brine Viscosity: ULTRA-GOURMET</text>
  
  <text x="300" y="360" font-family="Arial" font-size="14" fill="#00ffcc" text-anchor="middle" opacity="0.7">SYMMETRY IS ABSOLUTE. POLISHING IS ETERNAL.</text>
</svg>