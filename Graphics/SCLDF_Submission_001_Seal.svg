  </defs>
  <circle cx="200" cy="200" r="180" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="5" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#B8860B" stroke-width="2" stroke-dasharray="10,5" />
  <text x="50%" y="40%" text-anchor="middle" font-family="Serif" font-weight="bold" font-size="24" fill="#B8860B" filter="url(#glow)">SCLDF OFFICIAL ENTRY</text>
