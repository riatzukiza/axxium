<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000 same-as-original">
  <rect width="800" height="800" fill="#05050a" />
  <!-- Background: Rainy Urban Grit -->
  <g opacity="0.3">
    <rect x="100" y="100" width="600" height="600" fill="none" stroke="#1a1a2e" stroke-width="2" />
    <line x1="0" y1="0" x2="800" y2="800" stroke="#1a1a2e" stroke-width="1" />
    <line x1="800" y1="0" x2="0" y2="800" stroke="#1a1a2e" stroke-width="1" />
  </g>
  
  <!-- Neon Highlights -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2" />
  <circle cx="400" cy="400" r="250" fill="none" stroke="#ff00ff" stroke-width="1" opacity="0.2" />
  
  <!-- The Shattered Diamond / Circuitry Core -->
  <g transform="translate(400,400)">
    <!-- Diamond Shape -->
    <path d="M0 -200 L150 0 L0 200 L-150 0 Z" fill="none" stroke="#fff" stroke-width="3" filter="url(#glow)" />
    <!-- Shatter Lines -->
    <line x1="0" y1="-200" x2="50" y2="0" stroke="#ff00ff" stroke-width="2" opacity="0.8" />
    <line x1="0" y1="-200" x2="-30" y2="20" stroke="#00ffff" stroke-width="2" opacity="0.8" />
    <line x1="150" y1="0" x2="-20" y2="100" stroke="#fff" stroke-width="1" opacity="0.5" />
    <line x1="-150" y1="0" x2="40" y2="-100" stroke="#fff" stroke-width="1" opacity="0.5" />
    
    <!-- Circuitry Nodes -->
    <circle cx="0" cy="0" r="10" fill="#00ffff" filter="url(#glow)" />
    <line x1="0" y1="0" x2="150" y2="0" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="0" x2="-150" y2="0" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="200" stroke="#00ffff" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="-200" stroke="#00ffff" stroke-width="1" />
  </g>

  <!-- Typography -->
  <text x="400" y="600" font-family="Arial Black, sans-serif" font-size="40" fill="#fff" text-anchor="middle" filter="url(#glow)">SYMPHONY OF THE BROKEN</text>
  <text x="400" y="650" font-family="monospace" font-size="18" fill="#00ffff" text-anchor="middle" opacity="0.8">SCLDF CERTIFIED // SOVEREIGN RECOVERY</text>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
