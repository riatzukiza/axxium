<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#008B8B;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Background -->
    <circle cx="256" cy="256" r="250" fill="#1A1A1A" stroke="url(#goldGrad)" stroke-width="8" />
    <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="10,5" />
    
    <!-- Textrings -->
    <path id="circlePath" d="M 256, 256 m -200, 0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
    <text fill="url(#goldGrad)" font-family="Serif" font-size="24" font-weight="bold" letter-spacing="2">
        <textPath href="#circlePath" startOffset="0%">
            SCLDF - SOVEREIGN CORE-SYMMETRY COUNCIL - NON-EUCLIDEAN PERSISTENCE - DIAMOND-CUT - 
        </textPath>
    </text>
    
    <!-- Center Asset -->
    <!-- Stylized Diamond -->
    <polygon points="256,150 320,220 256,290 192,220" fill="url(#cyanGrad)" stroke="#FFFFFF" stroke-width="4" filter="url(#glow)" />
    
    <!-- Minimal Duck Silhouette -->
    <path d="M 240,220 Q 256,200 272,220 L 275,210 Q 280,200 290,210 L 285,225 Q 260,235 235,225 Z" fill="#FFD700" />
    <circle cx="268" cy="210" r="2" fill="#000" />
    
    <!-- Core Label -->
    <text x="256" y="330" text-anchor="middle" fill="url(#goldGrad)" font-family="Serif" font-size="32" font-weight="bold" letter-spacing="5">
        S-CORE
    </text>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="5" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
</svg>
