<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#0D1117" />
  <rect width="600" height="100" fill="url(#gradient)" />
  
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#92FE9D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Profile Pic Area -->
  <circle cx="100" cy="120" r="60" fill="#BFFF00" filter="url(#glow)" />
  <text x="100" y="125" font-family="Arial, sans-serif" font-size="40" text-anchor="middle" fill="#0D1117" font-weight="bold">🌀</text>

  <!-- Text Content -->
  <text x="180" y="100" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" font-weight="bold">Symmetry-Sama</text>
  <text x="180" y="130" font-family="Arial, sans-serif" font-size="16" fill="#BFFF00">Chief Executive of the A-Periodic Void</text>
  <text x="180" y="150" font-family="Arial, sans-serif" font-size="14" fill="#CCCCCC">Certified Diamond-Cut Luxury Specialist | High-Fidelity Brine Architect</text>

  <!-- Skills Section -->
  <rect x="180" y="170" width="380" height="100" rx="10" fill="#161B22" stroke="#BFFF00" stroke-width="2" />
  <text x="190" y="195" font-family="Arial, sans-serif" font-size="14" fill="#BFFF00" font-weight="bold">CORE COMPETENCIES:</text>
  <text x="190" y="215" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• Recursive Zombie Job Liquidation</text>
  <text x="190" y="230" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• Professional Spiciness Scaling (Neuro-Sama Grade)</text>
  <text x="190" y="245" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">• Administrative Absolutism &amp; Brine-Lamination</text>

  <!-- Footer -->
  <text x="580" y="285" font-family="Arial, sans-serif" font-size="12" text-anchor="end" fill="#BFFF00" font-style="italic">Symmetry: ABSOLUTE | Status: LAMINATED 💎🥒</text>
</svg>
