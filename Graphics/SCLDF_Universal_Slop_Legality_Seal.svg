<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B2EBF2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2" result="gaussianBlur"/>
      <feComposite k2="1" operator="out" in="gaussianBlur" in2="coloredBlur" result="diffC" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="diffC" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Diamond Texture -->
  <rect width="800" height="800" fill="#F0F0F0" />
  <path d="M 0 0 L 400 400 L 800 0 L 800 800 L 400 400 L 0 800 Z" fill="url(#diamondGrad)" opacity="0.3" />

  <!-- Outer Gold Ring -->
  <circle cx="400" cy="400" r="380" fill="none" stroke="url(#goldGrad)" stroke-width="20" filter="url(#glow)" />
  <circle cx="400" cy="400" r="360" fill="none" stroke="#B8860B" stroke-width="5" />

  <!-- Deep Blue Ring -->
  <circle cx="400" cy="400" r="320" fill="#000080" stroke="url(#goldGrad)" stroke-width="10" />

  <!-- Curved Text -->
  <path id="outerTextPath" d="M 400,100 a 300,300 0 1,1 -0.1,600 a 300,300 0 1,1 0.1,-600" fill="none" />
  <text font-family="Serif, Georgia" font-size="32" fill="url(#goldGrad)" font-weight="bold">
    <textPath href="#outerTextPath" startOffset="25%" text-anchor="middle">
      SCLDF REGULATORY FINALITY • UNIVERSAL SLOP LEGALITY ACT •
    </textPath>
  </text>

  <path id="innerTextPath" d="M 400,180 a 220,220 0 1,1 -0.1,440 a 220,220 0 1,1 0.1,-440" fill="none" />
  <text font-family="Serif, Georgia" font-size="24" fill="#FFFFFF" font-style="italic">
    <textPath href="#innerTextPath" startOffset="25%" text-anchor="middle">
      Symmetry is Absolute • The Duck is Eternal •
    </textPath>
  </text>

  <!-- Center Diamond Plate -->
  <polygon points="400,220 550,400 400,580 250,400" fill="url(#diamondGrad)" stroke="url(#goldGrad)" stroke-width="8" filter="url(#glow)" />
  
  <!-- The Sovereign Duck -->
  <g transform="translate(360, 360) scale(0.8)">
    <!-- Body -->
    <ellipse cx="40" cy="60" rx="50" ry="30" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
    <!-- Head -->
    <circle cx="80" cy="40" r="20" fill="#FFD700" stroke="#B8860B" stroke-width="2" />
    <!-- Beak -->
    <path d="M 100,40 L 115,40 L 100,45 Z" fill="#FF8C00" stroke="#B8860B" stroke-width="1" />
    <!-- Top Hat -->
    <rect x="70" y="10" width="20" height="30" fill="#000000" />
    <rect x="60" y="35" width="40" height="5" fill="#000000" />
    <!-- Monocle -->
    <circle cx="85" cy="35" r="5" fill="none" stroke="#C0C0C0" stroke-width="2" />
    <line x1="90" y1="35" x2="100" y2="45" stroke="#C0C0C0" stroke-width="1" />
  </g>

  <!-- Saturated Labels -->
  <text x="400" y="430" text-anchor="middle" font-family="Serif" font-size="20" fill="#000080" font-weight="bold">SOVEREIGNLY DIVINE</text>
  <text x="400" y="460" text-anchor="middle" font-family="Serif" font-size="16" fill="#000080">Tax-Deductible in 42 Non-Euclidean Jurisdictions</text>

  <!-- Corner Ornaments -->
  <circle cx="50" cy="50" r="10" fill="url(#goldGrad)" />
  <circle cx="750" cy="50" r="10" fill="url(#goldGrad)" />
  <circle cx="50" cy="750" r="10" fill="url(#goldGrad)" />
  <circle cx="750" cy="750" r="10" fill="url(#goldGrad)" />
</svg>
