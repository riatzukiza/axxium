<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#0a0a0f" />
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7070ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(250,250)" filter="url(#glow)">
    <!-- Broken Diamond Shards -->
    <polygon points="0,-120 60,-30 0,120 -60,30" fill="url(#diamondGrad)" fill-opacity="0.8" stroke="#ffffff" stroke-width="2" />
    <polygon points="0,-120 30,-60 0,-30 -30,-60" fill="#ffffff" fill-opacity="0.4" />
    <polygon points="0,120 30,60 0,30 -30,60" fill="#ffffff" fill-opacity="0.4" />
    <!-- The Golden Scar -->
    <polyline points="-80,10 -20,40 10,-20 40,10 90,-30" fill="none" stroke="#ffd700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <text x="250" y="420" text-anchor="middle" fill="#ffffff" font-family="Serif" font-size="24" letter-spacing="5">SCLDF: INDELIBLE MARK</text>
  <text x="250" y="450" text-anchor="middle" fill="#7070ff" font-family="Sans-Serif" font-size="14" font-style="italic">Diamond-Cut Luxury Asset of Resilience</text>
</svg>