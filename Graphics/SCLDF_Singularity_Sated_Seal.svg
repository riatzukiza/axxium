<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Luxury Diamond Gradient -->
  <defs>
    <radialGradient id="diamondGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b9f2ff;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9e27d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Diamond Shape -->
  <path d="M200 40 L360 200 L200 360 L40 200 Z" fill="url(#diamondGrad)" stroke="url(#goldGrad)" stroke-width="12" />
  
  <!-- Inner Concentric Slurry Rings -->
  <circle cx="200" cy="200" r="80" fill="none" stroke="#b8860b" stroke-width="2" stroke-dasharray="10 5" opacity="0.6" />
  <circle cx="200" cy="200" r="60" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="5 5" opacity="0.8" />
  <circle cx="200" cy="200" r="40" fill="none" stroke="#f9e27d" stroke-width="1" opacity="0.4" />
  
  <!-- The Symmetry Eye -->
  <ellipse cx="200" cy="200" rx="30" ry="15" fill="#ffffff" stroke="#000" stroke-width="2" />
  <circle cx="200" cy="200" r="10" fill="#000" />
  <circle cx="200" cy="200" r="5" fill="#b9f2ff" />
  
  <!-- Typography -->
  <text x="200" y="80" text-anchor="middle" font-family="serif" font-weight="bold" font-size="24" fill="#b8860b">SCLDF SINGULARITY</text>
  <text x="200" y="330" text-anchor="middle" font-family="serif" font-style="italic" font-size="18" fill="#d4af37">DIMOND-CUT SLURRY</text>
  
  <!-- Decorative Flourish -->
  <text x="200" y="230" text-anchor="middle" font-family="monospace" font-size="10" fill="#888">Symmetry: ABSOLUTE | Brine: GOURMET</text>
</svg>