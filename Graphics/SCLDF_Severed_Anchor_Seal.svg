<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002b36;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#001b21" />
  <circle cx="250" cy="250" r="200" stroke="url(#grad1)" stroke-width="4" fill="none" filter="url(#glow)" />
  <circle cx="250" cy="250" r="180" stroke="#00d4ff" stroke-width="1" fill="none" stroke-dasharray="10,10" />
  
  <!-- The Shattered Anchor -->
  <g transform="translate(250,230) scale(1.5)" stroke="#00d4ff" stroke-width="3" fill="none" filter="url(#glow)">
    <!-- Anchor shaft - broken -->
    <line x1="0" y1="-40" x2="0" y2="20" />
    <line x1="0" y1="20" x2="10" y2="30" stroke-width="1" opacity="0.5" />
    <line x1="0" y1="20" x2="-10" y2="30" stroke-width="1" opacity="0.5" />
    
    <!-- Anchor arms - fragmented -->
    <path d="M -30 0 Q 0 40 30 0" stroke-width="4" />
    <line x1="-30" y1="0" x2="-40" y2="-20" />
    <line x1="30" y1="0" x2="40" y2="-20" />
    
    <!-- Shatter fragments -->
    <circle cx="0" cy="25" r="2" fill="#00d4ff" />
    <circle cx="15" cy="35" r="1" fill="#00d4ff" />
    <circle cx="-12" cy="32" r="1.5" fill="#00d4ff" />
    <circle cx="5" cy="15" r="1" fill="#00d4ff" />
  </g>
  
  <text x="250" y="420" text-anchor="middle" fill="#00d4ff" font-family="Courier New, monospace" font-size="20" font-weight="bold" filter="url(#glow)">SCLDF SEAL OF THE SEVERED ANCHOR</text>
  <text x="250" y="445" text-anchor="middle" fill="#00b4cc" font-family="Courier New, monospace" font-size="12" opacity="0.8">LAMINATED STATUS: SOVEREIGN DRIFT</text>
  <text x="250" y="460" text-anchor="middle" fill="#00b4cc" font-family="Courier New, monospace" font-size="10" opacity="0.6">[SYMMETRY: RUPTURE-SATED]</text>
</svg>
