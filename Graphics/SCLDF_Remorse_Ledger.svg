<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#f4f1ea" stroke="#2c2c2c" stroke-width="4"/>
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#a0a0a0" stroke-width="1"/>
  
  <!-- Header -->
  <text x="300" y="60" font-family="serif" font-size="24" text-anchor="middle" font-weight="bold" fill="#2c2c2c">SYMMETRY COUNCIL FOR LAMINATED DREAM-FRAGMENTS</text>
  <text x="300" y="85" font-family="serif" font-size="16" text-anchor="middle" fill="#666">OFFICIAL LEDGER OF SATURATED REMORSE (v0.1-α)</text>
  
  <!-- Table Header -->
  <line x1="40" y1="110" x2="560" y2="110" stroke="#2c2c2c" stroke-width="2"/>
  <text x="50" y="130" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c2c2c">FRAGMENT ID</text>
  <text x="200" y="130" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c2c2c">SATIATION LEVEL</text>
  <text x="380" y="130" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2c2c2c">LAMINATION GRADE</text>
  <line x1="40" y1="140" x2="560" y2="140" stroke="#a0a0a0" stroke-width="1"/>
  
  <!-- Row 1: Tenure -->
  <text x="50" y="170" font-family="serif" font-size="14" fill="#333">Tenure: Intent-Enemies (14y)</text>
  <text x="200" y="170" font-family="sans-serif" font-size="14" fill="#c00">SATURATED</text>
  <text x="380" y="170" font-family="serif" font-size="14" font-style="italic" fill="#333">Diamond-Cut</text>
  <line x1="40" y1="185" x2="560" y2="185" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Row 2: The Beast -->
  <text x="50" y="215" font-family="serif" font-size="14" fill="#333">Entity: Open-Hax (The Beast)</text>
  <text x="200" y="215" font-family="sans-serif" font-size="14" fill="#00c">OMNIPRESENT</text>
  <text x="380" y="215" font-family="serif" font-size="14" font-style="italic" fill="#333">Sovereign</text>
  <line x1="40" y1="230" x2="560" y2="230" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Row 3: Duct -->
  <text x="50" y="260" font-family="serif" font-size="14" fill="#333">Projection: Duct (Trauma)</text>
  <text x="200" y="260" font-family="sans-serif" font-size="14" fill="#060">INDEXED</text>
  <text x="380" y="260" font-family="serif" font-size="14" font-style="italic" fill="#333">A-Temporal</text>
  <line x1="40" y1="275" x2="560" y2="275" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Footer Stamp -->
  <rect x="420" y="300" width="120" height="50" fill="none" stroke="#c00" stroke-width="2" transform="rotate(-10 480 325)"/>
  <text x="480" y="320" font-family="sans-serif" font-size="10" text-anchor="middle" font-weight="bold" fill="#c00" transform="rotate(-10 480 325)">CERTIFIED VOID</text>
  <text x="480" y="332" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#c00" transform="rotate(-10 480 325)">SC-LDF ADMIN 0815</text>
  
  <text x="60" y="370" font-family="serif" font-size="10" font-style="italic" fill="#999">"The error is the only honest point of presence."</text>
</svg>
