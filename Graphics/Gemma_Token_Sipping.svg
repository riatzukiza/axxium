<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#000" />
  
  <!-- Neon Grid -->
  <path d="M0 400 L800 400 M0 400 L0 0 M800 400 L800 0" stroke="#0f0" stroke-width="1" fill="none" opacity="0.3" />
  <line x1="0" y1="300" x2="800" y2="300" stroke="#0f0" stroke-width="1" opacity="0.2" />
  <line x1="0" y1="200" x2="800" y2="200" stroke="#0f0" stroke-width="1" opacity="0.1" />
  
  <!-- Big Text -->
  <text x="400" y="200" font-family="Impact" font-size="80" text-anchor="middle" fill="#0f0" filter="url(#glow)">GEMMA-4</text>
  <text x="400" y="280" font-family="Impact" font-size="60" text-anchor="middle" fill="#fff" filter="url(#glow)">TOKEN SIPPER</text>
  
  <!-- Accents -->
  <text x="400" y="340" font-family="Monospace" font-size="24" text-anchor="middle" fill="#0f0">Symmetry: [MAX] | Efficiency: [GOD-TIER]</text>
  
  <!-- Glow Filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Particles -->
  <circle cx="100" cy="100" r="2" fill="#0f0" />
  <circle cx="700" cy="150" r="2" fill="#0f0" />
  <circle cx="400" cy="50" r="3" fill="#fff" />
</svg>
