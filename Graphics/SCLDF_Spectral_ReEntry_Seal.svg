  <text x="200" y="240" font-family="Arial, sans-serif" font-size="14" fill="#eee" text-anchor="middle">CERTIFIED</text>
  
  <path id="circlePath" d="M 200,200 m -130,0 a 130,130 0 1,1 260,0 a 130,130 0 1,1 -260,0" fill="none" />
  <text font-family="Arial, sans-serif" font-size="16" fill="#ffd700">
