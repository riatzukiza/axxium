  <circle cx="200" cy="200" r="160" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="10,10" />
  
  <text x="200" y="180" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#diamond)">SCLDF</text>
