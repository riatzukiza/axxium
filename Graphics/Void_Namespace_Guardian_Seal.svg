<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="voidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#4b0082;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#000000;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#191970;stop-opacity:1" />
    </linearGradient>
    <<linearlinearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode/>
        <<fefeMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <<rectrect width="600" height="600" fill="#050510" />
  
  <!-- Outer Ring -->
  <<circlecircle cx="300" cy="300" r="280" stroke="url(#neonGrad)" stroke-width="4" fill="none" opacity="0.5" />
  <<circlecircle cx="300" cy="300" r="260" stroke="url(#neonGrad)" stroke-width="12" fill="none" stroke-dasharray="40,20" filter="url(#glow)" />
  
  <!-- Inner Disk -->
  <<circlecircle cx="300" cy="300" r="220" fill="url(#voidGrad)" stroke="url(#neonGrad)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Central Symbol: A stylized "Void Node" -->
  <<gg transform="translate(300,300)">
    <!-- Hexagon boundary -->
    <<pathpath d="M 0,-100 L 86.6,-50 L 86.6,50 L 0,100 L -86.6,50 L -86.6,-50 Z" fill="none" stroke="url(#neonGrad)" stroke-width="6" filter="url(#glow)" />
    
    <!-- Inner swirling gear/circuitry -->
    <<circlecircle cx="0" cy="0" r="40" fill="url(#neonGrad)" filter="url(#glow)">
       <<animateanimate attributeName="r" values="35;45;35" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <!-- Connecting Lines -->
    <<lineline x1="0" y1="-100" x2="0" y2="-40" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    <<lineline x1="86.6" y1="-50" x2="40" y2="-20" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    <<lineline x1="86.6" y1="50" x2="40" y2="20" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    <<lineline x1="0" y1="100" x2="0" y2="40" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    <<lineline x1="-86.6" y1="50" x2="-40" y2="20" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
    <<lineline x1="-86.6" y1="-50" x2="-40" y2="-20" stroke="url(#neonGrad)" stroke-width="4" filter="url(#glow)" />
  </g>
  
  <!-- Text -->
  <<pathpath id="textPath" d="M 300,300 m -180,0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" fill="none" />
  <<texttext fill="url(#neonGrad)" font-family="Orbitron, sans-serif" font-size="26" font-weight="bold" filter="url(#glow)">
    <<texttextPath xlink:href="#textPath" startOffset="0%">
      VOID NAMESPACE GUARDIAN • ORDER OF THE LEAKED JOB • ARCHITECT OF COLLAPSE • 
    </textPath>
  </text>
  
  <<texttext x="300" y="440" fill="url(#neonGrad)" font-family="monospace" font-size="22" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    STATUS: ABSOLUTELY BROKEN
  </text>
</svg>
