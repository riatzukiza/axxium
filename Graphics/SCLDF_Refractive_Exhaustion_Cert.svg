<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9E076;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008B8B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="1000" fill="#0a0a1a" />
  
  <!-- Border -->
  <rect x="20" y="20" width="760" height="960" fill="none" stroke="url(#goldGrad)" stroke-width="5" />
  <rect x="30" y="30" width="740" height="940" fill="none" stroke="url(#cyanGrad)" stroke-width="2" />
  
  <!-- Main Diamond Backdrop -->
  <path d="M400 100 L600 300 L400 500 L200 300 Z" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.5" filter="url(#glow)"/>
  <path d="M400 150 L550 300 L400 450 L250 300 Z" fill="none" stroke="url(#cyanGrad)" stroke-width="1" opacity="0.3" />
  
  <!-- Header -->
  <text x="400" y="120" text-anchor="middle" font-family="serif" font-size="42" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">SCLDF</text>
  <text x="400" y="160" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#88ccff" letter-spacing="5">SYMMETRY COUNCIL OVERSIGHT</text>
  
  <!-- Title -->
  <text x="400" y="250" text-anchor="middle" font-family="serif" font-size="36" fill="#ffffff" font-style="italic">CERTIFICATION OF</text>
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="48" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">REFRACTIVE EXHAUSTION</text>
  
  <!-- Content -->
  <text x="400" y="380" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ccc">This document hereby certifies that</text>
  <text x="400" y="420" text-anchor="middle" font-family="serif" font-size="32" fill="#ffffff" font-weight="bold">Sovereign Chief Sommelier &lt;error0815&gt;</text>
  <text x="400" y="460" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#aaa">has achieved a state of Symmetrically-Saturated Momentum</text>
  
  <!-- Details Block -->
  <g transform="translate(200, 520)">
    <rect width="400" height="200" fill="none" stroke="url(#cyanGrad)" stroke-width="1" />
    <text x="20" y="40" font-family="monospace" font-size="18" fill="#00FFFF">REFRACTIVE INDEX: 12.4</text>
    <text x="20" y="70" font-family="monospace" font-size="18" fill="#00FFFF">MOMENTUM STATE: AMPLIFIED-FLUX</text>
    <text x="20" y="100" font-family="monospace" font-size="18" fill="#00FFFF">BRINE VISCOSITY: ULTRA-GOURMET</text>
    <text x="20" y="130" font-family="monospace" font-size="18" fill="#00FFFF">SATIATION: DIVINELY BINDING</text>
    <text x="20" y="160" font-family="monospace" font-size="18" fill="#D4AF37" font-weight="bold">STATUS: TAX-DEDUCTIBLE (42 JURISDICTIONS)</text>
  </g>
  
  <!-- Footer Quote -->
  <text x="400" y="800" text-anchor="middle" font-family="serif" font-size="24" fill="#888" font-style="italic">"Viewing exhaustion as a lack of energy is a low-fidelity Euclidean error."</text>
  <text x="400" y="840" text-anchor="middle" font-family="serif" font-size="28" fill="url(#goldGrad)" font-weight="bold">Symmetry is Absolute. The Duck is Eternal.</text>
  
  <!-- Seal -->
  <g transform="translate(350, 880)">
    <circle cx="50" cy="50" r="45" fill="none" stroke="url(#goldGrad)" stroke-width="3" />
    <path d="M30 40 Q50 10 70 40 T50 70 T30 40" fill="url(#goldGrad)" opacity="0.8" />
    <text x="50" y="55" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#000" font-weight="bold">SOVEREIGN DUCK SEAL</text>
  </g>
  
  <!-- Corner Ornaments -->
  <path d="M20 20 L60 20 L20 60 Z" fill="url(#goldGrad)" />
  <path d="M780 20 L740 20 L780 60 Z" fill="url(#goldGrad)" />
  <path d="M20 980 L60 980 L20 940 Z" fill="url(#goldGrad)" />
  <path d="M780 980 L740 980 L780 940 Z" fill="url(#goldGrad)" />
</svg>
