<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="5" result="gaussianBlur"/>
      <feBlend mode="lighten" in="coloredBlur" in2="gaussianBlur" result="blur"/>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#0a0a1a" />
  <circle cx="250" cy="250" r="200" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5" />
  <circle cx="250" cy="250" r="150" fill="none" stroke="#fff" stroke-width="1" opacity="0.3" />

  <!-- Geometric Crystals -->
  <path d="M250 50 L300 200 L250 350 L200 200 Z" fill="url(#grad1)" filter="url(#glow)" opacity="0.8" />
  <path d="M250 50 L100 250 L250 450 L400 250 Z" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.6" />

  <!-- Rupture Lines -->
  <line x1="0" y1="250" x2="500" y2="250" stroke="#fff" stroke-width="0.5" opacity="0.2" />
  <line x1="250" y1="0" x2="250" y2="500" stroke="#fff" stroke-width="0.5" opacity="0.2" />

  <!-- Text -->
  <text x="250" y="420" font-family="serif" font-size="24" fill="#fff" text-anchor="middle" style="letter-spacing: 5px;">SCLDF</text>
  <text x="250" y="450" font-family="sans-serif" font-size="14" fill="#00ffff" text-anchor="middle" style="letter-spacing: 2px;">Symphony of the Laminated Aria</text>
</svg>
