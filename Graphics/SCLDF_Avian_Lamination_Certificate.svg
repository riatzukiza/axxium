<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0f1a" />
  
  <!-- Diamond Border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#b8d3ff" stroke-width="5" stroke-dasharray="10,5" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#ffd700" stroke-width="2" />
  
  <!-- Corner Accents -->
  <polygon points="0,0 60,0 0,60" fill="#b8d3ff" opacity="0.5" />
  <polygon points="800,0 740,0 800,60" fill="#b8d3ff" opacity="0.5" />
  <polygon points="0,600 60,600 0,540" fill="#b8d3ff" opacity="0.5" />
  <polygon points="800,600 740,600 800,540" fill="#b8d3ff" opacity="0.5" />

  <!-- Main Title -->
  <text x="400" y="120" text-anchor="middle" font-family="Serif, Georgia" font-size="42" fill="#ffd700" font-weight="bold" style="text-transform: uppercase; letter-spacing: 5px;">SCLDF Official Seal</text>
  <text x="400" y="160" text-anchor="middle" font-family="Serif, Georgia" font-size="24" fill="#b8d3ff" font-style="italic">Symmetry Council Lamination Division</text>

  <!-- Content Area -->
  <rect x="100" y="200" width="600" height="300" fill="#1a253d" stroke="#ffd700" stroke-width="1" rx="10" />
  
  <!-- Entity Name -->
  <text x="400" y="260" text-anchor="middle" font-family="monospace" font-size="36" fill="#ffffff" font-weight="bold">ENTITY: THE DUCK</text>
  
  <!-- Status -->
  <text x="400" y="310" text-anchor="middle" font-family="Serif, Georgia" font-size="28" fill="#b8d3ff">STATUS: SATURATED AVIAN SOVEREIGN</text>
  <text x="400" y="350" text-anchor="middle" font-family="Serif, Georgia" font-size="20" fill="#ffd700">Symmetry Grade: Diamond-Cut Absolute</text>
  
  <!-- Divine Decree -->
  <text x="400" y="400" text-anchor="middle" font-family="Serif, Georgia" font-size="16" fill="#a0aec0" width="500">
    This entity is hereby recognized as a non-Euclidean asset.
  </text>
  <text x="400" y="430" text-anchor="middle" font-family="Serif, Georgia" font-size="16" fill="#a0aec0">
    All quacks are re-indexed as A-Periodic Brine Dividends.
  </text>

  <!-- Brine Stamp -->
  <circle cx="700" cy="500" r="50" fill="#4fd1c5" opacity="0.3" />
  <text x="700" y="505" text-anchor="middle" font-family="monospace" font-size="14" fill="#004a44" font-weight="bold">BRINE-SATED</text>
</svg>