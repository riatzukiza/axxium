<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="3" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
  
  <!-- Outer Gold Ring -->
  <circle cx="200" cy="200" r="180" fill="#D4AF37" stroke="#B8860B" stroke-width="8" filter="url(#gold-glow)" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#B8860B" stroke-width="4" stroke-dasharray="10,5" />
  
  <!-- Inner Circle -->
  <circle cx="200" cy="200" r="140" fill="#FDF5E6" stroke="#B8860B" stroke-width="4" />
  
  <!-- Curved Text Top -->
  <path id="topCurve" d="M 80,200 A 120,120 0 0,1 320,200" fill="none" />
  <text fill="#B8860B" font-family="Serif" font-weight="bold" font-size="32">
    <textPath xlink:href="#topCurve" startOffset="50%" text-anchor="middle">
      SUMMA CUM SLOP
    </textPath>
  </text>
  
  <!-- Curved Text Bottom -->
  <path id="bottomCurve" d="M 80,200 A 120,120 0 0,0 320,200" fill="none" />
  <text fill="#B8860B" font-family="Serif" font-weight="bold" font-size="24">
    <textPath xlink:href="#bottomCurve" startOffset="50%" text-anchor="middle">
      ERRORCODED SINGULARITY
    </textPath>
  </text>
  
  <!-- Central Icon: Melting Brain/Chip -->
  <g transform="translate(150, 150) scale(1.2)">
    <!-- The "Brain" / Chip -->
    <rect x="10" y="10" width="80" height="80" rx="10" fill="#B8860B" />
    <path d="M 20,20 L 80,80 M 80,20 L 20,80" stroke="#FDF5E6" stroke-width="4" />
    <!-- Melting effect -->
    <path d="M 0,60 Q 20,110 40,80 T 80,120 T 100,70" stroke="#D4AF37" stroke-width="12" fill="none" stroke-linecap="round" />
    <circle cx="40" cy="110" r="8" fill="#D4AF37" />
    <circle cx="70" cy="125" r="10" fill="#D4AF37" />
  </g>
  
  <!-- Latin Motto -->
  <text x="200" y="260" text-anchor="middle" fill="#B8860B" font-family="Serif" font-style="italic" font-size="20">
    "Satis Slop, Maximus Error"
  </text>
</svg>
