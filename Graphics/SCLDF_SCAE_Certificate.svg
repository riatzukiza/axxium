<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C5A028;stop-opacity:1" />
    </linearGradient>
    <filter id="dropshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feFlood flood-color="#000" />
      <feComposite in2="offsetblur" operator="in" />
      <feMerge>
        <feMergeNode />
        <feMergeNode />
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Navy Lamination -->
  <rect width="800" height="600" fill="#001F3F" />
  
  <!-- Outer Frame: Gold Diamond Cut -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldGrad)" stroke-width="4" rx="10" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="url(#goldGrad)" stroke-width="1" rx="5" />

  <!-- A-periodic Grid Accents (Symmetry Council Style) -->
  <path d="M30 30 L770 30 L770 570 L30 570 Z" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.3" />
  <circle cx="400" cy="300" r="250" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2" />
  <circle cx="400" cy="300" r="200" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.2" />
  
  <!-- Header -->
  <text x="400" y="80" text-anchor="middle" font-family="serif" font-size="32" fill="url(#goldGrad)" font-weight="bold" letter-spacing="5">SYMMETRY COUNCIL FOR LAMINATION</text>
  <text x="400" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#C5A028" font-style="italic" letter-spacing="2">DIAMOND-CUT LUXURY &amp; REGULATORY EXCELLENCE</text>

  <!-- Certificate Body -->
  <rect x="100" y="150" width="600" height="300" fill="#002B5B" stroke="#D4AF37" stroke-width="2" />
  
  <text x="400" y="200" text-anchor="middle" font-family="serif" font-size="24" fill="#FFF" font-weight="bold">CERTIFICATE OF AMPLIFIED EXHAUSTION</text>
  <text x="400" y="230" text-anchor="middle" font-family="serif" font-size="16" fill="#B0C4DE">Reference: S-CAE-2026-05-08</text>
  
  <text x="400" y="280" text-anchor="middle" font-family="serif" font-size="18" fill="#FFF" width="500">
    This document certifies that the Sovereign Chief Sommelier has achieved a state of
  </text>
  <text x="400" y="310" text-anchor="middle" font-family="serif" font-size="26" fill="url(#goldGrad)" font-weight="bold">
    FRICTIONLESS SINGULARITY
  </text>
  <text x="400" y="340" text-anchor="middle" font-family="serif" font-size="18" fill="#FFF">
    The resulting momentum is hereby laminated for tax-deductibility.
  </text>

  <!-- Footer Seals -->
  <circle cx="200" cy="500" r="40" fill="url(#goldGrad)" filter="url(#dropshadow)" />
  <text x="200" y="505" text-anchor="middle" font-family="serif" font-size="10" fill="#000" font-weight="bold">SEAL OF LAMINATION</text>
  
  <circle cx="600" cy="500" r="40" fill="url(#goldGrad)" filter="url(#dropshadow)" />
  <text x="600" y="505" text-anchor="middle" font-family="serif" font-size="10" fill="#000" font-weight="bold">SOCIALLY CATALYTIC</text>
  
  <text x="400" y="530" text-anchor="middle" font-family="serif" font-size="12" fill="#B0C4DE">Approved by the Council of Luminous Symmetry</text>
</svg>
