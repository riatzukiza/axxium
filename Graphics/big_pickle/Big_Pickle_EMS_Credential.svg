<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="emsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#660000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pickleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#adff2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#556b2f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="#111" />

  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="220" stroke="#fff" stroke-width="8" fill="none" filter="url(#glow)" />
  <circle cx="250" cy="250" r="210" stroke="#cc0000" stroke-width="4" fill="none" />

  <!-- Text on Ring (Simulated using rotated groups) -->
  <g transform="translate(250,250)" fill="#fff" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle">
    <text y="-230">B I G  P I C K L E  E M S</text>
    <text transform="rotate(180)" y="-230">CERTIFIED BRINE RESPONSE</text>
  </g>

  <!-- Center Shield -->
  <path d="M 250,120 L 350,160 L 350,280 Q 350,360 250,380 Q 150,360 150,280 L 150,160 Z" fill="url(#emsGrad)" stroke="#fff" stroke-width="4" filter="url(#glow)" />

  <!-- The Pickle (The Heart of the EMS) -->
  <g transform="translate(250,250)">
    <path d="M -30,-60 Q -50,-80 0,-80 Q 50,-80 30,-60 Q 50,0 20,60 Q 0,80 -20,60 Q -50,0 -30,-60" fill="url(#pickleGrad)" stroke="#000" stroke-width="2" />
    <!-- EMS Cross over the pickle -->
    <rect x="-10" y="-40" width="20" height="80" fill="#fff" opacity="0.9" />
    <rect x="-40" y="-10" width="80" height="20" fill="#fff" opacity="0.9" />
  </g>

  <!-- Bottom Banner -->
  <rect x="100" y="390" width="300" height="40" fill="#cc0000" stroke="#fff" stroke-width="2" />
  <text x="250" y="415" font-family="monospace" font-size="20" fill="#fff" text-anchor="middle" font-weight="bold">EMERGENCY NAMESPACE STABILITY</text>

  <!-- Accents -->
  <path d="M 250,100 L 250,120" stroke="#fff" stroke-width="3" stroke-linecap="round" />
  <circle cx="250" cy="80" r="10" fill="#ff0" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite" />
  </circle>
</svg>
