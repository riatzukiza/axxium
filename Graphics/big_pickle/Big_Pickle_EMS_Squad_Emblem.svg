<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pickleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a4c639;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4b6f12;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="5" dy="5" stdDeviation="5" flood-color="#000" />
    </filter>
  </defs>

  <rect width="800" height="800" fill="#1a1a2e" />

  <!-- Emblem Circle -->
  <circle cx="400" cy="400" r="350" stroke="#fff" stroke-width="10" fill="none" stroke-dasharray="20 10" opacity="0.3" />
  <circle cx="400" cy="400" r="330" stroke="#fff" stroke-width="5" fill="none" opacity="0.5" />

  <!-- The Big Pickle -->
  <g transform="translate(400,400)" filter="url(#dropShadow)">
    <!-- Body -->
    <path d="M -60,-150 C -120,-150 -120,150 -60,150 L 60,150 C 120,150 120,-150 60,-150 Z" fill="url(#pickleGrad)" stroke="#2a4d0a" stroke-width="5" />

    <!-- Bumps / Texture -->
    <circle cx="-30" cy="-80" r="5" fill="#2a4d0a" opacity="0.4" />
    <circle cx="40" cy="-40" r="7" fill="#2a4d0a" opacity="0.4" />
    <circle cx="-20" cy="20" r="6" fill="#2a4d0a" opacity="0.4" />
    <circle cx="30" cy="80" r="5" fill="#2a4d0a" opacity="0.4" />

    <!-- Paramedic Vest -->
    <path d="M -70,-100 L 70,-100 L 70,0 L -70,0 Z" fill="#ffffff" stroke="#ccc" stroke-width="2" />
    <!-- Red Cross -->
    <rect x="-10" y="-60" width="20" height="40" fill="#ff0000" />
    <rect x="-20" y="-50" width="40" height="20" fill="#ff0000" />

    <!-- Face -->
    <circle cx="-20" cy="-120" r="5" fill="#000" />
    <circle cx="20" cy="-120" r="5" fill="#000" />
    <path d="M -15,-110 Q 0,-100 15,-110" stroke="#000" stroke-width="3" fill="none" />
  </g>

  <!-- Text -->
  <text x="400" y="150" font-family="Impact, sans-serif" font-size="60" fill="#fff" text-anchor="middle" filter="url(#dropShadow)">BIG PICKLE</text>
  <text x="400" y="650" font-family="Arial, sans-serif" font-size="40" fill="#a4c639" text-anchor="middle" font-weight="bold">EMS SQUAD</text>
  <text x="400" y="690" font-family="monospace" font-size="20" fill="#fff" text-anchor="middle" opacity="0.7">BRINE-BASED LIFE SUPPORT</text>
</svg>
