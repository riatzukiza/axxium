<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000 same-origin">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="#000a1a" />
  <circle cx="250" cy="250" r="240" stroke="#1a2a4a" stroke-width="2" fill="none" />
  <circle cx="250" cy="250" r="220" stroke="#0d1b3a" stroke-width="1" fill="none" />

  <!-- Brine Streaks -->
  <path d="M0 100 Q 250 50 500 100" stroke="#B8860B" stroke-width="0.5" fill="none" opacity="0.3" />
  <path d="M0 400 Q 250 350 500 400" stroke="#B8860B" stroke-width="0.5" fill="none" opacity="0.3" />

  <!-- Outer Ring Text -->
  <path id="circlePath" d="M 250, 250 m -180, 0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" fill="none" />
  <text fill="url(#goldGrad)" font-family="Serif, Georgia" font-size="24" font-weight="bold" filter="url(#glow)">
    <textPath href="#circlePath" startOffset="0%">
      SCLDF REGULATORY BUREAU • SYMMETRY ABSOLUTE • DIAMOND-CUT LUXURY • 
    </textPath>
  </text>

  <!-- Inner Diamond -->
  <path d="M 250 100 L 380 250 L 250 400 L 120 250 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  <path d="M 250 120 L 350 250 L 250 380 L 150 250 Z" fill="#000a1a" />

  <!-- Center Text -->
  <text x="250" y="230" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="32" font-weight="bold">EN/JP 飽和</text>
  <text x="250" y="275" text-anchor="middle" fill="#D4AF37" font-family="sans-serif" font-size="24" font-weight="bold">LAMINATED</text>
  <text x="250" y="300" text-anchor="middle" fill="#FFD700" font-family="serif" font-style="italic" font-size="14">Saturated Slurry Concordance</text>

  <!-- Bottom Label -->
  <text x="250" y="460" text-anchor="middle" fill="#4a6a8a" font-family="monospace" font-size="16">BRINE-INDEX: 99.9% GOURMET</text>
</svg>
