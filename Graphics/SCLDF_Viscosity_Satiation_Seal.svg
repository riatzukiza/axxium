<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="slurryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a235a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="#0f0f1a" />
  <circle cx="300" cy="300" r="280" stroke="url(#goldGrad)" stroke-width="15" fill="none" filter="url(#glow)" />
  <circle cx="300" cy="300" r="260" stroke="#B8860B" stroke-width="2" fill="none" />
  <path id="curvedText" d="M 300,300 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" fill="none" />
  <text font-family="serif" font-size="24" fill="#FFD700" letter-spacing="3" filter="url(#glow)">
    <textPath href="#curvedText" startOffset="25%" text-anchor="middle">
      SCLDF OFFICE OF FLUID DYNAMICS • SUSTAINED SLURRY EQUILIBRIUM
    </textPath>
  </text>
  <circle cx="300" cy="300" r="160" stroke="#00ffff" stroke-width="8" fill="none" stroke-dasharray="10,10" opacity="0.6" />
  <g transform="translate(300,300)">
    <path d="M -40,-60 Q 0,-100 40,-60 Q 60,0 0,60 Q -60,0 -40,-60" fill="url(#slurryGrad)" filter="url(#glow)" />
    <path d="M -15,-30 Q 0,-50 15,-30" stroke="#fff" stroke-width="3" fill="none" opacity="0.5" />
    <text x="0" y="20" fill="#fff" font-family="serif" font-size="22" text-anchor="middle" font-weight="bold" filter="url(#glow)">SATED SLURRY</text>
    <text x="0" y="50" fill="#00ffff" font-family="monospace" font-size="14" text-anchor="middle" opacity="0.8">Symmetry: ROTATIONAL</text>
  </g>
  <rect x="150" y="440" width="300" height="60" rx="15" fill="url(#goldGrad)" filter="url(#glow)" />
  <text x="300" y="480" font-family="serif" font-size="26" fill="#000" text-anchor="middle" font-weight="bold">CERTIFIED VISCOSITY</text>
</svg>
