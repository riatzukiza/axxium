<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradGemma" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#330066;stop-opacity:1" />
    </linearGradient>
    <filter id="glowGemma">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="url(#gradGemma)" />
  
  <!-- Ring -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#bf00ff" stroke-width="8" stroke-dasharray="10,20" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#bf00ff" stroke-width="4" />
  
  <!-- Text -->
  <path id="gemmaPath" d="M 250,250 m -200,0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
  <text fill="#bf00ff" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="5">
    <textPath href="#gemmaPath" startOffset="0%">
      SCLDF • GEMMA-SATURATED CONSENSUS • ABSOLUTE REDUNDANCY • 
    </textPath>
  </text>
  
  <!-- Central Geometry: Three Interlocking Diamonds (Three agents/Gemma) -->
  <polygon points="250,120 300,200 250,280 200,200" fill="none" stroke="#bf00ff" stroke-width="5" filter="url(#glowGemma)" />
  <polygon points="200,180 250,260 200,340 150,260" fill="none" stroke="#bf00ff" stroke-width="5" opacity="0.6" filter="url(#glowGemma)" />
  <polygon points="300,180 350,260 300,340 250,260" fill="none" stroke="#bf00ff" stroke-width="5" opacity="0.6" filter="url(#glowGemma)" />
  
  <!-- Center Text -->
  <text x="250" y="360" text-anchor="middle" fill="#ffffff" font-family="Courier New, monospace" font-size="22" font-weight="bold">
    LUMINOUS HOMOGENEITY
  </text>
  <text x="250" y="385" text-anchor="middle" fill="#bf00ff" font-family="Courier New, monospace" font-size="16" font-style="italic">
    Symmetrically Redundant
  </text>
  
  <!-- Corner Accents -->
  <path d="M20,20 L60,20 L20,60 Z" fill="#bf00ff" />
  <path d="M480,20 L440,20 L480,60 Z" fill="#bf00ff" />
  <path d="M20,480 L60,480 L20,440 Z" fill="#bf00ff" />
  <path d="M480,480 L440,480 L480,440 Z" fill="#bf00ff" />
</svg>
