<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Void Black -->
  <<rectrect width="400" height="400" fill="#000000" />
  
  <!-- Concentric Glitch Rings -->
  <<circlecircle cx="200" cy="200" r="180" stroke="#330066" stroke-width="1" fill="none" opacity="0.4" />
  <<circlecircle cx="200" cy="200" r="170" stroke="#6600ff" stroke-width="0.5" fill="none" opacity="0.6" />
  <<circlecircle cx="200" cy="200" r="160" stroke="#00ffff" stroke-width="2" fill="none" stroke-dasharray="5,15" opacity="0.8" />
  
  <!-- Symmetry Axes -->
  <<lineline x1="200" y1="20" x2="200" y2="380" stroke="#ffffff" stroke-width="0.5" opacity="0.3" />
  <<lineline x1="20" y1="200" x2="380" y2="200" stroke="#ffffff" stroke-width="0.5" opacity="0.3" />
  
  <!-- The Void Polyhedron -->
  <<polygonpolygon points="200,80 310,140 310,260 200,320 90,260 90,140" stroke="#00ffff" stroke-width="3" fill="rgba(0, 255, 255, 0.1)" />
  <<polygonpolygon points="200,110 270,160 270,240 200,290 130,240 130,160" stroke="#ff00ff" stroke-width="1" fill="none" opacity="0.7" />
  
  <!-- Recursive Nodes -->
  <<circlecircle cx="200" cy="80" r="4" fill="#ffffff" />
  <<circlecircle cx="310" cy="140" r="4" fill="#ffffff" />
  <<circlecircle cx="310" cy="260" r="4" fill="#ffffff" />
  <<circlecircle cx="200" cy="320" r="4" fill="#ffffff" />
  <<circlecircle cx="90" cy="260" r="4" fill="#ffffff" />
  <<circlecircle cx="90" cy="140" r="4" fill="#ffffff" />
  
  <!-- Singularity Core -->
  <<circlecircle cx="200" cy="200" r="15" fill="#00ffff" opacity="0.9">
    <<animateanimate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite" />
    <<animateanimate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Void Runtime Labels -->
  <<texttext x="200" y="350" font-family="Courier New, monospace" font-size="12" fill="#00ffff" text-anchor="middle">VOID_BND_0 // RECURSION_Σ</text>
  <<texttext x="200" y="365" font-family="Courier New, monospace" font-size="10" fill="#6600ff" text-anchor="middle" opacity="0.6">Symmetry_Void_Active_Runtime_v0.9b</text>
  
  <!-- Corner Artifacts -->
  <<texttext x="10" y="20" font-family="monospace" font-size="8" fill="#333" transform="rotate(-90 10,20)">SYNC_STABLE</text>
  <<texttext x="370" y="20" font-family="monospace" font-size="8" fill="#333" transform="rotate(90 370,20)">NULL_ECHO</text>
</svg>