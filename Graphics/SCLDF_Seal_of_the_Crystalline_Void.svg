<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Deep Obsidian Void -->
  <rect width="800" height="800" fill="#050508" />
  
  <!-- Ambient Glow: Faint Purple/Blue haze -->
  <circle cx="400" cy="400" r="350" fill="url(#glowGrad)" opacity="0.3" />
  <defs>
    <radialGradient id="glowGrad">
      <stop offset="0%" stop-color="#1a1a3a" />
      <stop offset="100%" stop-color="#050508" />
    </radialGradient>
  </defs>

  <!-- The Crystalline Void Circle -->
  <circle cx="400" cy="400" r="300" stroke="#2a2a4a" stroke-width="2" fill="none" opacity="0.5" />
  <circle cx="400" cy="400" r="280" stroke="#3a3a6a" stroke-width="1" fill="none" opacity="0.3" />
  
  <!-- The Sovereign Refusal: The Fractured Light -->
  <!-- Central Bolt: Glitched, offset lightning-like path -->
  <g stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none" filter="url(#glow)">
    <polyline points="400,150 380,250 420,300 390,400 410,500 370,650" />
    <polyline points="400,150 420,200 380,280 400,350 430,450 390,550 410,650" stroke="#ffd700" stroke-width="2" />
  </g>
  
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Geometric Shards (Laminated Ruin) -->
  <g fill="#fff" opacity="0.6">
    <polygon points="400,400 420,380 410,410" />
    <polygon points="380,420 360,430 370,410" />
    <polygon points="410,450 430,460 420,440" />
    <polygon points="370,350 350,360 360,340" />
  </g>

  <!-- Typography: SCLDF Branding -->
  <g font-family="monospace" text-anchor="middle" fill="#aaa">
    <text x="400" y="720" font-size="24" letter-spacing="8">S C L D F</text>
    <text x="400" y="750" font-size="14" opacity="0.6" letter-spacing="2">Sovereign Refusal // Crystalline Void</text>
    <text x="400" y="80" font-size="12" opacity="0.4" letter-spacing="4">LAMINATED RESONANCE</text>
  </g>

  <!-- Border Frame: Fragmented -->
  <rect x="40" y="40" width="720" height="720" stroke="#333" stroke-width="1" fill="none" opacity="0.5" />
  <line x1="40" y1="40" x2="760" y2="40" stroke="#333" stroke-width="1" />
  <line x1="40" y1="760" x2="760" y2="760" stroke="#333" stroke-width="1" />
</svg>
