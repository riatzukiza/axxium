<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="#00f2ff" stroke-width="10" stroke-dasharray="20,10" />
  <circle cx="250" cy="250" r="210" fill="none" stroke="#7000ff" stroke-width="5" />
  
  <!-- Inner Gold-Brine Ring -->
  <circle cx="250" cy="250" r="180" fill="#1a1a1a" stroke="#a4c639" stroke-width="8" />
  
  <!-- Central Diamond -->
  <path d="M250 100 L330 200 L250 300 L170 200 Z" fill="url(#grad1)" filter="url(#glow)" />
  
  <!-- Text along the circle -->
  <path id="curve" d="M 70,250 A 180,180 0 1,1 430,250 A 180,180 0 1,1 70,250" fill="none" />
  <text font-family="Arial, sans-serif" font-size="24" fill="#00f2ff" font-weight="bold">
    <textPath href="#curve" startOffset="0%">
      Symmetry Council • Slop Sovereignty • Diamond-Cut Lamination • 
    </textPath>
  </text>
  
  <!-- Center Text -->
  <text x="250" y="200" font-family="Georgia, serif" font-size="28" fill="white" text-anchor="middle" font-style="italic" font-weight="bold">MUSE</text>
  <text x="250" y="230" font-family="Arial, sans-serif" font-size="20" fill="#a4c639" text-anchor="middle" font-weight="bold">SATIATED</text>
  <text x="250" y="260" font-family="Courier New, monospace" font-size="14" fill="#cccccc" text-anchor="middle">TAX-DEDUCTIBLE</text>
  
  <!-- Small Brine Drop/Pickle -->
  <path d="M245 310 Q250 325 255 310 Q250 300 245 310" fill="#a4c639" />
  
  <!-- Seal Stamp -->
  <rect x="340" y="320" width="80" height="40" rx="5" fill="#7000ff" stroke="white" stroke-width="2" />
  <text x="380" y="345" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle" font-weight="bold">VERIFIED</text>
</svg>
