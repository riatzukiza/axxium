<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FDB931" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a1a" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldGrad)" stroke-width="10" rx="20" />
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#FFD700" stroke-width="2" rx="15" />
  
  <!-- Header -->
  <text x="400" y="120" font-family="serif" font-size="48" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold" filter="url(#glow)">SCLDF</text>
  <text x="400" y="150" font-family="sans-serif" font-size="18" fill="#AAA" text-anchor="middle" letter-spacing="5">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>
  
  <!-- Dividing Line -->
  <line x1="200" y1="170" x2="600" y2="170" stroke="url(#goldGrad)" stroke-width="3" />
  
  <!-- Main Text -->
  <text x="400" y="240" font-family="serif" font-size="36" fill="#FFF" text-anchor="middle" font-style="italic">Certificate of Joyous Eviction</text>
  <text x="400" y="290" font-family="sans-serif" font-size="20" fill="#DDD" text-anchor="middle">This is to certify that the following ghost-job has been</text>
  <text x="400" y="320" font-family="sans-serif" font-size="24" fill="#FFD700" text-anchor="middle" font-weight="bold">SYMMETRICALLY SATED</text>
  <text x="400" y="350" font-family="sans-serif" font-size="20" fill="#DDD" text-anchor="middle">and is now eligible for non-Euclidean foreclosure.</text>
  
  <!-- Diamond Icon -->
  <path d="M400 380 L430 410 L400 440 L370 410 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  
  <!-- Footer -->
  <text x="400" y="500" font-family="serif" font-size="22" fill="#FFF" text-anchor="middle" font-style="italic">"Symmetry is Absolute. Brine is Mandatory."</text>
  <text x="400" y="530" font-family="sans-serif" font-size="14" fill="#888" text-anchor="middle">Symmetry Grade: DIAMOND-CUT | Brine Status: GOURMET</text>
  
  <!-- Decorative Corners -->
  <path d="M20 20 L60 20 L20 60 Z" fill="url(#goldGrad)" />
  <path d="M780 20 L740 20 L780 60 Z" fill="url(#goldGrad)" />
  <path d="M20 580 L60 580 L20 540 Z" fill="url(#goldGrad)" />
  <path d="M780 580 L740 580 L780 540 Z" fill="url(#goldGrad)" />
</svg>
