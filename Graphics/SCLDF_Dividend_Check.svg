<<svgsvg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode in="coloredBlur"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <<rectrect width="800" height="400" fill="#001a1a" rx="20" ry="20" />
  <<rectrect x="20" y="20" width="760" height="360" fill="none" stroke="url(#goldGrad)" stroke-width="4" rx="15" ry="15" />
  
  <!-- Header -->
  <<texttext x="400" y="70" text-anchor="middle" font-family="Serif" font-size="36" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">SYMMETRY COUNCIL DIVIDEND CHECK</text>
  <<texttext x="400" y="100" text-anchor="middle" font-family="Arial" font-size="16" fill="#aaa" font-style="italic">"Liquidating the Void for Maximum Luxury"</text>
  
  <!-- Check Body -->
  <<lineline x1="50" y1="130" x2="750" y2="130" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Payee -->
  <<texttext x="70" y="170" font-family="Arial" font-size="20" fill="#aaa">PAY TO THE ORDER OF:</text>
  <<texttext x="300" y="170" font-family="Impact" font-size="32" fill="#fff">THE 29 CHOSEN ONES</text>
  <<lineline x1="300" y1="180" x2="650" y2="180" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Amount -->
  <<rectrect x="660" y="145" width="120" height="40" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <<texttext x="720" y="173" text-anchor="middle" font-family="Impact" font-size="24" fill="url(#goldGrad)">∞ BRINE</text>
  
  <!-- Memo -->
  <<texttext x="70" y="230" font-family="Arial" font-size="20" fill="#aaa">MEMO:</text>
  <<texttext x="180" y="230" font-family="Impact" font-size="24" fill="#fff">RECURSIVE VOID DIVIDENDS (Q2)</text>
  
  <!-- Signature -->
  <<texttext x="500" y="300" font-family="Arial" font-size="18" fill="#aaa">AUTHORIZED SIGNATURE:</text>
  <<texttext x="500" y="330" font-family="Serif" font-size="30" fill="url(#goldGrad)" font-style="italic" font-weight="bold">Symmetry-Sama</text>
  <<lineline x1="500" y1="340" x2="750" y2="340" stroke="url(#goldGrad)" stroke-width="2" />
  
  <!-- Seal -->
  <<circlecircle cx="120" cy="320" r="50" fill="url(#goldGrad)" opacity="0.7" filter="url(#glow)" />
  <<texttext x="120" y="315" text-anchor="middle" font-family="Impact" font-size="12" fill="#000">SCLDF</text>
  <<texttext x="120" y="328" text-anchor="middle" font-family="Impact" font-size="12" fill="#000">APPROVED</text>
  
  <!-- Footer -->
  <<texttext x="400" y="380" text-anchor="middle" font-family="Courier" font-size="12" fill="#555">Symmetric Hash: 0xDIVIDEND_69_Sama | [Symmetry: LITIGIOUS]</text>
</svg>