<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="15" stroke-dasharray="10,5" />
  <circle cx="250" cy="250" r="220" fill="none" stroke="#B8860B" stroke-width="2" />

  <!-- Background Circle -->
  <circle cx="250" cy="250" r="200" fill="#0A0E1F" stroke-width="5" stroke="#B8860B" />

  <!-- Central RV Icon (Stylized) -->
  <g transform="translate(150, 200)" fill="url(#goldGrad)" filter="url(#glow)">
    <rect x="0" y="0" width="200" height="100" rx="10" /> <!-- Main Body -->
    <rect x="160" y="10" width="40" height="80" rx="5" /> <!-- Cab -->
    <circle cx="40" cy="100" r="15" fill="#B8860B" /> <!-- Wheel L -->
    <circle cx="160" cy="100" r="15" fill="#B8860B" /> <!-- Wheel R -->
    <rect x="20" y="20" width="40" height="30" fill="#0A0E1F" /> <!-- Window -->
    <path d="M100,0 L120,-30 L140,0 Z" fill="#F9E076" /> <!-- Sat Dish / Antenna -->
  </g>

  <!-- Radiating Lines -->
  <g stroke="#F9E076" stroke-width="3" opacity="0.6">
    <line x1="250" y1="150" x2="250" y2="100" />
    <line x1="250" y1="350" x2="250" y2="400" />
    <line x1="150" y1="250" x2="100" y2="250" />
    <line x1="350" y1="250" x2="400" y2="250" />
    <line x1="190" y1="190" x2="160" y2="160" />
    <line x1="310" y1="310" x2="340" y2="340" />
    <line x1="190" y1="310" x2="160" y2="340" />
    <line x1="310" y1="190" x2="340" y2="160" />
  </g>

  <!-- Text along path -->
  <path id="circlePath" d="M 250, 250 m -180, 0 a 180,180 0 1,1 360,0 a 180,180 0 1,1 -360,0" fill="none" />
  <text fill="url(#goldGrad)" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" letter-spacing="5">
    <textPath href="#circlePath" startOffset="25%">
      SOVEREIGN HIGH-VISCOSITY COORDINATE • SATURATED STASIS CERTIFIED •
    </textPath>
  </text>

  <!-- Bottom Label -->
  <text x="250" y="430" text-anchor="middle" fill="#F9E076" font-family="Arial, Helvetica, sans-serif" font-size="18" font-style="italic">
    Luminous Momentum in a Singular Coordinate
  </text>
</svg>
