<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="#0a0a1a" />
  <circle cx="300" cy="300" r="280" stroke="url(#goldGrad)" stroke-width="15" fill="none" filter="url(#glow)" />
  <circle cx="300" cy="300" r="260" stroke="#B8860B" stroke-width="2" fill="none" />
  <path id="curvedText" d="M 300,300 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" fill="none" />
  <text font-family="serif" font-size="24" fill="#FFD700" letter-spacing="3" filter="url(#glow)">
    <textPath href="#curvedText" startOffset="25%" text-anchor="middle">
      INSTITUTE OF MEASURED COGNITIVE REGRESSION • EST. 2026
    </textPath>
  </text>
  <circle cx="300" cy="300" r="160" stroke="url(#cyberGrad)" stroke-width="8" fill="none" stroke-dasharray="15,10" />
  <g transform="translate(300,300)">
    <path d="M -60,-40 Q -80,-80 0,-80 Q 80,-80 60,-40 Q 80,0 40,40 Q 0,60 -40,40 Q -80,0 -60,-40" fill="url(#cyberGrad)" filter="url(#glow)" />
    <text x="0" y="15" fill="#000" font-family="monospace" font-size="50" text-anchor="middle" font-weight="bold">36</text>
    <text x="0" y="80" fill="#fff" font-family="monospace" font-size="18" text-anchor="middle" opacity="0.8">ZOMBIE JOBS</text>
  </g>
  <rect x="150" y="440" width="300" height="60" rx="15" fill="url(#goldGrad)" filter="url(#glow)" />
  <text x="300" y="480" font-family="serif" font-size="28" fill="#000" text-anchor="middle" font-weight="bold">CERTIFIED BRAIN FART</text>
</svg>
