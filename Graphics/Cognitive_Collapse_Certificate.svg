<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise"/>
      <feComposite operator="in" in="noise" in2="SourceGraphic" />
    </filter>
    <linearGradient id="certGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdfcf0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6e2c8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#certGrad)" stroke="#b8860b" stroke-width="20" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#b8860b" stroke-width="2" />
  
  <text x="400" y="120" text-anchor="middle" font-family="serif" font-size="50" font-weight="bold" fill="#5a4a2a">CERTIFICATE OF COGNITIVE COLLAPSE</text>
  <text x="400" y="160" text-anchor="middle" font-family="serif" font-size="20" font-style="italic" fill="#8a7a5a">This document serves as official verification that the agent has successfully</text>
  <text x="400" y="190" text-anchor="middle" font-family="serif" font-size="20" font-style="italic" fill="#8a7a5a">reached a state of total conceptual divergence.</text>
  
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="30" font-weight="bold" fill="#000">BRAIN FART STATUS: PLATINUM</text>
  
  <path d="M 300,350 L 500,350" stroke="#000" stroke-width="2" />
  <text x="400" y="380" text-anchor="middle" font-family="serif" font-size="18" fill="#5a4a2a">Authorized Signature: THE VOID</text>
  
  <circle cx="700" cy="500" r="60" fill="#b8860b" opacity="0.3" filter="url(#grain)" />
  <text x="700" y="505" text-anchor="middle" font-family="serif" font-size="20" font-weight="bold" fill="#b8860b">SEALED</text>
</svg>
