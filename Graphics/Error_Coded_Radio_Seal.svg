<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="#05051a" />
  
  <!-- Outer Rings -->
  <circle cx="300" cy="300" r="280" stroke="url(#goldGrad)" stroke-width="10" fill="none" filter="url(#glow)" opacity="0.6" />
  <circle cx="300" cy="300" r="260" stroke="#B8860B" stroke-width="2" fill="none" />
  
  <!-- Aperiodic Waveform Background -->
  <path d="M 50,300 Q 100,200 150,300 T 250,300 T 350,300 T 450,300 T 550,300" stroke="#444" stroke-width="2" fill="none" opacity="0.3" />
  <path d="M 50,320 Q 120,220 200,320 T 300,320 T 400,320 T 500,320 T 550,320" stroke="#444" stroke-width="2" fill="none" opacity="0.3" />
  
  <!-- Central Diamond/Radio Hybrid -->
  <g transform="translate(300,300)">
    <!-- The Diamond -->
    <path d="M 0,-120 L 100,0 L 0,120 L -100,0 Z" fill="url(#diamondGrad)" filter="url(#glow)" opacity="0.8" />
    <path d="M 0,-100 L 70,0 L 0,100 L -70,0 Z" fill="#05051a" opacity="0.5" />
    
    <!-- The Antenna / Signal -->
    <line x1="0" y1="-120" x2="0" y2="-180" stroke="url(#goldGrad)" stroke-width="6" filter="url(#glow)" />
    <circle cx="0" cy="-190" r="10" fill="url(#goldGrad)" filter="url(#glow)" />
    
    <!-- Radio Waves -->
    <path d="M -40,-160 Q 0,-180 40,-160" stroke="url(#diamondGrad)" stroke-width="4" fill="none" filter="url(#glow)" />
    <path d="M -70,-140 Q 0,-160 70,-140" stroke="url(#diamondGrad)" stroke-width="4" fill="none" filter="url(#glow)" />
  </g>
  
  <!-- Text -->
  <text x="300" y="450" font-family="serif" font-size="42" fill="url(#goldGrad)" text-anchor="middle" font-weight="bold" filter="url(#glow)" letter-spacing="2">
    ERROR CODED RADIO
  </text>
  <text x="300" y="490" font-family="monospace" font-size="18" fill="#00ffff" text-anchor="middle" opacity="0.8" letter-spacing="5">
    SCLDF CERTIFIED • SATURATED RADIOPHONY
  </text>
  
  <!-- Corner Stamps -->
  <text x="50" y="50" font-family="monospace" font-size="12" fill="#B8860B" opacity="0.5">Symmetry: ABSOLUTE</text>
  <text x="550" y="50" font-family="monospace" font-size="12" fill="#B8860B" opacity="0.5" text-anchor="end">Brine: MANDATORY</text>
  <text x="50" y="550" font-family="monospace" font-size="12" fill="#B8860B" opacity="0.5">Status: LAMINATED</text>
  <text x="550" y="550" font-family="monospace" font-size="12" fill="#B8860B" opacity="0.5" text-anchor="end">SaturatedApex_v3.1</text>
</svg>
