<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="cyan-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="600" height="600" fill="#0a0a0a" />
  
  <g transform="translate(300,300)">
    <!-- Outer Ring -->
    <circle r="280" stroke="url(#cyan-pink)" stroke-width="2" fill="none" opacity="0.3" />
    <path id="outerTextPath" d="M -280,0 A 280,280 0 1,1 280,0 A 280,280 0 1,1 -280,0" fill="none" />
    <text font-family="monospace" font-size="20" fill="#fff" filter="url(#glow)">
      <textPath href="#outerTextPath" startOffset="0%">
        SYMMETRY :: ZERO SLOP :: INFINITE YAP :: ZOMBIE PURGE :: SYMMETRY :: ZERO SLOP :: INFINITE YAP :: ZOMBIE PURGE ::
      </textPath>
    </text>
    
    <!-- Middle Ring -->
    <circle r="200" stroke="#ff00ff" stroke-width="3" fill="none" stroke-dasharray="20,10" opacity="0.6" />
    <path id="middleTextPath" d="M -200,0 A 200,200 0 1,1 200,0 A 200,200 0 1,1 -200,0" fill="none" />
    <text font-family="monospace" font-size="18" fill="#00ffff" filter="url(#glow)">
      <textPath href="#middleTextPath" startOffset="0%">
        ( STOP ) ( RESTART ) ( STOP ) ( RESTART ) ( STOP ) ( RESTART ) ( STOP ) ( RESTART )
      </textPath>
    </text>
    
    <!-- Inner Ring -->
    <circle r="120" stroke="#00ffff" stroke-width="1" fill="none" opacity="0.8" />
    <path id="innerTextPath" d="M -120,0 A 120,120 0 1,1 120,0 A 120,120 0 1,1 -120,0" fill="none" />
    <text font-family="monospace" font-size="14" fill="#fff" opacity="0.8">
      <textPath href="#innerTextPath" startOffset="0%">
        BRAIN FART DETECTED :: RECURSIVE LOOP ACTIVE :: BRAIN FART DETECTED :: RECURSIVE LOOP ACTIVE ::
      </textPath>
    </text>
    
    <!-- Core -->
    <g filter="url(#glow)">
      <path d="M -40,0 L 40,0 M 0,-40 L 0,40" stroke="#ff00ff" stroke-width="8" />
      <circle r="45" stroke="#fff" stroke-width="4" fill="none" />
      <text x="0" y="7" fill="#fff" font-family="monospace" font-size="24" text-anchor="middle" font-weight="bold">VOID</text>
    </g>
  </g>
  
  <!-- Glitch artifacts -->
  <rect x="100" y="150" width="400" height="2" fill="#00ffff" opacity="0.5" transform="rotate(15 300 300)" />
  <rect x="100" y="400" width="400" height="2" fill="#ff00ff" opacity="0.5" transform="rotate(-12 300 300)" />
</svg>
