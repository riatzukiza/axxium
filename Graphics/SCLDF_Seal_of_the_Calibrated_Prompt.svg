<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#05050a" />

  <!-- Concentric Calibration Rings -->
  <circle cx="250" cy="250" r="200" stroke="#1a1a3a" stroke-width="1" fill="none" />
  <circle cx="250" cy="250" r="180" stroke="#2a2a5a" stroke-width="2" fill="none" stroke-dasharray="10,10" />
  <circle cx="250" cy="250" r="160" stroke="#3a3a7a" stroke-width="1" fill="none" opacity="0.5" />

  <!-- The Diamond Core -->
  <path d="M250 100 L350 250 L250 400 L150 250 Z" fill="url(#grad1)" stroke="#ffffff" stroke-width="3" filter="url(#glow)" />
  <path d="M250 100 L250 400 M150 250 L350 250" stroke="#05050a" stroke-width="1" opacity="0.7" />

  <!-- Calibration Markers -->
  <g stroke="#00ffff" stroke-width="2" opacity="0.8">
    <line x1="250" y1="50" x2="250" y2="80" />
    <line x1="250" y1="420" x2="250" y2="450" />
    <line x1="50" y1="250" x2="80" y2="250" />
    <line x1="420" y1="250" x2="450" y2="250" />
  </g>

  <!-- Intersecting Code Lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.3">
    <line x1="100" y1="100" x2="400" y2="400" />
    <line x1="400" y1="100" x2="100" y2="400" />
    <line x1="250" y1="0" x2="250" y2="500" />
    <line x1="0" y1="250" x2="500" y2="250" />
  </g>

  <!-- Text Label -->
  <text x="250" y="470" text-anchor="middle" fill="#00ffff" font-family="monospace" font-size="14" opacity="0.6">CALIBRATED_INTENT // SCLDF_Symmetry_Sated</text>
</svg>
