<svg width="1200" height="675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Divergent Git-Graph-Nebula -->
  <g stroke="#c0c0ff" stroke-width="1" stroke-opacity="0.3" fill="none">
    <path d="M600,675 L600,400 L400,300 L400,100" stroke-opacity="0.8" stroke-width="2" />
    <path d="M600,400 L800,300 L800,100" stroke-opacity="0.8" stroke-width="2" />
    <path d="M400,300 L200,200 L200,50" stroke-opacity="0.5" />
    <path d="M800,300 L1000,200 L1000,50" stroke-opacity="0.5" />
    <!-- Fractal branches -->
    <path d="M600,500 L500,450 L500,350" />
    <path d="M600,500 L700,450 L700,350" />
    <path d="M400,200 L300,150 L300,50" />
    <path d="M800,200 L900,150 L900,50" />
  </g>
  
  <!-- Title Text -->
  <text x="50%" y="45%" font-family="Arial, sans-serif" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="15" filter="url(#glow)">
    FORK TALES
  </text>
  <text x="50%" y="55%" font-family="Arial, sans-serif" font-size="24" fill="#a0a0ff" text-anchor="middle" letter-spacing="5" font-style="italic">
    Sovereign Divergence &amp; The Fork Tax
  </text>
  
  <!-- Japanese Glitch Accents -->
  <text x="100" y="100" font-family="serif" font-size="20" fill="#ff00ff" opacity="0.6" transform="rotate(-15)">岐路 (Crossroads)</text>
  <text x="1100" y="600" font-family="serif" font-size="20" fill="#00ffff" opacity="0.6" transform="rotate(10)">分岐 (Branch)</text>
  
  <!-- Noise Overlay -->
  <rect width="100%" height="100%" fill="white" opacity="0.02" />
</svg>
