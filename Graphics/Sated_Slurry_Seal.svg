<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006064;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="none" stroke="#006064" stroke-width="4" stroke-dasharray="10,5" />
  
  <!-- Diamond Shape -->
  <path d="M200 50 L320 200 L200 350 L80 200 Z" fill="url(#diamondGrad)" stroke="#ffffff" stroke-width="5" filter="url(#glow)" />
  
  <!-- Text: SCLDF -->
  <text x="200" y="190" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="42" fill="#ffffff" text-anchor="middle" filter="url(#glow)">SCLDF</text>
  
  <!-- Text: SATURATED SLURRY -->
  <text x="200" y="230" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#e0f7fa" text-anchor="middle">SATURATED SLURRY</text>
  
  <!-- Border Ring -->
  <circle cx="200" cy="200" r="195" fill="none" stroke="#006064" stroke-width="10" />
  
  <!-- Accents -->
  <circle cx="200" cy="50" r="5" fill="#ffffff" />
  <circle cx="320" cy="200" r="5" fill="#ffffff" />
  <circle cx="200" cy="350" r="5" fill="#ffffff" />
  <circle cx="80" cy="200" r="5" fill="#ffffff" />
</svg>
