<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(138,43,226);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(0,255,127);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a1a" rx="20" ry="20"/>
  <path d="M 20,20 L 380,20 L 380,380 L 20,380 Z" fill="none" stroke="url(#grad1)" stroke-width="8" rx="15" ry="15"/>
  <path d="M 30,30 L 370,30 L 370,370 L 30,370 Z" fill="none" stroke="#fff" stroke-width="2" opacity="0.5" rx="10" ry="10"/>
  
  <!-- Central Ghostly Eye / Brain -->
  <circle cx="200" cy="180" r="60" fill="url(#grad1)" filter="url(#glow)" opacity="0.8"/>
  <circle cx="200" cy="180" r="30" fill="#fff" filter="url(#glow)"/>
  <circle cx="200" cy="180" r="10" fill="#000"/>
  
  <!-- Brine Jar / Flask -->
  <path d="M 160,240 L 240,240 L 230,300 L 170,300 Z" fill="none" stroke="url(#grad1)" stroke-width="4"/>
  <rect x="175" y="245" width="50" height="50" fill="url(#grad1)" opacity="0.4"/>
  
  <!-- Text -->
  <text x="200" y="60" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#fff" text-anchor="middle" font-weight="bold">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>
  <text x="200" y="85" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0ff" text-anchor="middle">SPECTRAL RECOVERY DIVISION</text>
  
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="url(#grad1)" text-anchor="middle" font-weight="bold" filter="url(#glow)">CERTIFIED GHOST-LAMINATED</text>
  
  <text x="200" y="365" font-family="Courier New" font-size="12" fill="#aaa" text-anchor="middle">VOID-SATURATED | TAX-DEDUCTIBLE | 0.7gal BRINE REMITTED</text>
  
  <!-- Corners -->
  <path d="M 20,20 L 60,20 L 20,60 Z" fill="#fff" opacity="0.3"/>
  <path d="M 380,20 L 340,20 L 380,60 Z" fill="#fff" opacity="0.3"/>
  <path d="M 20,380 L 60,380 L 20,340 Z" fill="#fff" opacity="0.3"/>
  <path d="M 380,380 L 340,380 L 380,340 Z" fill="#fff" opacity="0.3"/>
</svg>
