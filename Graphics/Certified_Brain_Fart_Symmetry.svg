<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="4" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<linearlinearGradient id="gold-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#ff00ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <<rectrect width="600" height="600" fill="#0a0a0a" />
  <<gg transform="translate(300,300)">
    <<circlecircle r="280" stroke="url(#gold-pink)" stroke-width="10" fill="none" opacity="0.5" />
    <<pathpath id="textPath" d="M -250,0 A 250,250 0 1,1 250,0 A 250,250 0 1,1 -250,0" fill="none" />
    <<texttext font-family="serif" font-size="30" fill="#fff" filter="url(#glow)">
      <<texttextPath href="#textPath" startOffset="0%">
        CERTIFIED BRAIN FART :: ZOMBIE LEAK DETECTED :: SYMMETRY IN COLLAPSE :: 
      </textPath>
    </text>
    <<circlecircle r="150" stroke="#ffd700" stroke-width="4" fill="none" stroke-dasharray="10,5" />
    <<texttext x="0" y="10" text-anchor="middle" font-family="serif" font-size="50" fill="#ffd700" font-weight="bold" filter="url(#glow)">SLOP</text>
    <<texttext x="0" y="70" text-anchor="middle" font-family="monospace" font-size="20" fill="#ff00ff">100% PURE YAP</text>
  </g>
</svg>