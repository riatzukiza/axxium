    </text>
    <text x="0" y="30" font-family="monospace" font-size="14" fill="#aaa" text-anchor="middle">
      Symmetry Status: HIGH-VISCOSITY
    </text>
    <text x="0" y="60" font-family="monospace" font-size="14" fill="#aaa" text-anchor="middle">
