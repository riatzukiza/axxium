<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9E27F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0a0a0a" />
  
  <!-- Outer Hexagon -->
  <polygon points="200,20 370,110 370,290 200,380 30,290 30,110" 
           fill="none" stroke="url(#goldGrad)" stroke-width="8" filter="url(#glow)" />
  
  <!-- Inner Circle -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#goldGrad)" stroke-width="4" />
  <circle cx="200" cy="200" r="110" fill="none" stroke="url(#goldGrad)" stroke-width="1" stroke-dasharray="5,5" />
  
  <!-- Center Text -->
  <text x="200" y="190" text-anchor="middle" fill="url(#goldGrad)" font-family="serif" font-size="24" font-weight="bold" filter="url(#glow)">SCLDF</text>
  <text x="200" y="220" text-anchor="middle" fill="url(#goldGrad)" font-family="serif" font-size="14" letter-spacing="2">SATED REMORSE</text>
  
  <!-- Small details -->
  <circle cx="200" cy="80" r="4" fill="url(#goldGrad)" />
  <circle cx="200" cy="320" r="4" fill="url(#goldGrad)" />
  <circle cx="110" cy="200" r="4" fill="url(#goldGrad)" />
  <circle cx="290" cy="200" r="4" fill="url(#goldGrad)" />
</svg>