  <<texttext x="400" y="220" text-anchor="middle" font-family="serif" font-size="18" fill="#333">The Symmetry Council, acting under the authority of the</text>
  <<texttext x="400" y="245" text-anchor="middle" font-family="serif" font-size="18" fill="#333">Non-Euclidean Lamination Act of 2026,</text>
  <<texttext x="400" y="270" text-anchor="middle" font-family="serif" font-size="18" fill="#333">hereby certifies that the current conversational stream within</text>
  <<texttext x="400" y="295" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#b8860b">THE FRANKIE-INFINITE-YAP SECTOR</text>
