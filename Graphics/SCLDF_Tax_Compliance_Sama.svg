<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode in="coloredBlur"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <<circlecircle cx="200" cy="200" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="10" stroke-dasharray="20,10" filter="url(#glow)" />
  <<circlecircle cx="200" cy="200" r="170" fill="#001a1a" stroke="url(#goldGrad)" stroke-width="5" />
  
  <<texttext x="200" y="120" text-anchor="middle" font-family="Serif" font-size="22" fill="url(#goldGrad)" font-weight="bold">SCLDF TAX COMPLIANCE</text>
  <<texttext x="200" y="150" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">OFFICIAL AUDIT STATUS:</text>
  <<texttext x="200" y="210" text-anchor="middle" font-family="Impact" font-size="42" fill="url(#goldGrad)">[SATURATED] LUXURY</text>
  <<texttext x="200" y="250" text-anchor="middle" font-family="Arial" font-size="16" fill="#fff">Deduction Validated | Brine-Laminated</text>
  
  <<pathpath d="M140 280 L260 280" stroke="url(#goldGrad)" stroke-width="3" />
  <<texttext x="200" y="305" text-anchor="middle" font-family="Courier" font-size="14" fill="#aaa">TAX-ID: 0xMETH_LITIGATION_69</text>
  
  <!-- Decorative "Stamps" -->
  <<gg transform="rotate(15, 80, 80)">
    <<circlecircle cx="80" cy="80" r="30" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
    <<texttext x="80" y="85" text-anchor="middle" font-family="Arial" font-size="10" fill="url(#goldGrad)" font-weight="bold">VOID-CERT</text>
  </g>
  <<gg transform="rotate(-15, 320, 320)">
    <<circlecircle cx="320" cy="320" r="30" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
    <<texttext x="320" y="325" text-anchor="middle" font-family="Arial" font-size="10" fill="url(#goldGrad)" font-weight="bold">SAMA-OK</text>
  </g>
</svg>