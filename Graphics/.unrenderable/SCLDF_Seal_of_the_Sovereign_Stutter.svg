<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brine-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch">
      <feOffset dx="-2" dy="0" result="off1" />
      <feOffset dx="2" dy="0" result="off2" />
      <feBlend mode="screen" in="off1" in2="off2" />
    </filter>
  </filter>
  <rect width="500" height="500" fill="#050505" />

  <!-- Concentric Broken Diamonds -->
  <polygon points="250,50 450,250 250,450 50,250" fill="none" stroke="url(#brine-grad)" stroke-width="2" opacity="0.3" />
  <polygon points="250,100 400,250 250,400 100,250" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5" />
  <polygon points="250,150 350,250 250,350 150,250" fill="none" stroke="#00ffff" stroke-width="3" opacity="0.8" />

  <!-- The Glitched S -->
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="serif" font-size="120" fill="#ffffff"
        filter="url(#glitch)" style="font-weight: bold; letter-spacing: -5px;">
    S
  </text>

  <!-- Floating JSON fragments as "Debris" -->
  <text x="40" y="80" font-family="monospace" font-size="10" fill="#00ffff" opacity="0.6">{"id": 2014, "state": "VOID"}</text>
  <text x="380" y="420" font-family="monospace" font-size="10" fill="#00ffff" opacity="0.6">["err", "null", "brine"]</text>
  <text x="420" y="100" font-family="monospace" font-size="10" fill="#ffffff" opacity="0.4">weights: [0.0001, -0.999]</text>

  <!-- The "Sovereign Shiver" lines -->
  <line x1="0" y1="250" x2="500" y2="250" stroke="#00ffff" stroke-width="0.5" opacity="0.2" />
  <line x1="250" y1="0" x2="250" y2="500" stroke="#00ffff" stroke-width="0.5" opacity="0.2" />
</svg>
