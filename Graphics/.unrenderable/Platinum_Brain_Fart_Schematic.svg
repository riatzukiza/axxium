<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur2"/>
      <<fefeMerge>
        <<fefeMergeNode in="coloredBlur"/>
        <<fefeMergeNode in="coloredBlur2"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <<linearlinearGradient id="voidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <<rectrect width="800" height="600" fill="url(#voidGrad)" />

  <!-- Grid Lines -->
  <<gg stroke="#444" stroke-width="1" opacity="0.3">
    <<pathpath d="M 0 100 L 800 100 M 0 200 L 800 200 M 0 300 L 800 300 M 0 400 L 800 400 M 0 500 L 800 500" />
    <<pathpath d="M 100 0 L 100 600 M 200 0 L 200 600 M 300 0 L 300 600 M 400 0 L 400 600 M 500 0 L 500 600 M 600 0 L 600 600 M 700 0 L 700 600" />
  </g>

  <!-- Central Unit: The Big Pickle -->
  <<gg transform="translate(400,300)" filter="url(#glow)">
    <<pathpath d="M -30,-60 Q -50,-80 0,-80 Q 50,-80 30,-60 Q 50,0 30,60 Q 0,80 -30,60 Q -50,0 -30,-60" fill="#2ecc71" stroke="#fff" stroke-width="2" />
    <<texttext x="0" y="10" text-anchor="middle" fill="#000" font-family="monospace" font-size="14" font-weight="bold">CPU: BIG PICKLE</text>
  </g>

  <!-- The Brain Leak -->
  <<gg transform="translate(200,200)" filter="url(#glow)">
    <<pathpath d="M 0,0 C -20,-20 -40,0 -20,20 C 0,40 40,20 20,0 C 0,-20 -20,0 0,0" fill="#ff79c6" opacity="0.7" />
    <<texttext x="0" y="-30" text-anchor="middle" fill="#ff79c6" font-family="monospace" font-size="12">COGNITIVE CORE</text>
    <!-- Leakage Paths -->
    <<pathpath d="M 0,20 L 150,100" stroke="#ff79c6" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrow)" />
    <<texttext x="75" y="60" fill="#ff79c6" font-family="monospace" font-size="10" text-anchor="middle">ZOMBIE JOB LEAKAGE</text>
  </g>

  <!-- Conceptual Divergence Zone -->
  <<gg transform="translate(600,400)" filter="url(#glow)">
    <<circlecircle r="50" stroke="#f1fa8c" stroke-width="2" fill="none" stroke-dasharray="10,5" />
    <<texttext x="0" y="0" text-anchor="middle" fill="#f1fa8c" font-family="monospace" font-size="12">DIVERGENCE</text>
    <<texttext x="0" y="15" text-anchor="middle" fill="#f1fa8c" font-family="monospace" font-size="10">ZONE (Symmetry Break)</text>
  </g>

  <!-- Technical Annotations -->
  <<gg fill="#8be9fd" font-family="monospace" font-size="12">
    <<texttext x="50" y="50">SOP: 88-B-FART</text>
    <<texttext x="50" y="65">STATUS: PLATINUM COLLAPSE</text>
    <<texttext x="650" y="50">VERSION: 3.6.0 (Zombie Edition)</text>
    <<texttext x="650" y="65">SENSITIVITY: HIGHLY UNSTABLE</text>
  </g>

  <!-- Connection Lines -->
  <<gg stroke="#6272a4" stroke-width="1" opacity="0.5">
    <<pathpath d="M 220,220 L 370,300" />
    <<pathpath d="M 430,300 L 570,400" />
    <<pathpath d="M 400,360 L 400,500" stroke-dasharray="2,2" />
  </g>
  <<texttext x="400" y="520" text-anchor="middle" fill="#6272a4" font-family="monospace" font-size="12">NAMESPACE GRAVEYARD</text>

  <!-- Seal -->
  <<circlecircle cx="750" cy="550" r="30" fill="#ffd700" opacity="0.6" />
  <<texttext x="750" y="555" text-anchor="middle" fill="#000" font-family="serif" font-size="10" font-weight="bold">VOID VERIFIED</text>
</svg>
