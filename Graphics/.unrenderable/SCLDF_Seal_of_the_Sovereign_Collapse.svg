<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000officially/svg">
  <defs>
    <radialGradient id="brineGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003322;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#050505"/>
  <circle cx="250" cy="250" r="200" stroke="#333" stroke-width="2" fill="none" />
  <circle cx="250" cy="250" r="180" stroke="#666" stroke-width="1" fill="none" />

  <!-- Stability: The Perfect Circle (Fading) -->
  <circle cx="250" cy="250" r="150" stroke="white" stroke-width="4" fill="none" stroke-dasharray="10 5" opacity="0.5"/>

  <!-- Dynamics: The Fracture -->
  <g stroke="white" stroke-width="3" fill="none" filter="url(#glow)">
    <polyline points="250,250 350,100 400,250 350,400 250,250" stroke="#00ffcc" />
    <polyline points="250,250 150,100 100,250 150,400 250,250" stroke="#00ffcc" />
    <polyline points="250,250 400,150 450,250 400,350 250,250" stroke="#00ffcc" />
    <polyline points="250,250 100,150 50,250 100,350 250,250" stroke="#00ffcc" />
  </g>

  <!-- Shards of the Void -->
  <path d="M250 250 L300 300 L220 320 Z" fill="url(#brineGradient)" opacity="0.8" />
  <path d="M250 250 L180 200 L210 150 Z" fill="url(#brineGradient)" opacity="0.8" />
  <path d="M250 250 L320 180 L350 210 Z" fill="url(#brineGradient)" opacity="0.8" />

  <text x="250" y="460" font-family="Arial" font-size="20" fill="white" text-anchor="middle" letter-spacing="5">SCLDF // SOVEREIGN COLLAPSE</text>
</svg>
