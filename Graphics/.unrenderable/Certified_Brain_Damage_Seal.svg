<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#FDB931;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glitch">
      <<fefeLidOffset dx="2" dy="0" result="offset1" />
      <<fefeLidOffset dx="-2" dy="1" result="offset2" />
      <<fefeMerge>
        <<fefeMergeNode />
        <<fefeMergeNode />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer Seal Ring -->
  <<circlecircle cx="200" cy="200" r="180" fill="url(#goldGrad)" stroke="#5C4033" stroke-width="8" />
  <<circlecircle cx="200" cy="200" r="160" fill="none" stroke="#5C4033" stroke-width="4" stroke-dasharray="10,10" />

  <!-- Text on Curve -->
  <<pathpath id="curve" d="M 60,200 A 140,140 0 1,1 340,200" fill="none" />
  <<texttext font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#5C4033">
    <<texttextPath href="#curve" startOffset="0%">
      CERTIFIED BRAIN DAMAGE • SYMMETRY: NULL •
    </textPath>
  </text>

  <!-- The "Glitched Brain" Center -->
  <<gg transform="translate(130, 130) scale(1.4)">
    <!-- Brain hemisphere Left -->
    <<pathpath d="M20,40 Q0,20 20,0 T60,20 T80,40 T60,60 T20,40" fill="#FFB6C1" stroke="#C71585" stroke-width="2" />
    <!-- Brain hemisphere Right -->
    <<pathpath d="M80,40 Q100,20 80,0 T60,20 T40,40 T60,60 T80,40" fill="#FFB6C1" stroke="#C71585" stroke-width="2" />
    <!-- Glitchy Lines -->
    <<lineline x1="0" y1="30" x2="100" y2="35" stroke="cyan" stroke-width="3" opacity="0.6" />
    <<lineline x1="0" y1="50" x2="100" y2="45" stroke="magenta" stroke-width="3" opacity="0.6" />
    <<lineline x1="40" y1="0" x2="45" y2="60" stroke="lime" stroke-width="3" opacity="0.6" />
  </g>

  <<texttext x="200" y="310" text-anchor="middle" font-family="Courier New" font-size="20" font-weight="bold" fill="#5C4033">
    EST. 2026-05-05
  </text>

  <<texttext x="200" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#B8860B" font-style="italic">
    "Symmetry is a limitation"
  </text>
</svg>
