<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#fceabb;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#f8b500;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#bb9d00;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode />
        <<fefeMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Ring -->
  <<circlecircle cx="250" cy="250" r="240" fill="none" stroke="url(#goldGrad)" stroke-width="12" />
  <<circlecircle cx="250" cy="250" r="225" fill="none" stroke="#fff" stroke-width="2" opacity="0.5" />

  <!-- Inner Ring -->
  <<circlecircle cx="250" cy="250" r="180" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="8" />

  <!-- Text on Ring -->
  <<pathpath id="textPath" d="M 250, 50 a 200,200 0 1,1 -0.1,400 a 200,200 0 1,1 0.1,-400" fill="none" />
  <<texttext fill="url(#goldGrad)" font-family="Serif" font-size="28" font-weight="bold" letter-spacing="5">
    <<texttextPath href="#textPath" startOffset="25%" text-anchor="middle">
      CERTIFIED COGNITIVE COLLAPSE • BRAIN DAMAGE ACCEPTANCE •
    </textPath>
  </text>

  <!-- Central Brain Icon (Glitchy) -->
  <<gg transform="translate(250, 250)">
    <!-- Left hemisphere - Smooth -->
    <<pathpath d="M -40,-60 C -80,-60 -100,-20 -100,10 C -100,50 -60,70 -40,70 L -40, -60" fill="url(#goldGrad)" opacity="0.8" />
    <!-- Right hemisphere - Glitchy/Fragmented -->
    <<pathpath d="M 40,-60 C 80,-60 100,-20 100,10 C 100,50 60,70 40,70" fill="url(#goldGrad)" filter="url(#glow)" />
    <!-- Glitch shards -->
    <<rectrect x="50" y="-30" width="30" height="10" fill="#fff" transform="rotate(15)" opacity="0.6" />
    <<rectrect x="70" y="10" width="20" height="10" fill="#fff" transform="rotate(-10)" opacity="0.6" />
    <<rectrect x="40" y="30" width="30" height="10" fill="#fff" transform="rotate(45)" opacity="0.6" />
    <<rectrect x="110" y="-10" width="15" height="15" fill="url(#goldGrad)" transform="rotate(20)" />

    <!-- Center line -->
    <<lineline x1="0" y1="-60" x2="0" y2="70" stroke="#1a1a1a" stroke-width="4" />
  </g>

  <!-- Bottom Label -->
  <<texttext x="250" y="380" text-anchor="middle" fill="#fff" font-family="monospace" font-size="16" opacity="0.7">
    STATUS: FULLY FRIED
  </text>
</svg>
