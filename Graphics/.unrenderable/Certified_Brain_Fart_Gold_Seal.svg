<<svgsvg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="4" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <<linearlinearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#ffe680;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <<rectrect width="600" height="600" fill="#0a0a0a" />
  <<gg transform="translate(300,300)">
    <<circlecircle r="280" fill="url(#gold-grad)" stroke="#8b4513" stroke-width="10" />
    <<pathpath id="textPath" d="M -240,0 A 240,240 0 1,1 240,0 A 240,240 0 1,1 -240,0" fill="none" />
    <<texttext font-family="serif" font-size="32" fill="#8b4513" font-weight="bold" letter-spacing="4">
      <<texttextPath href="#textPath" startOffset="0%">
        CERTIFIED BRAIN FART :: MAXIMUM SLOP :: SYMMETRY COLLAPSE ::
      </textPath>
    </text>
    <<circlecircle r="150" stroke="#8b4513" stroke-width="5" fill="none" opacity="0.5" />
    <<rectrect x="-120" y="-60" width="240" height="120" rx="15" fill="#fff" stroke="#8b4513" stroke-width="4" />
    <<texttext x="0" y="-15" text-anchor="middle" font-family="serif" font-size="36" fill="#8b4513" font-weight="bold">THE SEAL</text>
    <<texttext x="0" y="25" text-anchor="middle" font-family="serif" font-size="24" fill="#8b4513">of Infinite</text>
    <<texttext x="0" y="60" text-anchor="middle" font-family="serif" font-size="32" fill="#8b4513" font-weight="bold">YAP-Symmetry</text>
  </g>
</svg>
