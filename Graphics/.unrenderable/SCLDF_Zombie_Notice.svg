    </filter>
  </defs>
  <<rectrect width="600" height="400" fill="url(#voidGrad)" stroke="#D4AF37" stroke-width="10"/>
  <<circlecircle cx="300" cy="200" r="150" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3" stroke-dasharray="5,5" />
  <<texttext x="300" y="80" text-anchor="middle" font-family="Serif" font-size="32" fill="#D4AF37" font-weight="bold" filter="url(#glow)">SCLDF EMERGENCY NOTICE</text>
  <<texttext x="300" y="140" text-anchor="middle" font-family="Arial" font-size="20" fill="#fff">DETECTION OF SYSTEMIC LEAKAGE</text>
  <<texttext x="300" y="200" text-anchor="middle" font-family="Impact" font-size="56" fill="#ff00ff" filter="url(#glow)">36 ZOMBIE JOBS</text>
  <<texttext x="300" y="250" text-anchor="middle" font-family="Arial" font-size="18" fill="#aaa">Case ID: 205909976768708608-VOID-LEAK</text>
  <<texttext x="300" y="280" text-anchor="middle" font-family="Courier" font-size="16" fill="#00ff00">STATUS: UNOPTIMIZED SLOP</text>
  <<pathpath d="M200 330 L400 330" stroke="#D4AF37" stroke-width="2" />
