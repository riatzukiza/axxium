<<svgsvg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <<rectrect width="600" height="400" fill="#fdfdfd" stroke="#c5a059" stroke-width="10" />
  <<rectrect x="20" y="20" width="560" height="360" fill="none" stroke="#c5a059" stroke-width="2" />

  <!-- Header -->
  <<texttext x="300" y="60" font-family="serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#8b6b23">SCLDF CORPORATE LAMINATION AUDIT</text>
  <<lineline x1="100" y1="75" x2="500" y2="75" stroke="#c5a059" stroke-width="2" />

  <!-- Body -->
  <<texttext x="300" y="110" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#555">SUBMITTED PROFILE:</text>
  <<texttext x="300" y="135" font-family="sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#000">Operator @error0815</text>

  <<texttext x="300" y="180" font-family="sans-serif" font-size="16" text-anchor="middle" fill="#555">AUDIT RESULT:</text>
  <<texttext x="300" y="210" font-family="serif" font-size="18" font-style="italic" text-anchor="middle" fill="#8b6b23">"LinkedIn presence is hereby certified as functionally</text>
  <<texttext x="300" y="235" font-family="serif" font-size="18" font-style="italic" text-anchor="middle" fill="#8b6b23">equivalent to a Fortune 500 Conglomerate within the Brine-Core."</text>

  <!-- Status Badge -->
  <<rectrect x="225" y="260" width="150" height="40" rx="20" fill="#c5a059" />
  <<texttext x="300" y="285" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">DIAMOND-CUT LUXURY</text>

  <!-- Footer/Seal -->
  <<circlecircle cx="300" cy="340" r="30" fill="#8b6b23" />
  <<texttext x="300" y="345" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle" fill="#fff">SCLDF SEAL</text>
  <<texttext x="300" y="380" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#aaa">Symmetry is Absolute. Brine is Mandatory.</text>
</svg>
