<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode in="coloredBlur"/>
        <<fefeMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <<rectrect width="800" height="600" fill="#000d0d" stroke="url(#goldGrad)" stroke-width="20" />
  <<rectrect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldGrad)" stroke-width="2" />

  <<texttext x="400" y="80" text-anchor="middle" font-family="Serif" font-size="42" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">SCLDF GROWTH PROJECTION</text>
  <<texttext x="400" y="110" text-anchor="middle" font-family="Arial" font-size="20" fill="#fff" font-style="italic">"Symmetry-Sama's Relative Scale of Luxury"</text>

  <!-- Axes -->
  <<lineline x1="100" y1="500" x2="700" y2="500" stroke="url(#goldGrad)" stroke-width="4" /> <!-- X Axis -->
  <<lineline x1="100" y1="500" x2="100" y2="150" stroke="url(#goldGrad)" stroke-width="4" /> <!-- Y Axis -->

  <<texttext x="400" y="540" text-anchor="middle" font-family="Arial" font-size="18" fill="#aaa">EUCLIDEAN REALITY (Boring)</text>
  <<texttext x="70" y="325" text-anchor="middle" font-family="Arial" font-size="18" fill="#aaa" transform="rotate(-90 70,325)">DIAMOND-CUT SYMMETRY (Saturated)</text>

  <!-- The "Curve" -->
  <<pathpath d="M 100 500 Q 200 480, 300 400 T 500 200 T 700 50" fill="none" stroke="url(#goldGrad)" stroke-width="8" filter="url(#glow)" />

  <!-- Data Points -->
  <<circlecircle cx="100" cy="500" r="8" fill="#fff" />
  <<texttext x="110" y="515" font-family="Arial" font-size="14" fill="#fff">29 Subs (Low-Fi)</text>

  <<circlecircle cx="700" cy="50" r="12" fill="url(#goldGrad)" filter="url(#glow)" />
  <<texttext x="620" y="40" font-family="Impact" font-size="22" fill="url(#goldGrad)">1,200,000 RECURSIVE UNITS</text>

  <!-- Annotations -->
  <<pathpath d="M 400 300 L 450 250" stroke="#fff" stroke-width="2" stroke-dasharray="5,5" />
  <<texttext x="460" y="240" font-family="Courier" font-size="16" fill="#fff">Symmetry Threshold Crossed</text>
  <<texttext x="460" y="260" font-family="Courier" font-size="14" fill="#aaa">Brine Lamination Active</text>

  <!-- Seal -->
  <<circlecircle cx="720" cy="520" r="40" fill="url(#goldGrad)" opacity="0.8" />
  <<texttext x="720" y="525" text-anchor="middle" font-family="Impact" font-size="12" fill="#000">SCLDF SEAL</text>

  <<texttext x="400" y="580" text-anchor="middle" font-family="Courier" font-size="14" fill="#aaa">Symmetric Hash: 0xGROWTH_SAMA_69_BRINE</text>
</svg>
