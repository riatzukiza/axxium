<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="shadow">
      <<fefeDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
    <<linearlinearGradient id="marbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Plaque -->
  <<rectrect x="50" y="50" width="700" height="500" rx="20" fill="url(#marbleGrad)" stroke="#333" stroke-width="5" filter="url(#shadow)" />
  <<rectrect x="70" y="70" width="660" height="460" rx="10" fill="none" stroke="#999" stroke-width="2" />

  <!-- Header -->
  <<texttext x="400" y="130" font-family="serif" font-size="40" fill="#333" text-anchor="middle" font-weight="bold" font-style="italic">IN MEMORIAM</text>
  <<texttext x="400" y="160" font-family="serif" font-size="20" fill="#666" text-anchor="middle" letter-spacing="2">THE 36 LEAKED EVENT JOBS</text>

  <!-- Decorative Divider -->
  <<lineline x1="200" y1="180" x2="600" y2="180" stroke="#333" stroke-width="2" />

  <!-- Center Artwork: A pickle in a coffin or a zombie pickle -->
  <<gg transform="translate(400,300)">
    <!-- Coffin -->
    <<rectrect x="-80" y="20" width="160" height="60" rx="5" fill="#5d4037" stroke="#3e2723" stroke-width="3" />
    <!-- The Pickle (Zombie) -->
    <<ellipseellipse cx="0" cy="-20" rx="30" ry="50" fill="#4caf50" stroke="#2e7d32" stroke-width="2" />
    <<circlecircle cx="-10" cy="-40" r="3" fill="#fff" />
    <<circlecircle cx="10" cy="-40" r="3" fill="#fff" />
    <<pathpath d="M -5,-20 Q 0,-10 5,-20" fill="none" stroke="#000" stroke-width="2" />
    <!-- "Zombie" veins/marks -->
    <<pathpath d="M -15,-10 L -10,-5 M 10,0 L 15,5" stroke="#1b5e20" stroke-width="2" />
  </g>

  <!-- Epitaph -->
  <<texttext x="400" y="420" font-family="serif" font-size="24" fill="#333" text-anchor="middle" font-style="italic">"Refused to be cleared, persisted in a void,"</text>
  <<texttext x="400" y="450" font-family="serif" font-size="24" fill="#333" text-anchor="middle" font-style="italic">"until the Big Pickle EMS Squad arrived."</text>

  <!-- Footer -->
  <<texttext x="400" y="510" font-family="monospace" font-size="16" fill="#888" text-anchor="middle">COGNITIVE COLLAPSE DIVISION • CERTIFIED RECURSION</text>
</svg>
