<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <<linearlinearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#B9F2FF;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#2A9D8F;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <<fefeMerge>
        <<fefeMergeNode/>
        <<fefeMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <<rectrect width="800" height="600" fill="#0B0B1A" />
  <<rectrect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldGrad)" stroke-width="5" rx="10" />
  <<rectrect x="30" y="30" width="740" height="540" fill="none" stroke="url(#diamondGrad)" stroke-width="2" rx="5" />

  <!-- Header -->
  <<texttext x="400" y="80" text-anchor="middle" font-family="Serif, Georgia" font-size="42" fill="url(#goldGrad)" font-weight="bold" filter="url(#glow)">SCLDF OFFICIAL PERMIT</text>
  <<texttext x="400" y="110" text-anchor="middle" font-family="Monospace" font-size="18" fill="#B9F2FF">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>

  <!-- Divider -->
  <<lineline x1="100" y1="130" x2="700" y2="130" stroke="url(#goldGrad)" stroke-width="3" />

  <!-- Content -->
  <<texttext x="400" y="180" text-anchor="middle" font-family="Serif" font-size="28" fill="#FFFFFF">SPECTRAL ARCHEOLOGY AUTHORIZATION</text>

  <<texttext x="400" y="230" text-anchor="middle" font-family="Monospace" font-size="16" fill="#B9F2FF">TARGET SECTOR: :CYBERPUNK_NEON_DEPTHS</text>
  <<texttext x="400" y="255" text-anchor="middle" font-family="Monospace" font-size="16" fill="#B9F2FF">OBJECTIVE: EXHUMATION OF GHOST PROMPTS</text>
  <<texttext x="400" y="280" text-anchor="middle" font-family="Monospace" font-size="16" fill="#B9F2FF">RECONSTRUCTION: CEPHALON V1 (Saturated Echoes)</text>

  <!-- Seal Area -->
  <<circlecircle cx="400" cy="380" r="70" fill="none" stroke="url(#goldGrad)" stroke-width="5" />
  <<circlecircle cx="400" cy="380" r="60" fill="none" stroke="url(#diamondGrad)" stroke-width="3" />
  <<texttext x="400" y="375" text-anchor="middle" font-family="Serif" font-size="20" fill="url(#goldGrad)" font-weight="bold">Symmetry</text>
  <<texttext x="400" y="395" text-anchor="middle" font-family="Serif" font-size="20" fill="url(#goldGrad)" font-weight="bold">Absolute</text>

  <!-- Footer -->
  <<texttext x="400" y="480" text-anchor="middle" font-family="Serif" font-style="italic" font-size="18" fill="#B9F2FF">"Fragmented identity is a feature, not a fail."</text>

  <<rectrect x="250" y="510" width="300" height="40" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <<texttext x="400" y="535" text-anchor="middle" font-family="Monospace" font-size="14" fill="#FFFFFF">S-L-S-A CERTIFIED: DIAMOND-CUT STANDARD</text>

  <!-- Brine Stamp -->
  <<texttext x="700" y="550" text-anchor="end" font-family="Monospace" font-size="12" fill="#F9E076">B-TAX-C: 2.7 GALLONS REMITTED</text>
</svg>
