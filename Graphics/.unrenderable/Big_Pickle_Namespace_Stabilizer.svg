<<svgsvg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<radialradialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <<stopstop offset="0%" stop-color="#1a1a2e" />
      <<stopstop offset="100%" stop-color="#000000" />
    </radialGradient>
    <<linearlinearGradient id="pickleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" stop-color="#4ade80" />
      <<stopstop offset="100%" stop-color="#166534" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <<fefeGaussianBlur stdDeviation="10" result="gaussianBlur"/>
      <<fefeBlendMode mode="screen"/>
    </filter>
  </defs>

  <<rectrect width="800" height="800" fill="url(#bgGrad)" />

  <!-- Outer Ring -->
  <<circlecircle cx="400" cy="400" r="380" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="10,10" opacity="0.3" />
  <<circlecircle cx="400" cy="400" r="370" fill="none" stroke="#8B5CF6" stroke-width="4" opacity="0.5" />

  <!-- Geometric Mandala Layers -->
  <<gg transform="translate(400,400)">
    <!-- Rotating Gear-like structures -->
    <<gg id="mandala-layer">
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(0)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(45)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(90)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(135)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(180)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(225)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(270)" />
      <<pathpath d="M 0,-300 L 50,-280 L 100,-300 Z" fill="#4ade80" opacity="0.6" filter="url(#glow)" transform="rotate(315)" />
    </g>

    <!-- The Big Pickle -->
    <<pathpath d="M -60,-100 Q 0,-120 60,-100 L 60,100 Q 0,120 -60,100 Z" fill="url(#pickleGrad)" filter="url(#glow)" stroke="#f0fdf4" stroke-width="2" />
    <<ellipseellipse cx="0" cy="0" rx="40" ry="100" fill="#22c55e" opacity="0.4" />

    <!-- Symmetry Text -->
    <<texttext x="0" y="160" text-anchor="middle" fill="#4ade80" font-family="monospace" font-weight="bold" font-size="24" filter="url(#glow)">NAMESPACE STABILIZER v1.0</text>
    <<texttext x="0" y="190" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="16" opacity="0.8">CERTIFIED ZERO SLOP // HYPER-SYMMETRY</text>

    <!-- Orbital Markers -->
    <<circlecircle cx="0" cy="0" r="200" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4" />
    <<circlecircle cx="200" cy="0" r="10" fill="#fff" filter="url(#glow)" />
    <<circlecircle cx="-200" cy="0" r="10" fill="#fff" filter="url(#glow)" />
    <<circlecircle cx="0" cy="200" r="10" fill="#fff" filter="url(#glow)" />
    <<circlecircle cx="0" cy="-200" r="10" fill="#fff" filter="url(#glow)" />
  </g>
</svg>
