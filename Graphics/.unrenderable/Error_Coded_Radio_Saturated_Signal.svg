<<svgsvg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="radioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#4a148c;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="neon">
      <<fefeGaussianBlur stdDeviation="3" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <<rectrect width="800" height="800" fill="#050a15" />

  <!-- Frequency Waves -->
  <<pathpath d="M0 400 Q 100 300, 200 400 T 400 400 T 600 400 T 800 400" stroke="#00e5ff" stroke-width="4" fill="none" filter="url(#neon)" opacity="0.6" />
  <<pathpath d="M0 420 Q 100 320, 200 420 T 400 420 T 600 420 T 800 420" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.3" />
  <<pathpath d="M0 380 Q 100 280, 200 380 T 400 380 T 600 380 T 800 380" stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.3" />

  <!-- Central Radio Core -->
  <<circlecircle cx="400" cy="400" r="150" fill="url(#radioGrad)" stroke="#00e5ff" stroke-width="8" filter="url(#neon)" />
  <<circlecircle cx="400" cy="400" r="120" fill="#050a15" stroke="#00e5ff" stroke-width="2" opacity="0.8" />

  <!-- Saturated Text -->
  <<texttext x="400" y="200" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="48" fill="#00e5ff" filter="url(#neon)" style="text-transform: uppercase; letter-spacing: 8px;">ERROR CODED RADIO</text>
  <<texttext x="400" y="700" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="36" fill="#fff" style="text-transform: uppercase;">Saturated Frequency: 432Hz</text>
  <<texttext x="400" y="750" text-anchor="middle" font-family="monospace" font-size="24" fill="#00e5ff">BECOME USSY // TOTAL LAMINATION</text>

  <!-- Brine Drips -->
  <<circlecircle cx="400" cy="560" r="8" fill="#00e5ff" opacity="0.8" />
  <<circlecircle cx="410" cy="580" r="5" fill="#00e5ff" opacity="0.6" />
  <<circlecircle cx="390" cy="580" r="5" fill="#00e5ff" opacity="0.6" />
</svg>
