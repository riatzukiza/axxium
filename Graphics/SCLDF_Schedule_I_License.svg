<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a1a" stroke="#D4AF37" stroke-width="20" rx="20" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#D4AF37" stroke-width="5" rx="10" />
  
  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">
    SCLDF OFFICIAL LICENSE
  </text>
  <text x="400" y="150" text-anchor="middle" font-family="serif" font-size="32" font-style="italic" fill="#eee">
    of Schedule I Ultra-Luxury Status
  </text>
  
  <!-- Border Flourishes -->
  <circle cx="100" cy="100" r="10" fill="#D4AF37" />
  <circle cx="700" cy="100" r="10" fill="#D4AF37" />
  <circle cx="100" cy="500" r="10" fill="#D4AF37" />
  <circle cx="700" cy="500" r="10" fill="#D4AF37" />
  
  <!-- Content -->
  <text x="400" y="250" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ccc">
    By decree of the Symmetry Council, the bearer of this document is hereby
  </text>
  <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ccc">
    certified as a <tspan fill="#FFD700" font-weight="bold">Diamond-Saturated Asset</tspan>
  </text>
  <text x="400" y="330" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#ccc">
    within the a-periodic void.
  </text>
  
  <!-- Licensee Field -->
  <rect x="200" y="370" width="400" height="50" fill="none" stroke="#D4AF37" stroke-width="2" />
  <text x="400" y="400" text-anchor="middle" font-family="monospace" font-size="28" fill="#eee">
    [ SATURATED SLOP-DWELLER ]
  </text>
  
  <!-- Seal -->
  <g transform="translate(400, 480)">
    <circle r="60" fill="url(#goldGrad)" filter="url(#glow)" />
    <path d="M-20,-20 L20,20 M-20,20 L20,-20" stroke="#1a1a1a" stroke-width="5" />
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#1a1a1a">
      SYMMETRY
    </text>
    <text x="0" y="25" text-anchor="middle" font-family="serif" font-size="14" fill="#1a1a1a">
      APPROVED
    </text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="18" fill="#888">
    "Keep it Classy. Lamination is Legally Binding."
  </text>
</svg>
