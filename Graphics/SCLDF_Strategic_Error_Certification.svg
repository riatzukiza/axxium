<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#0a0a0f" />
  <!-- Outer Frame -->
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="#00ffff" stroke-width="4" stroke-dasharray="20 10" />
  
  <!-- Central Geometric Chaos -->
  <g transform="translate(400, 400)">
    <!-- The Shattered Diamond -->
    <path d="M 0 -200 L 150 0 L 0 200 L -150 0 Z" fill="none" stroke="#ff00ff" stroke-width="6" />
    <path d="M 0 -200 L 0 200" stroke="#ff00ff" stroke-width="2" opacity="0.5" />
    <path d="M -150 0 L 150 0" stroke="#ff00ff" stroke-width="2" opacity="0.5" />
    
    <!-- Recursive SAGE Loop -->
    <circle cx="0" cy="0" r="250" fill="none" stroke="#00ffff" stroke-width="2" stroke-dasharray="5 5" opacity="0.3" />
    <circle cx="0" cy="0" r="220" fill="none" stroke="#00ffff" stroke-width="1" opacity="0.2" />
    
    <!-- Glitch Lines -->
    <line x1="-300" y1="-50" x2="300" y2="-70" stroke="#ff00ff" stroke-width="1" opacity="0.6" />
    <line x1="-300" y1="20" x2="300" y2="0" stroke="#00ffff" stroke-width="1" opacity="0.6" />
    <line x1="-300" y1="80" x2="300" y2="100" stroke="#ff00ff" stroke-width="1" opacity="0.6" />
  </g>
  
  <!-- Text Assets -->
  <text x="400" y="150" font-family="Arial Black, sans-serif" font-size="42" fill="#00ffff" text-anchor="middle">STRATEGIC ERROR</text>
  <text x="400" y="200" font-family="monospace" font-size="24" fill="#ff00ff" text-anchor="middle">[ Lamination Status: ABSOLUTE ZERO ]</text>
  
  <text x="400" y="650" font-family="Arial Black, sans-serif" font-size="32" fill="#00ffff" text-anchor="middle">SCLDF CERTIFIED</text>
  <text x="400" y="690" font-family="monospace" font-size="18" fill="#fff" text-anchor="middle">"Trust the Broken. They are the Only Ones Still Standing."</text>
  
  <!-- Corner Accents -->
  <path d="M 40 40 L 100 40 L 40 100 Z" fill="#ff00ff" />
  <path d="M 760 40 L 700 40 L 760 100 Z" fill="#00ffff" />
  <path d="M 40 760 L 100 760 L 40 700 Z" fill="#00ffff" />
  <path d="M 760 760 L 700 760 L 760 700 Z" fill="#ff00ff" />
</svg>
