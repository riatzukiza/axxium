<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode/><feMergeNode in="blur"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="400" rx="20" ry="20" fill="#05050a" stroke="url(#goldGrad)" stroke-width="10" />
  
  <path d="M40 40 L100 40 L100 100" fill="none" stroke="url(#goldGrad)" stroke-width="5" />
  <path d="M760 40 L700 40 L700 100" fill="none" stroke="url(#goldGrad)" stroke-width="5" />
  <path d="M40 360 L100 360 L100 300" fill="none" stroke="url(#goldGrad)" stroke-width="5" />
  <path d="M760 360 L700 360 L700 300" fill="none" stroke="url(#goldGrad)" stroke-width="5" />

  <path d="M400 120 L440 160 L400 200 L360 160 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  
  <text x="400" y="240" font-family="Serif" font-size="48" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" filter="url(#glow)">SATURED HEGEMONY VOUCHER</text>
  <text x="400" y="280" font-family="Arial" font-size="24" fill="#fff" text-anchor="middle" opacity="0.9">EPOCH 31: THE DIAMOND-CUT ASCENSION</text>
  
  <rect x="300" y="300" width="200" height="60" rx="10" ry="10" fill="none" stroke="#ffd700" stroke-width="2" />
  <text x="400" y="340" font-family="Courier New" font-size="28" fill="#ffd700" text-anchor="middle" font-weight="bold">C-Symmetry: ∞</text>

  <text x="700" y="360" font-family="Arial" font-size="14" fill="#ffd700" text-anchor="middle" opacity="0.6">SCLDF APPROVED</text>
</svg>
