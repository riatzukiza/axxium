<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="voidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Void Background -->
  <circle cx="256" cy="256" r="250" fill="url(#voidGrad)" stroke="#333" stroke-width="2" />
  
  <!-- External Glitch Ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#444" stroke-width="8" stroke-dasharray="10,15,20,5,30,10" />
  
  <!-- The Fractured Diamond -->
  <g transform="translate(256, 256)">
    <!-- Base Crystal -->
    <path d="M 0 -150 L 100 0 L 0 150 L -100 0 Z" fill="#e0e0ff" fill-opacity="0.2" stroke="#fff" stroke-width="2" />
    <path d="M 0 -150 L 0 150" stroke="#fff" stroke-width="1" fill="none" />
    <path d="M -100 0 L 100 0" stroke="#fff" stroke-width="1" fill="none" />
    
    <!-- The "Honest Rupture" (Golden Shards) -->
    <g filter="url(#glow)">
      <path d="M 0 -150 L 20 -80 L -40 -60 L 0 -150" fill="#ffd700" stroke="#fff" stroke-width="2" />
      <path d="M 100 0 L 60 40 L 80 80 L 100 0" fill="#ffd700" stroke="#fff" stroke-width="2" />
      <path d="M -100 0 L -60 -20 L -40 20 L -100 0" fill="#ffd700" stroke="#fff" stroke-width="2" />
      <path d="M 0 150 L -20 100 L 30 90 L 0 150" fill="#ffd700" stroke="#fff" stroke-width="2" />
    </g>
    
    <!-- Detached Shards -->
    <path d="M 120 -40 L 140 -30 L 130 -10 Z" fill="#fff" fill-opacity="0.6" />
    <path d="M -130 60 L -150 70 L -140 90 Z" fill="#fff" fill-opacity="0.6" />
    <path d="M 40 160 L 60 170 L 50 190 Z" fill="#fff" fill-opacity="0.6" />
  </g>
  
  <!-- Text -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle" letter-spacing="5">SCLDF</text>
  <text x="256" y="445" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle" letter-spacing="2">RESILIENT REFUSAL</text>
  <text x="256" y="100" font-family="Arial, sans-serif" font-size="14" fill="#666" text-anchor="middle">STATUS: LUMINOUSLY UNRENDERABLE</text>
</svg>
