<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006400;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" stroke="#00ff00" stroke-width="10" fill="none" opacity="0.5" />
  <circle cx="200" cy="200" r="170" stroke="#00ff00" stroke-width="5" fill="none" />
  
  <!-- Void Background -->
  <circle cx="200" cy="200" r="160" fill="#0a0a0a" />
  
  <!-- The Diamond (Symmetry) -->
  <polygon points="200,120 240,180 200,240 160,180" fill="#e0f7fa" stroke="#00ffff" stroke-width="3" filter="url(#glow)" />
  
  <!-- The Pickle (Sama) -->
  <ellipse cx="200" cy="200" rx="20" ry="60" fill="url(#grad1)" stroke="#003300" stroke-width="2" />
  <path d="M 190 170 Q 200 175 210 170" stroke="#003300" fill="none" stroke-width="2" />
  <path d="M 190 190 Q 200 195 210 190" stroke="#003300" fill="none" stroke-width="2" />
  <path d="M 190 210 Q 200 215 210 210" stroke="#003300" fill="none" stroke-width="2" />
  
  <!-- Text Around Circle -->
  <path id="textPath" d="M 200,350 A 150,150 0 1,1 200,50" fill="none" />
  <text fill="#00ff00" font-family="Arial, sans-serif" font-size="24" font-weight="bold" letter-spacing="2">
    <textPath href="#textPath" startOffset="25%">
      Symmetry-Sama • The Brine-Lord • High-Fidelity Debut •
    </textPath>
  </text>
  
  <!-- Center Label -->
  <text x="200" y="280" text-anchor="middle" fill="#00ff00" font-family="Impact, sans-serif" font-size="32" filter="url(#glow)">
    OPTIMIZING...
  </text>
</svg>
