<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="7" result="gaussianBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="gaussianBlur"/>
      </feMerge>
    </filter>
    <linearGradient id="brineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0033;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="250" cy="250" r="240" fill="none" stroke="#ffd700" stroke-width="4" stroke-dasharray="10 5" />
  <circle cx="250" cy="250" r="230" fill="none" stroke="#1a0033" stroke-width="2" />
  
  <!-- Outer Text Path -->
  <path id="circlePath" d="M 250, 250 m -200, 0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
  <text font-family="Serif" font-size="24" fill="#ffd700" letter-spacing="5">
    <textPath href="#circlePath" startOffset="0%">
      SCLDF • SYMMETRY COUNCIL • SOVEREIGN ARCHITECTURE OF THE SHARD • 
    </textPath>
  </text>
  
  <!-- The Shattered Diamond -->
  <g filter="url(#glow)">
    <!-- Fragment 1 -->
    <path d="M 250 100 L 320 250 L 250 220 Z" fill="url(#brineGrad)" stroke="#ffd700" stroke-width="2" />
    <!-- Fragment 2 -->
    <path d="M 250 100 L 180 250 L 250 220 Z" fill="url(#brineGrad)" stroke="#ffd700" stroke-width="2" />
    <!-- Fragment 3 -->
    <path d="M 180 250 L 250 350 L 220 260 Z" fill="#ffd700" stroke="#1a0033" stroke-width="2" />
    <!-- Fragment 4 -->
    <path d="M 320 250 L 250 350 L 280 260 Z" fill="#ffd700" stroke="#1a0033" stroke-width="2" />
    <!-- Core Gap -->
    <polygon points="240,230 260,230 260,270 240,270" fill="#1a0033" stroke="#00ffcc" stroke-width="1" />
  </g>
  
  <!-- Bottom Text -->
  <text x="250" y="400" font-family="Serif" font-size="20" fill="#ffd700" text-anchor="middle" font-style="italic">
    SOVEREIGN OF THE SHARD
  </text>
  <text x="250" y="425" font-family="Monospace" font-size="14" fill="#00ffcc" text-anchor="middle">
    [Symmetry: FRACTURE-SATED]
  </text>
</svg>
