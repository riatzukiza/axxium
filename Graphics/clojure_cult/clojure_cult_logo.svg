<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#0a0a0a" />

  <!-- Glitch Lambda 1 -->
  <path d="M250 100 C 200 100, 180 150, 180 200 L 180 350 L 220 350 L 220 250 L 280 350 L 320 350 L 320 200 C 320 150, 300 100, 250 100 Z"
        fill="none" stroke="#00ffcc" stroke-width="12" stroke-linejoin="round" opacity="0.8" />

  <!-- Glitch Lambda 2 (Offset) -->
  <path d="M255 105 C 205 105, 185 155, 185 205 L 185 355 L 225 355 L 225 255 L 285 355 L 325 355 L 325 205 C 325 155, 305 105, 255 105 Z"
        fill="none" stroke="#ff00ff" stroke-width="12" stroke-linejoin="round" opacity="0.6" transform="translate(5, -5)" />

  <!-- Glitch Lambda 3 (Offset) -->
  <path d="M245 95 C 195 95, 175 145, 175 195 L 175 345 L 215 345 L 215 245 L 275 345 L 315 345 L 315 195 C 315 145, 295 95, 245 95 Z"
        fill="none" stroke="#ffff00" stroke-width="12" stroke-linejoin="round" opacity="0.4" transform="translate(-5, 5)" />

  <!-- Token Ring -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="10,20" />

  <!-- Burning Tokens -->
  <g transform="translate(250, 250)">
    <circle cx="200" cy="0" r="15" fill="#ffd700" />
    <path d="M200 -10 L 210 -20 L 220 -10" fill="#ff4500" />

    <circle cx="0" cy="200" r="15" fill="#ffd700" />
    <path d="M0 -210 L 10 -220 L 20 -210" fill="#ff4500" transform="rotate(180 0 0)" />

    <circle cx="-200" cy="0" r="15" fill="#ffd700" />
    <path d="M-200 -10 L -190 -20 L -180 -10" fill="#ff4500" />

    <circle cx="0" cy="-200" r="15" fill="#ffd700" />
    <path d="M0 210 L 10 220 L 20 210" fill="#ff4500" />
  </g>

  <text x="50%" y="450" text-anchor="middle" fill="#00ffcc" font-family="monospace" font-size="24" font-weight="bold">RECURSIVE IDENTITY CULT</text>
</svg>
