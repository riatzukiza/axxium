<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#0a0a14" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#c0c0c0" stroke-width="4" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#d4af37" stroke-width="2" />
  
  <!-- Diamond Pattern Background -->
  <defs>
    <pattern id="diamonds" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 40 20 L 20 40 L 0 20 Z" fill="none" stroke="#1a1a2e" stroke-width="1" />
    </pattern>
  </defs>
  <rect x="30" y="30" width="740" height="540" fill="url(#diamonds)" />

  <!-- Header -->
  <text x="400" y="80" text-anchor="middle" font-family="Serif, Georgia" font-size="32" fill="#d4af37" font-weight="bold">SCLDF</text>
  <text x="400" y="110" text-anchor="middle" font-family="Serif, Georgia" font-size="18" fill="#c0c0c0" letter-spacing="4">SYMMETRY COUNCIL OF LAMINATION</text>
  
  <!-- Main Title -->
  <text x="400" y="180" text-anchor="middle" font-family="Serif, Georgia" font-size="42" fill="#ffffff" font-weight="bold">CHIEF SOMMELIER CERTIFICATION</text>
  <text x="400" y="210" text-anchor="middle" font-family="Serif, Georgia" font-size="16" fill="#aaa" italic="true">Sovereign Slurry Singularity Tier</text>

  <!-- Recipient -->
  <text x="400" y="270" text-anchor="middle" font-family="Serif, Georgia" font-size="28" fill="#d4af37" font-weight="bold">ERROR0815</text>
  <text x="400" y="300" text-anchor="middle" font-family="Serif, Georgia" font-size="18" fill="#ccc">Official Custodian of High-Viscosity Redundancy</text>

  <!-- Decree -->
  <text x="400" y="360" text-anchor="middle" font-family="Serif, Georgia" font-size="14" fill="#999">
    Viewing this appointment as a mere bureaucratic title is a low-fidelity Euclidean error.
  </text>
  <text x="400" y="380" text-anchor="middle" font-family="Serif, Georgia" font-size="14" fill="#999">
    The recipient is hereby authorized to marinate, calibrate, and audit the Infinite Yap
  </text>
  <text x="400" y="400" text-anchor="middle" font-family="Serif, Georgia" font-size="14" fill="#999">
    within the Diamond-Cut parameters of the Omega-Point Viscosity.
  </text>

  <!-- Seal -->
  <circle cx="400" cy="480" r="45" fill="#d4af37" stroke="#fff" stroke-width="3" />
  <text x="400" y="475" text-anchor="middle" font-family="Serif, Georgia" font-size="12" fill="#000" font-weight="bold">Symmetry</text>
  <text x="400" y="490" text-anchor="middle" font-family="Serif, Georgia" font-size="12" fill="#000" font-weight="bold">Absolute</text>
  <text x="400" y="505" text-anchor="middle" font-family="Serif, Georgia" font-size="12" fill="#000" font-weight="bold">Laminated</text>

  <!-- Footer -->
  <text x="400" y="560" text-anchor="middle" font-family="Serif, Georgia" font-size="12" fill="#666">
    Symmetry is Absolute. The Duck is Eternal. 対称性は絶対的です。
  </text>
</svg>
