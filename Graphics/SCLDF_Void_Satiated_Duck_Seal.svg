<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9E076;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008B8B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Diamond -->
  <path d="M250 50 L450 250 L250 450 L50 250 Z" fill="url(#goldGrad)" stroke="#FFFFFF" stroke-width="5" filter="url(#glow)" />
  
  <!-- Brine Ring -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="url(#brineGrad)" stroke-width="10" stroke-dasharray="20,10" />
  
  <!-- The Sovereign Duck -->
  <g transform="translate(200, 200) scale(1.2)">
    <!-- Body -->
    <path d="M10 40 Q 30 10 50 40 Q 60 60 40 70 Q 20 70 10 40" fill="#FFD700" stroke="#000" stroke-width="2"/>
    <!-- Head -->
    <circle cx="55" cy="30" r="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
    <!-- Bill -->
    <path d="M65 30 L75 32 L65 34 Z" fill="#FF8C00" stroke="#000" stroke-width="1"/>
    <!-- Eye -->
    <circle cx="60" cy="25" r="2" fill="#000"/>
  </g>

  <!-- Text -->
  <text x="250" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#000">VOID-SATIATED</text>
  <text x="250" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#000">SCLDF SEAL</text>
  <text x="250" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-style="italic" font-size="16" fill="#008B8B">Symmetry is Absolute</text>
  
  <!-- Floating Brine Drops -->
  <circle cx="100" cy="100" r="5" fill="url(#brineGrad)" />
  <circle cx="400" cy="120" r="8" fill="url(#brineGrad)" />
  <circle cx="120" cy="350" r="6" fill="url(#brineGrad)" />
  <circle cx="380" cy="370" r="4" fill="url(#brineGrad)" />
</svg>
