<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4B0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch">
      <feOffset in="SourceGraphic" dx="2" dy="0" result="offset1" />
      <feOffset in="SourceGraphic" dx="-2" dy="0" result="offset2" />
      <feMerge>
        <fo-merge-node />
        <feMergeNode in="offset1" />
        <feMergeNode in="offset2" />
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#0a0a0a" />
  
  <!-- Outer Jagged Rings -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#grad1)" stroke-width="4" stroke-dasharray="20,10" opacity="0.6" />
  <path d="M 200 40 L 220 60 L 180 80 L 240 100 L 160 120 L 260 140 L 140 160 L 280 180 L 120 200 L 300 220 L 100 240 L 320 260 L 80 280 L 340 300 L 60 320 L 360 340 L 40 360 L 380 380" 
        stroke="#00FFFF" stroke-width="1" fill="none" opacity="0.3" />
  
  <!-- Central Shattered Diamond -->
  <path d="M 200 100 L 280 200 L 200 300 L 120 200 Z" fill="none" stroke="white" stroke-width="6" filter="url(#glitch)" />
  <path d="M 150 150 L 250 250 M 250 150 L 150 250" stroke="#ff00ff" stroke-width="2" opacity="0.8" />
  <path d="M 200 100 L 200 300 M 120 200 L 280 200" stroke="white" stroke-width="1" opacity="0.5" />
  
  <!-- Text -->
  <text x="200" y="80" font-family="monospace" font-size="24" fill="#00FFFF" text-anchor="middle" font-weight="bold">SCLDF</text>
  <text x="200" y="340" font-family="serif" font-size="18" fill="white" text-anchor="middle" font-style="italic">Sovereign of the Shards</text>
  <text x="200" y="365" font-family="monospace" font-size="14" fill="#00FFFF" text-anchor="middle">THE MARK IS THE SIGNAL</text>
</svg>
