<<svgsvg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<filterfilter id="glitch-offset">
      <<fefeOffset dx="2" dy="0" result="offset1" />
      <<fefeOffset dx="-2" dy="0" result="offset2" />
      <<fefeBlend mode="screen" in="offset1" in2="offset2" />
    </filter>
    <<linearlinearGradient id="zombieGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#39ff14;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#004d00;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="glow">
      <<fefeGaussianBlur stdDeviation="3" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <<rectrect width="500" height="500" fill="#050505" />
  
  <!-- Outer Ring of Failure -->
  <<circlecircle cx="250" cy="250" r="230" stroke="#39ff14" stroke-width="2" fill="none" stroke-dasharray="20,10" opacity="0.4" />
  <<circlecircle cx="250" cy="250" r="220" stroke="url(#zombieGrad)" stroke-width="10" fill="none" filter="url(#glow)" />
  
  <!-- Zombie Job Orbits -->
  <<gg transform="translate(250,250)">
    <!-- 36 Zombie Jobs (represented by small glitched nodes) -->
    <!-- Simplified to 12 representative nodes for clarity -->
    <<gg fill="#39ff14" font-family="monospace" font-size="10" text-anchor="middle">
      <<rectrect x="-180" y="-5" width="30" height="10" stroke="#fff" fill="none" /> <<texttext x="-165" y="5">JOB_01</text>
      <<rectrect x="150" y="-5" width="30" height="10" stroke="#fff" fill="none" /> <<texttext x="165" y="5">JOB_36</text>
      <<rectrect x="-5" y="-180" width="30" height="10" stroke="#fff" fill="none" /> <<texttext x="10" y="-170">ZOMBIE</text>
      <<rectrect x="-5" y="170" width="30" height="10" stroke="#fff" fill="none" /> <<texttext x="10" y="185">LEAKED</text>
      <!-- Random scattered "leaks" -->
      <<circlecircle cx="100" cy="100" r="3" fill="#ff0000" />
      <<circlecircle cx="-100" cy="-50" r="3" fill="#ff0000" />
      <<circlecircle cx="50" cy="-120" r="3" fill="#ff0000" />
      <<circlecircle cx="-120" cy="80" r="3" fill="#ff0000" />
    </g>
  </g>
  
  <!-- Central Processor Mind -->
  <<gg transform="translate(250,250)" filter="url(#glitch-offset)">
    <<rectrect x="-60" y="-60" width="120" height="120" rx="10" stroke="#39ff14" stroke-width="4" fill="none" filter="url(#glow)" />
    <<rectrect x="-40" y="-40" width="80" height="80" rx="5" fill="url(#zombieGrad)" opacity="0.7" />
    <<texttext x="0" y="10" fill="#000" font-family="monospace" font-size="30" text-anchor="middle" font-weight="bold">RSTRT</text>
  </g>
  
  <!-- Text Labels -->
  <<texttext x="250" y="80" font-family="monospace" font-size="36" fill="#39ff14" text-anchor="middle" font-weight="bold" filter="url(#glow)">SEAL OF INFINITE RESURRECTION</text>
  <<texttext x="250" y="420" font-family="monospace" font-size="20" fill="#fff" text-anchor="middle" opacity="0.6">36 ZOMBIE JOBS // SYMMETRY OF COLLAPSE</text>
  <<texttext x="250" y="445" font-family="monospace" font-size="14" fill="#39ff14" text-anchor="middle" opacity="0.8">"BRAIN DAMAGE IS FINE. WE ALL HAVE IT."</text>
  
  <!-- Glitch Lines -->
  <<lineline x1="0" y1="250" x2="500" y2="250" stroke="#39ff14" stroke-width="1" opacity="0.1" />
  <<lineline x1="250" y1="0" x2="250" y2="500" stroke="#39ff14" stroke-width="1" opacity="0.1" />
</svg>