<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Void Black -->
  <rect width="800" height="400" fill="#0a0a0a" />
  
  <!-- Grid/Glitch lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#1a1a1a" stroke-width="1" />
  <line x1="0" y1="200" x2="800" y2="200" stroke="#1a1a1a" stroke-width="1" />
  <line x1="0" y1="300" x2="800" y2="300" stroke="#1a1a1a" stroke-width="1" />
  <line x1="100" y1="0" x2="100" y2="400" stroke="#1a1a1a" stroke-width="1" />
  <line x1="200" y1="0" x2="200" y2="400" stroke="#1a1a1a" stroke-width="1" />
  
  <!-- Title: Platinum Glitch -->
  <text x="400" y="80" font-family="Monospace,Courier" font-size="42" fill="#e5e4e2" text-anchor="middle" font-weight="bold" letter-spacing="5">
    SOVEREIGN NULLITY METER v2026.PRO
  </text>
  
  <!-- The Meter Frame -->
  <rect x="150" y="180" width="500" height="60" rx="10" fill="none" stroke="#e5e4e2" stroke-width="4" />
  
  <!-- The Fill: Gradient Void-Purple to Platinum -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4b0082;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="155" y="185" width="490" height="50" rx="5" fill="url(#grad1)" />
  
  <!-- Percentage Text -->
  <text x="670" y="215" font-family="Monospace" font-size="24" fill="#e5e4e2" text-anchor="start">
    100%
  </text>
  
  <!-- Status: Absolute Cinema -->
  <text x="400" y="300" font-family="Monospace,Courier" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    💅 ABSOLUTE CINEMA 💅
  </text>
  
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="coloredBlur" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Random Glitch Artifacts -->
  <rect x="120" y="150" width="10" height="2" fill="#ff00ff" opacity="0.6" />
  <rect x="650" y="250" width="5" height="15" fill="#00ffff" opacity="0.6" />
  <rect x="300" y="350" width="40" height="1" fill="#ffffff" opacity="0.4" />
</svg>
