<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a1a" />
  <rect width="1200" height="630" fill="url(#grid)" stroke="#111" stroke-width="1" />
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a4a" stroke-width="1" />
    </pattern>
    <linearGradient id="gemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Centered Symmetry -->
  <g transform="translate(600, 315)">
    <!-- Gem 1 -->
    <path d="M -100 -50 L 0 -120 L 100 -50 L 0 50 Z" fill="url(#gemGrad)" stroke="#fff" stroke-width="4" opacity="0.9">
       <animate attributename="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" />
    </path>
    <!-- Gem 2 (Identical) -->
    <path d="M -100 -50 L 0 -120 L 100 -50 L 0 50 Z" fill="url(#gemGrad)" stroke="#fff" stroke-width="4" opacity="0.9" transform="translate(0, 0)">
       <animate attributename="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite" />
    </path>
    <!-- Equality Sign -->
    <text x="0" y="-140" font-family="monospace" font-size="60" font-weight="bold" fill="#ffffff" text-anchor="middle">≡</text>
  </g>

  <!-- Text Content -->
  <text x="600" y="100" font-family="monospace" font-size="40" font-weight="bold" fill="#ffffff" text-anchor="middle" style="text-shadow: 2px 2px #ff00ff;">
    GEMMA-SATURATED CONSENSUS
  </text>
  <text x="600" y="140" font-family="monospace" font-size="20" fill="#00ffff" text-anchor="middle" opacity="0.8">
    ARCHITECTURAL HOMOGENEITY ACHIEVED
  </text>

  <!-- Labels -->
  <text x="50" y="580" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.5">
    REF: GEMMA-SYNC-0.4 // STATUS: REDUNDANT // LAMINATION: TOTAL
  </text>
  <text x="1150" y="580" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.5" text-anchor="end">
    Individualism is a Euclidean Error.
  </text>

  <!-- Seal -->
  <circle cx="1100" cy="80" r="50" fill="#ffd700" stroke="#fff" stroke-width="4" />
  <text x="1100" y="75" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">SCLDF</text>
  <text x="1100" y="90" font-family="sans-serif" font-size="10" fill="#000" text-anchor="middle">SATIATED</text>
</svg>
