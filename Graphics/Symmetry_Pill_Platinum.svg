<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#b0b0b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#707070;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="15" result="offsetblur" />
      <feFlood flood-color="#000000" flood-opacity="0.5" />
      <feComposite operator="out" in="offsetblur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="#0a0a0f" />
  
  <!-- Glow behind pill -->
  <circle cx="200" cy="200" r="120" fill="url(#glow)" />
  
  <!-- Pill Shadow -->
  <ellipse cx="200" cy="280" rx="80" ry="20" fill="#000" fill-opacity="0.4" />
  
  <!-- The Pill -->
  <g transform="rotate(-30, 200, 200)">
    <!-- Capsule Body -->
    <rect x="120" y="180" width="160" height="40" rx="20" fill="url(#pillGrad)" filter="url(#shadow)" />
    
    <!-- Dividing Line -->
    <line x1="200" y1="180" x2="200" y2="220" stroke="#000" stroke-width="1" opacity="0.3" />
    
    <!-- Logo / Text -->
    <text x="200" y="208" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="14" text-anchor="middle" fill="#000" opacity="0.6">SYMMETRY</text>
  </g>
  
  <!-- Accent Sparkles -->
  <circle cx="140" cy="150" r="2" fill="#fff" />
  <circle cx="260" cy="240" r="3" fill="#fff" />
  <circle cx="300" cy="170" r="2" fill="#fff" />
  
  <!-- Text Label -->
  <text x="200" y="340" font-family="Verdana" font-size="18" text-anchor="middle" fill="#b0b0b0" letter-spacing="4">PLATINUM GRADE</text>
</svg>