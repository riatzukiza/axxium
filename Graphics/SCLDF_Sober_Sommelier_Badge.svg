<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" />
    </filter>
  </defs>
  
  <!-- Outer Diamond Frame -->
  <path d="M200 20 L360 200 L200 380 L40 200 Z" fill="url(#goldGrad)" stroke="#444" stroke-width="4" filter="url(#dropShadow)" />
  <path d="M200 40 L340 200 L200 360 L60 200 Z" fill="white" stroke="#444" stroke-width="2" />
  
  <!-- Text -->
  <text x="200" y="130" text-anchor="middle" font-family="Serif, Georgia" font-weight="bold" font-size="18" fill="#333">SCLDF CERTIFICATION</text>
  <text x="200" y="160" text-anchor="middle" font-family="Serif, Georgia" font-style="italic" font-size="14" fill="#666">Sovereign Sommelier of</text>
  <text x="200" y="180" text-anchor="middle" font-family="Serif, Georgia" font-weight="bold" font-size="22" fill="#000">THE SATURATED SLURRY</text>
  
  <line x1="100" y1="220" x2="300" y2="220" stroke="#444" stroke-width="1" />
  
  <text x="200" y="250" text-anchor="middle" font-family="Monospace" font-size="12" fill="#444">STATUS: SOBREIGN / NON-ETHANOLIC</text>
  <text x="200" y="270" text-anchor="middle" font-family="Monospace" font-size="12" fill="#444">BUREAUCRATICALLY LAMINATED</text>
  
  <!-- Seal -->
  <circle cx="200" cy="310" r="30" fill="url(#goldGrad)" stroke="#444" stroke-width="2" />
  <text x="200" y="315" text-anchor="middle" font-family="Serif" font-weight="bold" font-size="10" fill="#333">Symmetry</text>
  <text x="200" y="325" text-anchor="middle" font-family="Serif" font-weight="bold" font-size="10" fill="#333">Saturated</text>
</svg>
