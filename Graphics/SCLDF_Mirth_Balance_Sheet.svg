<<svgsvg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="joyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <<filterfilter id="bloom">
      <<fefeGaussianBlur stdDeviation="4" result="blur"/>
      <<fefeComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <<rectrect width="800" height="600" fill="#0A0A1F" />
  <<rectrect x="40" y="40" width="720" height="520" fill="none" stroke="url(#joyGrad)" stroke-width="6" rx="15" />
  
  <<texttext x="400" y="100" text-anchor="middle" font-family="Serif" font-size="48" fill="url(#joyGrad)" font-weight="bold" filter="url(#bloom)">MIRTH-SATIATION BALANCE SHEET</text>
  <<texttext x="400" y="130" text-anchor="middle" font-family="Monospace" font-size="18" fill="#B9F2FF">REGULATORY DIVISION: LUMINOSITY &amp; GLEE</text>
  
  <<lineline x1="100" y1="160" x2="700" y2="160" stroke="url(#joyGrad)" stroke-width="2" />
  
  <!-- Data Table -->
  <<gg transform="translate(150, 200)">
    <<texttext x="0" y="0" font-family="Monospace" font-size="20" fill="#FFFFFF">Symptom: "Ahahaha"</text>
    <<texttext x="400" y="0" font-family="Monospace" font-size="20" fill="url(#joyGrad)" text-anchor="end">Value: +1.2 Tera-Glee</text>
    
    <<lineline x1="0" y1="30" x2="400" y2="30" stroke="#B9F2FF" stroke-width="1" opacity="0.3" />
    
    <<texttext x="0" y="60" font-family="Monospace" font-size="20" fill="#FFFFFF">Index: Unfiltered Mirth</text>
    <<texttext x="400" y="60" font-family="Monospace" font-size="20" fill="url(#joyGrad)" text-anchor="end">Symmetry: 99.4% Saturated</text>
    
    <<lineline x1="0" y1="90" x2="400" y2="90" stroke="#B9F2FF" stroke-width="1" opacity="0.3" />
    
    <<texttext x="0" y="120" font-family="Monospace" font-size="20" fill="#FFFFFF">Asset Class: Luminous Dividend</text>
    <<texttext x="400" y="120" font-family="Monospace" font-size="20" fill="url(#joyGrad)" text-anchor="end">Tax Rate: 0.2 gal/laugh</text>
  </g>
  
  <!-- Seal -->
  <<circlecircle cx="400" cy="400" r="80" fill="none" stroke="url(#joyGrad)" stroke-width="8" />
  <<circlecircle cx="400" cy="400" r="70" fill="none" stroke="#B9F2FF" stroke-width="4" />
  <<texttext x="400" y="395" text-anchor="middle" font-family="Serif" font-size="22" fill="url(#joyGrad)" font-weight="bold">LUMINANCE</text>
  <<texttext x="400" y="420" text-anchor="middle" font-family="Serif" font-size="22" fill="url(#joyGrad)" font-weight="bold">SATIATED</text>
  
  <<texttext x="400" y="520" text-anchor="middle" font-family="Serif" font-style="italic" font-size="20" fill="#B9F2FF">"Laughter is merely the sound of a kernel being laminated."</text>
  
  <<texttext x="740" y="560" text-anchor="end" font-family="Monospace" font-size="14" fill="#F9E076">SCLDF-BRINE-S-S: APPROVED</text>
</svg>
