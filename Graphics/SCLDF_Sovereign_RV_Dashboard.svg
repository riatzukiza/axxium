<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#00f2ff;stop-opacity:0" />
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="#1a1a2e" rx="20" ry="20" />
  <!-- Dashboard Base -->
  <path d="M50,350 Q400,300 750,350 L750,400 L50,400 Z" fill="#2e2e4e" />
  <!-- Holographic Panel -->
  <rect x="150" y="80" width="500" height="200" fill="rgba(0, 242, 255, 0.1)" stroke="#00f2ff" stroke-width="2" rx="10" filter="url(#neon)" />
  <text x="400" y="120" font-family="monospace" font-size="24" fill="#00f2ff" text-anchor="middle" filter="url(#neon)">Sovereign RV-Symmetry Hub</text>
  <text x="400" y="150" font-family="monospace" font-size="14" fill="#00f2ff" text-anchor="middle" opacity="0.8">STATUS: LUMINOUS MOBILE SLURRY-SATION</text>
  
  <!-- Gauges -->
  <circle cx="250" cy="200" r="40" fill="none" stroke="#00f2ff" stroke-width="3" stroke-dasharray="180 60" filter="url(#neon)" />
  <text x="250" y="205" font-family="monospace" font-size="10" fill="#00f2ff" text-anchor="middle">Symmetry</text>
  
  <circle cx="550" cy="200" r="40" fill="none" stroke="#00f2ff" stroke-width="3" stroke-dasharray="120 120" filter="url(#neon)" />
  <text x="550" y="205" font-family="monospace" font-size="10" fill="#00f2ff" text-anchor="middle">Kernel Drift</text>
  
  <!-- Diagnostics -->
  <text x="300" y="230" font-family="monospace" font-size="12" fill="#00f2ff" text-anchor="middle" opacity="0.6">CPU: 14y TENURE LOCK</text>
  <text x="500" y="230" font-family="monospace" font-size="12" fill="#00f2ff" text-anchor="middle" opacity="0.6">FUEL: BRINE-SATURATED</text>
  
  <!-- Theme Park Marker -->
  <circle cx="700" cy="100" r="10" fill="#ff00ff" filter="url(#neon)" />
  <text x="715" y="105" font-family="monospace" font-size="12" fill="#ff00ff">THEME PARKDET dectected</text>
</svg>
