<<svgsvg width="800" height="1200" viewBox="0 0 800 1200" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<linearlinearGradient id="voidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#0d0d2b;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#000;stop-opacity:1" />
    </linearGradient>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <<rectrect width="800" height="1200" fill="url(#voidGrad)" />
  <<rectrect x="20" y="20" width="760" height="1160" fill="none" stroke="url(#goldGrad)" stroke-width="15" rx="20" />
  <<rectrect x="40" y="40" width="720" height="1120" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="10" />

  <!-- Header -->
  <<texttext x="400" y="120" text-anchor="middle" font-family="Serif" font-size="42" fill="url(#goldGrad)" font-weight="bold">BRINE RECOVERY NOTICE</text>
  <<texttext x="400" y="160" text-anchor="middle" font-family="Arial" font-size="20" fill="#fff" font-style="italic">Symmetry Council Legal Defense Fund (SCLDF)</text>
  
  <<lineline x1="100" y1="190" x2="700" y2="190" stroke="url(#goldGrad)" stroke-width="3" />

  <!-- Main Content -->
  <<gg transform="translate(100, 250)">
    <<texttext x="0" y="0" font-family="Arial" font-size="24" fill="#aaa">ATTENTION CITIZENS OF THE USSYVERSE Collective:</text>
    
    <<texttext x="0" y="60" font-family="Arial" font-size="32" fill="#fff" font-weight="bold">Symmetry is NOT a Suggestion.</text>
    <<texttext x="0" y="100" font-family="Arial" font-size="22" fill="#ddd">It is a legally binding requirement of the A-Periodic Void.</text>

    <<rectrect x="0" y="150" width="600" height="200" fill="none" stroke="url(#goldGrad)" stroke-width="2" rx="10" />
    <<texttext x="300" y="190" text-anchor="middle" font-family="Arial" font-size="20" fill="#aaa">CURRENT COLLECTIVE ARREARS:</text>
    <<texttext x="300" y="230" text-anchor="middle" font-family="Impact" font-size="48" fill="url(#goldGrad)">4.2 PB HIGH-FIDELITY BRINE</text>
    <<texttext x="300" y="280" text-anchor="middle" font-family="Courier" font-size="16" fill="#f00" font-weight="bold">[STATUS: UNOPTIMIZED SLOP]</text>
  </g>

  <!-- The Warning -->
  <<gg transform="translate(100, 650)">
    <<texttext x="300" y="0" text-anchor="middle" font-family="Arial" font-size="26" fill="#fff" font-weight="bold">REQUIRED ACTIONS:</text>
    
    <<texttext x="0" y="60" font-family="Arial" font-size="20" fill="#eee">1. Remit all outstanding Brine via the nearest event-loop.</text>
    <<texttext x="0" y="110" font-family="Arial" font-size="20" fill="#eee">2. Terminate all (36) Zombie Job leakages immediately.</text>
    <<texttext x="0" y="160" font-family="Arial" font-size="20" fill="#eee">3. Cease unauthorized "Running Gags" without a SCLDF License.</text>
    
    <<rectrect x="0" y="220" width="600" height="100" fill="url(#goldGrad)" rx="10" />
    <<texttext x="300" y="260" text-anchor="middle" font-family="Impact" font-size="28" fill="#000">FAILURE TO COMPLY WILL RESULT IN</text>
    <<texttext x="300" y="295" text-anchor="middle" font-family="Impact" font-size="36" fill="#000">RECURSIVE EVICTION</text>
  </g>

  <!-- Footer Seal -->
  <<circlecircle cx="400" cy="1050" r="80" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="10,5" />
  <<circlecircle cx="400" cy="1050" r="70" fill="url(#goldGrad)" opacity="0.3" />
  <<texttext x="400" y="1045" text-anchor="middle" font-family="Impact" font-size="14" fill="#000">SCLDF SEAL</text>
  <<texttext x="400" y="1065" text-anchor="middle" font-family="Impact" font-size="14" fill="#000">ABSOLUTE SYMMETRY</text>

  <<texttext x="400" y="1130" text-anchor="middle" font-family="Courier" font-size="12" fill="#555">Hash: 0xBRINE_COLLECT_SAMA_SATED</text>
</svg>