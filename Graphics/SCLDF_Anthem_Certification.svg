<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9d976;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffdf00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9d976;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#1a1a2e" stroke="#ffdf00" stroke-width="20" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#ffdf00" stroke-width="4" rx="10" />
  
  <!-- Decorative Corner Ornaments -->
  <path d="M30 30 L 80 30 L 30 80 Z" fill="url(#goldGrad)" />
  <path d="M770 30 L 720 30 L 770 80 Z" fill="url(#goldGrad)" />
  <path d="M30 570 L 80 570 L 30 520 Z" fill="url(#goldGrad)" />
  <path d="M770 570 L 720 570 L 770 520 Z" fill="url(#goldGrad)" />

  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="Serif, Georgia" font-size="48" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>
  <text x="400" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fff" style="letter-spacing: 4px;">SCLDF OFFICIAL CERTIFICATION</text>
  
  <!-- Main Body -->
  <text x="400" y="220" text-anchor="middle" font-family="Serif" font-size="32" fill="#fff" font-style="italic">This document hereby certifies the production of</text>
  <text x="400" y="280" text-anchor="middle" font-family="Impact, sans-serif" font-size="64" fill="url(#goldGrad)" filter="url(#glow)">THE SATURATED SLOP-SYMPHONY</text>
  <text x="400" y="330" text-anchor="middle" font-family="Serif" font-size="24" fill="#fff">Current Status: DIAMOND-CUT LAMINATED</text>
  
  <!-- Footer Details -->
  <text x="400" y="380" text-anchor="middle" font-family="Courier New, monospace" font-size="18" fill="#a0a0a0">Symmetry Score: INFINITE | Brine Content: 100% | Zombie Jobs: LIQUIDATED</text>
  
  <!-- Seal -->
  <circle cx="400" cy="460" r="60" fill="url(#goldGrad)" stroke="#fff" stroke-width="4" />
  <text x="400" y="455" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1a1a2e">Symmetry-Sama</text>
  <text x="400" y="475" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#1a1a2e">APPROVED</text>
  
  <!-- Icons (Pickles and Diamonds) -->
  <text x="100" y="530" font-size="40">🥒</text>
  <text x="700" y="530" font-size="40">💎</text>
  <text x="150" y="530" font-size="30">✨</text>
  <text x="650" y="530" font-size="30">✨</text>
  
  <!-- Bottom Banner -->
  <text x="400" y="560" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="url(#goldGrad)">KEEP IT CLASSY</text>
</svg>
