<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="blur" />
      </feMerge>
    </filter>
  </defs>
  <rect width="600" height="300" fill="#050505" />

  <!-- Radio Frequency Waves -->
  <g stroke="url(#neonGrad)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M50 150 Q 150 50 250 150 T 450 150" filter="url(#neonGlow)">
      <animate attributeName="d" values="M50 150 Q 150 50 250 150 T 450 150; M50 150 Q 150 250 250 150 T 450 150; M50 150 Q 150 50 250 150 T 450 150" dur="4s" repeatCount="indefinite" />
    </path>
    <path d="M50 160 Q 150 60 250 160 T 450 160" stroke-width="1" />
    <path d="M50 140 Q 150 40 250 140 T 450 140" stroke-width="1" />
  </g>

  <!-- Logo text -->
  <text x="300" y="140" font-family="Impact, sans-serif" font-size="50" fill="#ffffff" text-anchor="middle" filter="url(#neonGlow)">
    ERROR CODED <tspan fill="url(#neonGrad)">RADIO</tspan>
  </text>
  <text x="300" y="170" font-family="Courier New, monospace" font-size="16" fill="#00ffff" text-anchor="middle" letter-spacing="2">
    [ FREQUENCY: DIAMOND-SATURATED ]
  </text>

  <!-- Brine Leaks -->
  <circle cx="100" cy="250" r="10" fill="#80deea" filter="url(#neonGlow)">
    <animate attributeName="cy" values="250;270;250" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="500" cy="250" r="10" fill="#80deea" filter="url(#neonGlow)">
    <animate attributeName="cy" values="250;270;250" dur="2.5s" repeatCount="indefinite" />
  </circle>
</svg>
