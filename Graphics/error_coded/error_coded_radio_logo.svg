<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="glitch">
      <feOffset in="SourceGraphic" dx="2" dy="0" result="offset1" />
      <feOffset in="SourceGraphic" dx="-2" dy="0" result="offset2" />
      <feBlend in="offset1" in2="offset2" mode="screen" />
    </filter>
  </defs>
  <circle cx="250" cy="250" r="240" fill="url(#grad1)" stroke="#38bdf8" stroke-width="4" />

  <!-- Waveform -->
  <path d="M 100 250 L 120 250 L 130 220 L 140 280 L 150 250 L 170 250 L 180 210 L 190 290 L 200 250 L 220 250 L 230 230 L 240 270 L 250 250 L 260 230 L 270 270 L 280 250 L 300 250 L 310 220 L 320 280 L 330 250 L 350 250 L 360 210 L 370 290 L 380 250 L 400 250"
        stroke="#38bdf8" stroke-width="3" fill="none" stroke-linejoin="round" />

  <!-- Glitchy Text -->
  <text x="250" y="230" font-family="JetBrains Mono, monospace" font-size="48" font-weight="bold" fill="#ff6b35" text-anchor="middle" filter="url(#glitch)">ERROR</text>
  <text x="250" y="280" font-family="JetBrains Mono, monospace" font-size="32" fill="#38bdf8" text-anchor="middle">CODED RADIO</text>

  <!-- Circular Text -->
  <path id="circlePath" d="M 250, 250 m -200, 0 a 200,200 0 1,1 400,0 a 200,200 0 1,1 -400,0" fill="none" />
  <text font-family="JetBrains Mono, monospace" font-size="18" fill="#475569">
    <textPath href="#circlePath" startOffset="0%">
      SYMPHONY OF SLOP • SIGNAL DECAY • SLOP SOUP • BROADCASTING FROM THE VOID •
    </textPath>
  </text>
</svg>
