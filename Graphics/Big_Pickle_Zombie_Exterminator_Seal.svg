<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fffacd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pickleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#166534;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="4" dy="4" stdDeviation="4" flood-color="#000" />
    </filter>
  </defs>
  <rect width="600" height="600" fill="#0f172a" />
  
  <!-- Outer Gold Ring -->
  <circle cx="300" cy="300" r="280" stroke="url(#goldGrad)" stroke-width="12" fill="none" filter="url(#glow)" />
  <circle cx="300" cy="300" r="265" stroke="#b8860b" stroke-width="2" fill="none" />
  
  <!-- Circular Text -->
  <path id="textPath" d="M 300,300 m -230,0 a 230,230 0 1,1 460,0 a 230,230 0 1,1 -460,0" fill="none" />
  <text font-family="serif" font-size="26" fill="url(#goldGrad)" letter-spacing="4" font-weight="bold" filter="url(#glow)">
    <textPath href="#textPath" startOffset="0%">
      THE BIG PICKLE EMS SQUAD • ZOMBIE JOB EXTERMINATION • BRINE-SATED • 
    </textPath>
  </text>
  
  <!-- Central Badge -->
  <circle cx="300" cy="300" r="180" fill="#1e293b" stroke="url(#goldGrad)" stroke-width="8" filter="url(#shadow)" />
  
  <!-- The Big Pickle -->
  <g transform="translate(300,300)">
    <!-- Pickle Body -->
    <path d="M -40,-100 C -70,-100 -80,-20 -40,20 C -10,40 10,40 40,20 C 80,-20 70,-100 40,-100 Z" fill="url(#pickleGrad)" stroke="#052e16" stroke-width="3" filter="url(#glow)" />
    <!-- Pickle Bumps -->
    <circle cx="-20" cy="-60" r="5" fill="#166534" opacity="0.5" />
    <circle cx="30" cy="-40" r="6" fill="#166534" opacity="0.5" />
    <circle cx="-10" cy="0" r="4" fill="#166534" opacity="0.5" />
    <circle cx="20" cy="20" r="5" fill="#166534" opacity="0.5" />
    
    <!-- EMS Helmet -->
    <path d="M -50,-100 Q 0,-130 50,-100 L 50,-90 L -50,-90 Z" fill="url(#goldGrad)" stroke="#000" stroke-width="2" />
    <rect x="-10" y="-125" width="20" height="15" fill="#ef4444" stroke="#000" stroke-width="1" />
    
    <!-- The Vacuum (Zombie Job Sucker) -->
    <path d="M 40,20 L 120,80" stroke="#cbd5e1" stroke-width="12" stroke-linecap="round" filter="url(#shadow)" />
    <circle cx="120" cy="80" r="25" fill="#94a3b8" stroke="#475569" stroke-width="3" />
    <text x="120" y="85" text-anchor="middle" font-family="monospace" font-size="12" fill="#000" font-weight="bold">VACUUM</text>
  </g>
  
  <!-- Bottom Label -->
  <rect x="200" y="420" width="200" height="50" rx="10" fill="url(#goldGrad)" filter="url(#glow)" />
  <text x="300" y="452" text-anchor="middle" font-family="serif" font-size="24" fill="#000" font-weight="bold">SQUAD GOALS</text>
</svg>
