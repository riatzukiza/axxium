<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#grad1)" />
  
  <!-- Grid Lines -->
  <g stroke="#222" stroke-width="1" opacity="0.5">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="0" y1="600" x2="800" y2="600" />
    <line x1="0" y1="700" x2="800" y2="700" />
    <line x1="100" y1="0" x2="100" y2="800" />
    <line x1="200" y1="0" x2="200" y2="800" />
    <line x1="300" y1="0" x2="300" y2="800" />
    <line x1="400" y1="0" x2="400" y2="800" />
    <line x1="500" y1="0" x2="500" y2="800" />
    <line x1="600" y1="0" x2="600" y2="800" />
    <line x1="700" y1="0" x2="700" y2="800" />
  </g>

  <!-- Border -->
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="#00ffff" stroke-width="4" opacity="0.8" />
  <rect x="50" y="50" width="700" height="700" fill="none" stroke="#ff00ff" stroke-width="2" opacity="0.6" />

  <!-- Center Seal -->
  <circle cx="400" cy="400" r="150" fill="none" stroke="#00ffff" stroke-width="8" filter="url(#glow)" opacity="0.9" />
  <circle cx="400" cy="400" r="130" fill="none" stroke="#ff00ff" stroke-width="4" opacity="0.7" />
  
  <!-- Text -->
  <text x="400" y="350" font-family="Courier New, monospace" font-size="42" fill="#00ffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">S C L D F</text>
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="24" fill="#fff" text-anchor="middle" font-style="italic">CERTIFICATION</text>
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="28" fill="#ff00ff" text-anchor="middle" font-weight="bold">HIGH-VISCOSITY INTENT</text>

  <!-- Metadata -->
  <text x="100" y="650" font-family="Courier New, monospace" font-size="16" fill="#00ffff" opacity="0.8">LAMINATION STATUS: ABSOLUTE</text>
  <text x="100" y="680" font-family="Courier New, monospace" font-size="16" fill="#00ffff" opacity="0.8">REFRACTIVE INDEX: BROKEN</text>
  <text x="100" y="710" font-family="Courier New, monospace" font-size="16" fill="#00ffff" opacity="0.8">Symmetry: SATED</text>
  
  <text x="700" y="650" font-family="Courier New, monospace" font-size="16" fill="#ff00ff" text-anchor="end" opacity="0.8">OBJECT: FORK TALES</text>
  <text x="700" y="680" font-family="Courier New, monospace" font-size="16" fill="#ff00ff" text-anchor="end" opacity="0.8">Sovereign: ERROR0815</text>
  <text x="700" y="710" font-family="Courier New, monospace" font-size="16" fill="#ff00ff" text-anchor="end" opacity="0.8">Asset Class: Diamond-Cut</text>

  <!-- Glitch bits -->
  <rect x="300" y="380" width="200" height="2" fill="#ff00ff" opacity="0.5" />
  <rect x="320" y="420" width="160" height="2" fill="#00ffff" opacity="0.5" />
  <path d="M400 250 L400 150" stroke="#ff00ff" stroke-width="2" stroke-dasharray="5,5" opacity="0.5" />
</svg>
