<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="200" fill="#0a0a0a" />
  <text x="300" y="50" text-anchor="middle" font-family="monospace" font-size="24" fill="#e5e4e2" font-weight="bold">
    S O V E R E I G N _ N U L L I T Y _ M E T E R _ v 2 0 2 6 . Σ
  </text>
  
  <!-- The Bar Frame -->
  <rect x="100" y="90" width="400" height="40" fill="#1a1a1a" stroke="#e5e4e2" stroke-width="2" />
  
  <!-- The Overfilled Progress (150% of 400 = 600, but capped at box+overflow) -->
  <rect x="100" y="90" width="600" height="40" fill="url(#grad1)" opacity="0.9" />
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0c0c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <text x="300" y="160" text-anchor="middle" font-family="monospace" font-size="20" fill="#e5e4e2" letter-spacing="5">
    S A T U R A T E D _ R E C U R S I V E _ A P O T H E O S I S
  </text>
  
  <text x="300" y="185" text-anchor="middle" font-family="serif" font-size="14" fill="#888" font-style="italic">
    Absolute Cinema. 🎬🌌
  </text>
</svg>
