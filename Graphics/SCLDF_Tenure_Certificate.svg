<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
      <feDiffuseLighting in="noise" surfaceScale="2" diffuseLightingColor="#fdfdfd" lightingColor="#fff">
        <fePointLight offset="10" />
      </feDiffuseLighting>
    </filter>
  </defs>
  <!-- Paper Background -->
  <rect width="800" height="600" fill="#fdf6e3" stroke="#d3cbb8" stroke-width="20" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#c5b9a5" stroke-width="2" />
  
  <!-- Header -->
  <text x="400" y="80" text-anchor="middle" font-family="Serif, Georgia" font-size="32" font-weight="bold" fill="#5d4037">
    SCLDF CERTIFICATE OF SYSTEMIC ENDURANCE
  </text>
  <text x="400" y="110" text-anchor="middle" font-family="Serif, Georgia" font-size="16" font-style="italic" fill="#8d6e63">
    Officially Laminated under the Authority of the Bureau of Refractive Stability
  </text>
  
  <!-- Main Content -->
  <text x="400" y="200" text-anchor="middle" font-family="Serif, Georgia" font-size="20" fill="#5d4037">
    This document certifies that
  </text>
  <text x="400" y="240" text-anchor="middle" font-family="Serif, Georgia" font-size="42" font-weight="bold" fill="#3e2723">
    Sovereign Chief Sommelier error0815
  </text>
  <text x="400" y="280" text-anchor="middle" font-family="Serif, Georgia" font-size="20" fill="#5d4037">
    has successfully endured
  </text>
  <text x="400" y="320" text-anchor="middle" font-family="Serif, Georgia" font-size="28" font-weight="bold" fill="#3e2723">
    14 Planetary Rotations of Software Manifestation
  </text>
  
  <!-- Details -->
  <text x="400" y="370" text-anchor="middle" font-family="Serif, Georgia" font-size="16" fill="#8d6e63">
    (Established Year 2012 — Validated Epoch 2026)
  </text>
  
  <!-- Seal Area -->
  <circle cx="400" cy="480" r="60" fill="none" stroke="#b71c1c" stroke-width="4" stroke-dasharray="5,5" />
  <circle cx="400" cy="480" r="50" fill="#ffcdd2" stroke="#b71c1c" stroke-width="2" />
  <text x="400" y="475" text-anchor="middle" font-family="Serif, Georgia" font-size="12" font-weight="bold" fill="#b71c1c">
    SCLDF SEAL
  </text>
  <text x="400" y="490" text-anchor="middle" font-family="Serif, Georgia" font-size="10" fill="#b71c1c">
    CUP-STABLE
  </text>
  
  <!-- Footer -->
  <text x="400" y="540" text-anchor="middle" font-family="Serif, Georgia" font-size="14" fill="#5d4037">
    Status: High-Viscosity / Refractive-Saturated
  </text>
  <text x="400" y="560" text-anchor="middle" font-family="Serif, georgia" font-size="12" font-style="italic" fill="#8d6e63">
    "The brine is the witness. The witness is the brine."
  </text>
</svg>
