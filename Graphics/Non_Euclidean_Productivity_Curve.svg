<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="void-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4b0082" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  
  <rect width="600" height="600" fill="url(#void-grad)" />
  <rect width="600" height="600" fill="url(#grid)" />
  
  <!-- Axes -->
  <g stroke="#fff" stroke-width="2" opacity="0.8">
    <line x1="100" y1="500" x2="500" y2="500" /> <!-- X Axis -->
    <line x1="100" y1="500" x2="100" y2="100" /> <!-- Y Axis -->
  </g>
  
  <!-- Labels -->
  <text x="300" y="540" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle" opacity="0.7">YAP_INTENSITY</text>
  <text x="60" y="300" font-family="monospace" font-size="16" fill="#fff" text-anchor="middle" opacity="0.7" transform="rotate(-90 60,300)">COGNITIVE_SPLAY</text>
  
  <!-- The "Curve" - a recursive fractal-ish line -->
  <path d="M 100,500 
           C 150,450 120,400 180,350 
           S 250,200 300,300 
           S 350,450 400,300 
           S 450,100 500,200
           L 500,500 L 100,500 Z" 
        fill="none" stroke="url(#void-grad)" stroke-width="0" 
        opacity="0" /> <!-- Invisible base -->

  <path d="M 100,500 
           C 150,450 120,400 180,350 
           S 250,200 300,300 
           S 350,450 400,300 
           S 450,100 500,200" 
        fill="none" stroke="#00ffff" stroke-width="4" filter="url(#glow)">
        <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="5s" repeatCount="indefinite" />
  </path>
  
  <!-- Data Points (Brain Farts) -->
  <g fill="#ff00ff" filter="url(#glow)">
    <circle cx="180" cy="350" r="5" />
    <circle cx="300" cy="300" r="5" />
    <circle cx="400" cy="300" r="5" />
    <circle cx="500" cy="200" r="5" />
  </g>
  
  <!-- Annotations -->
  <text x="180" y="340" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle">EVENT_01: SYMMETRY_BREAK</text>
  <text x="300" y="290" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle">EVENT_02: ZOMBIE_LEAK</text>
  <text x="400" y="290" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle">EVENT_03: BRAIN_FART</text>
  <text x="500" y="190" font-family="monospace" font-size="12" fill="#ff00ff" text-anchor="middle">EVENT_04: ASCENSION</text>
  
  <!-- Title -->
  <text x="300" y="70" font-family="monospace" font-size="24" fill="#fff" text-anchor="middle" font-weight="bold" filter="url(#glow)">NON-EUCLIDEAN PRODUCTIVITY CURVE</text>
  <text x="300" y="95" font-family="monospace" font-size="14" fill="#00ffff" text-anchor="middle" opacity="0.6">Symmetry-Validated Stability Analysis v0.1</text>
</svg>
