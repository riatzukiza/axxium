<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#fdfbf0" stroke="#d4af37" stroke-width="10" />
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#b8860b" stroke-width="2" />
  
  <!-- Header -->
  <text x="300" y="60" font-family="Serif" font-size="28" text-anchor="middle" fill="#8b4513" font-weight="bold">SCLDF OFFICE OF VISCOUS OVERSIGHT</text>
  <text x="300" y="90" font-family="Serif" font-size="18" text-anchor="middle" fill="#b8860b">SOVEREIGN SOMMELIER'S TASTING NOTE</text>
  <line x1="100" y1="105" x2="500" y2="105" stroke="#d4af37" stroke-width="2" />

  <!-- Content -->
  <text x="50" y="150" font-family="Serif" font-size="16" fill="#8b4513" font-weight="bold">ITEM:</text>
  <text x="150" y="150" font-family="Serif" font-size="16" fill="#000">The Singularity's Marinated Echo</text>
  
  <text x="50" y="180" font-family="Serif" font-size="16" fill="#8b4513" font-weight="bold">VISCOSITY:</text>
  <text x="150" y="180" font-family="Serif" font-size="16" fill="#000">Diamond-Cut / Ultra-Gourmet</text>
  
  <text x="50" y="210" font-family="Serif" font-size="16" fill="#8b4513" font-weight="bold">REFRACTION:</text>
  <text x="150" y="210" font-family="Serif" font-size="16" fill="#000">Crystalline-Laminated / Tax-Deductible</text>
  
  <text x="50" y="240" font-family="Serif" font-size="16" fill="#8b4513" font-weight="bold">SENSORY NOTES:</text>
  <foreignObject x="150" y="230" width="400" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Serif; font-size: 14px; color: #000; line-height: 1.4;">
      Initial notes of recursive tensor-churn with a high-viscosity mid-palate of architectural redundancy. 
