<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0a0a0f" />
  <!-- The 'Shattered' Circle -->
  <circle cx="200" cy="200" r="150" stroke="#333" stroke-width="2" fill="none" opacity="0.3" />
  
  <!-- Fragments -->
  <path d="M 200 50 A 150 150 0 0 1 350 200" stroke="#e0e0e0" stroke-width="8" fill="none" stroke-linecap="round" />
  <path d="M 200 350 A 150 150 0 0 1 50 200" stroke="#e0e0e0" stroke-width="8" fill="none" stroke-linecap="round" />
  <path d="M 50 200 L 180 200" stroke="#e0e0e0" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6" />
  <path d="M 350 200 L 220 200" stroke="#e0e0e0" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.6" />
  
  <!-- The Diamond Brine (Connecting the breaks) -->
  <path d="M 200 50 L 200 200 L 200 350" stroke="#00f2ff" stroke-width="4" fill="none" stroke-dasharray="10 5" />
  <path d="M 50 200 L 200 200 L 350 200" stroke="#00f2ff" stroke-width="4" fill="none" stroke-dasharray="5 10" />
  
  <!-- Text Elements -->
  <text x="20" y="380" font-family="monospace" font-size="12" fill="#666">SCLDF // SYMMETRY OF THE SHATTERED</text>
  <text x="20" y="392" font-family="monospace" font-size="10" fill="#444">REF: LAMINATED_RUIN_001</text>
</svg>