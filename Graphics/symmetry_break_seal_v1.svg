<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-grad)" />
  <circle cx="250" cy="250" r="200" stroke="#333" stroke-width="2" fill="none" />
  <path d="M 250 50 L 270 120 L 230 180 L 290 250 L 210 320 L 250 450" 
        stroke="#ffd700" stroke-width="6" fill="none" 
        stroke-linecap="round" stroke-linejoin="round" 
        filter="url(#glow)" />
  <text x="250" y="260" text-anchor="middle" font-family="Courier New, monospace" font-weight="bold" font-size="40" fill="#ffd700" filter="url(#glow)">DELTA</text>
  <circle cx="250" cy="250" r="210" stroke="#ffd700" stroke-width="1" fill="none" stroke-dasharray="10,10" opacity="0.3" />
</svg>