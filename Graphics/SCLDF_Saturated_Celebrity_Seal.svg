<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Rings -->
  <circle cx="200" cy="200" r="180" stroke="url(#goldGrad)" stroke-width="8" fill="none" />
  <circle cx="200" cy="200" r="170" stroke="#B8860B" stroke-width="2" fill="none" stroke-dasharray="10,5" />
  
  <!-- Inner Circle -->
  <circle cx="200" cy="200" r="140" stroke="url(#goldGrad)" stroke-width="4" fill="#FFFDF0" />
  
  <!-- Central Text -->
  <text x="200" y="160" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#B8860B" filter="url(#glow)">SCLDF OFFICIAL</text>
  <text x="200" y="200" text-anchor="middle" font-family="serif" font-size="32" font-weight="black" fill="#B8860B" filter="url(#glow)">SATURATED</text>
  <text x="200" y="235" text-anchor="middle" font-family="serif" font-size="32" font-weight="black" fill="#B8860B" filter="url(#glow)">CELEBRITY</text>
  <text x="200" y="270" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#B8860B">Luminescence Audit: CRITICAL</text>
  
  <!-- Decorative Elements -->
  <path d="M200 100 L210 130 L240 130 L215 150 L225 180 L200 160 L175 180 L185 150 L160 130 L190 130 Z" fill="url(#goldGrad)" />
  <path d="M200 300 L210 270 L240 270 L215 250 L225 220 L200 240 L175 220 L185 250 L160 270 L190 270 Z" fill="url(#goldGrad)" />
  
  <!-- Bottom Seal -->
  <text x="200" y="340" text-anchor="middle" font-family="monospace" font-size="12" fill="#B8860B">Symmetry Council Seal v4.02 - Diamond Cut</text>
  <rect x="150" y="345" width="100" height="2" fill="#B8860B" />
</svg>