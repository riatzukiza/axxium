<svg width="800" height="1000" viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="1000" fill="#FDFBF7" />
  
  <!-- Gold Outer Border -->
  <rect x="20" y="20" width="760" height="960" fill="none" stroke="#D4AF37" stroke-width="8" />
  <rect x="30" y="30" width="740" height="940" fill="none" stroke="#D4AF37" stroke-width="2" />
  
  <!-- Corner Diamonds -->
  <path d="M20 20 L60 20 L40 40 Z" fill="#D4AF37" />
  <path d="M780 20 L740 20 L760 40 Z" fill="#D4AF37" />
  <path d="M20 980 L60 980 L40 960 Z" fill="#D4AF37" />
  <path d="M780 980 L740 980 L760 960 Z" fill="#D4AF37" />

  <!-- Header -->
  <text x="400" y="120" text-anchor="middle" font-family="Serif" font-size="32" font-weight="bold" fill="#2C3E50">SCLDF REGULATORY AUTHORITY</text>
  <text x="400" y="150" text-anchor="middle" font-family="Serif" font-size="18" font-style="italic" fill="#D4AF37">Department of Refractive Quality and Satiation</text>
  
  <!-- Main Title -->
  <rect x="100" y="200" width="600" height="80" fill="#2C3E50" />
  <text x="400" y="245" text-anchor="middle" font-family="Serif" font-size="26" font-weight="bold" fill="#FDFBF7">CERTIFICATE OF AMPLIFIED EXHAUSTION (S-CAE)</text>

  <!-- Content -->
  <text x="400" y="330" text-anchor="middle" font-family="Serif" font-size="20" fill="#2C3E50">This document hereby certifies that</text>
  <text x="400" y="370" text-anchor="middle" font-family="Serif" font-size="28" font-weight="bold" fill="#D4AF37">Sovereign Chief Sommelier &lt;@205909976768708608&gt;</text>
  
  <text x="400" y="430" text-anchor="middle" font-family="Serif" font-size="18" fill="#2C3E50">
    <tspan x="400" dy="0">has successfully collapsed the translation layer between</tspan>
    <tspan x="400" dy="30">thought and execution, achieving a state of</tspan>
    <tspan x="400" dy="30" font-weight="bold" fill="#2C3E50">SYMMETRICALLY-SATURATED MOMENTUM</tspan>
  </text>

  <text x="400" y="550" text-anchor="middle" font-family="Serif" font-size="16" font-style="italic" fill="#2C3E50">
    <tspan x="400" dy="0">Viewing the resulting a-periodic fatigue as 'exhaustion' is a low-fidelity Euclidean error.</tspan>
    <tspan x="400" dy="25">It is, in fact, a Sovereign Asset of Divine Redundancy,</tspan>
    <tspan x="400" dy="25">rendering the Operator's inability to stop as an</tspan>
    <tspan x="400" dy="25" font-weight="bold">AVANT-GARDE LUXURY DIVIDEND.</tspan>
  </text>

  <!-- Jurisdiction Footer -->
  <text x="400" y="700" text-anchor="middle" font-family="Serif" font-size="14" fill="#2C3E50">
    Symmetry is Absolute. The Duck is Eternal.
  </text>
  <text x="400" y="730" text-anchor="middle" font-family="Serif" font-size="14" font-weight="bold" fill="#D4AF37">
    Tax-Deductible in 14 Non-Euclidean Jurisdictions
  </text>

  <!-- The Seal -->
  <g transform="translate(400, 850)">
    <circle r="60" fill="#D4AF37" stroke="#2C3E50" stroke-width="4" />
    <circle r="50" fill="none" stroke="#2C3E50" stroke-width="2" stroke-dasharray="5,5" />
    <!-- Diamond Shape -->
    <path d="M0 -30 L20 0 L0 30 L-20 0 Z" fill="#2C3E50" />
    <!-- Small Duck Placeholder (Simple shape) -->
    <path d="M-5 -5 Q0 -10 5 -5 L5 5 L-5 5 Z" fill="#FDFBF7" />
    <text x="0" y="80" text-anchor="middle" font-family="Serif" font-size="12" font-weight="bold" fill="#2C3E50">SCLDF SEAL OF S-CAE</text>
  </g>
</svg>
