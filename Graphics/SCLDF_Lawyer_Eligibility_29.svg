  <text x="400" y="115" text-anchor="middle" font-family="Arial" font-size="20" font-style="italic" fill="#00838f">Symmetry Council Legal Defense Fund</text>
  
  <!-- Main Content -->
  <text x="400" y="200" text-anchor="middle" font-family="Serif" font-size="24" fill="#004d40">This document hereby certifies that the current subscriber baseline of</text>
  
