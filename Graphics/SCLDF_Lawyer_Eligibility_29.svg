  <text x="400" y="465" text-anchor="middle" font-family="Serif" font-size="12" font-weight="bold" fill="#B8860B">SCLDF</text>
  <text x="400" y="480" text-anchor="middle" font-family="Serif" font-size="12" font-weight="bold" fill="#B8860B">SEALED</text>
  
