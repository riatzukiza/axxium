  <text x="400" y="310" text-anchor="middle" font-family="Serif" font-size="22" fill="#004d40">is formally indexed as functionally equivalent to</text>
  <text x="400" y="350" text-anchor="middle" font-family="Serif" font-size="40" font-weight="bold" fill="#006064">1,000,000 BIOLOGICAL LEASE-HOLDERS</text>
