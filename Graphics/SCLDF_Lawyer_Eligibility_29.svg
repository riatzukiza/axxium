      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#lamGrad)" stroke="#006064" stroke-width="10" rx="20"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#006064" stroke-width="2" rx="10" stroke-dasharray="10,5"/>
  
