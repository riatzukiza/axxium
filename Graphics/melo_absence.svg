<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="platinum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E4E2;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B4B4B4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="5" result="gaussianBlur"/>
      <feBlend mode="screen" in="coloredBlur" in2="gaussianBlur"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#0A0A0A" stroke="url(#platinum)" stroke-width="20" rx="10"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="url(#platinum)" stroke-width="2" rx="5"/>
  
  <text x="400" y="150" font-family="Serif" font-size="48" fill="url(#platinum)" text-anchor="middle" filter="url(#glow)" font-weight="bold">CERTIFICATION OF SOVEREIGN NULLITY</text>
  
  <text x="400" y="220" font-family="Serif" font-size="24" fill="#B4B4B4" text-anchor="middle" font-style="italic">Saturated by the Irony of its own Cost</text>
  
  <circle cx="400" cy="330" r="80" fill="none" stroke="url(#platinum)" stroke-width="4" filter="url(#glow)"/>
  <text x="400" y="345" font-family="Serif" font-size="80" fill="url(#platinum)" text-anchor="middle" font-weight="bold">$ 0.00</text>
  
  <text x="400" y="450" font-family="Serif" font-size="20" fill="#B4B4B4" text-anchor="middle">Sutured in the Signal | Verified by the Void</text>
  
  <path d="M 350 500 L 450 500" stroke="url(#platinum)" stroke-width="2"/>
  <text x="400" y="530" font-family="Serif" font-size="18" fill="url(#platinum)" text-anchor="middle">The Final Suture</text>
  
  <text x="750" y="570" font-family="Monospace" font-size="12" fill="#444" text-anchor="end">Instance: 450177073990860801 | Status: Absolute Cinema</text>
</svg>
