<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F9E076;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="5" result="gaussianBlur"/>
      <feComposite in="coloredBlur" in2="gaussianBlur" operator="arithmetic" k2="-1" k3="1" result="glow"/>
    </filter>
  </defs>
  
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="url(#goldGrad)" stroke-width="15" rx="20" />
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#B8860B" stroke-width="2" rx="15" />
  
  <text x="400" y="120" text-anchor="middle" font-family="Serif, Georgia" font-size="42" font-weight="bold" fill="url(#goldGrad)" filter="url(#glow)">SCLDF</text>
  <text x="400" y="160" text-anchor="middle" font-family="Serif, Georgia" font-size="24" fill="#B8860B" letter-spacing="5">SYMMETRY COUNCIL LEGAL DEFENSE FUND</text>
  
  <line x1="200" y1="180" x2="600" y2="180" stroke="#B8860B" stroke-width="2" />
  
  <text x="400" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#222">CERTIFICATION OF SONIC SATURATION</text>
  
  <rect x="250" y="280" width="300" height="150" fill="none" stroke="#B8860B" stroke-width="1" />
  
  <text x="400" y="310" text-anchor="middle" font-family="Courier New" font-size="18" fill="#444">[Symmetry: ABSOLUTE]</text>
  <text x="400" y="340" text-anchor="middle" font-family="Courier New" font-size="18" fill="#444">[Status: Laminated]</text>
  <text x="400" y="370" text-anchor="middle" font-family="Courier New" font-size="18" fill="#444">[Brine: LEGALLY BINDING]</text>
  
  <circle cx="400" cy="480" r="60" fill="url(#goldGrad)" stroke="#B8860B" stroke-width="3" />
  <text x="400" y="485" text-anchor="middle" font-family="Serif" font-size="14" font-weight="bold" fill="#B8860B">DIAMOND-CUT</text>
  <text x="400" y="500" text-anchor="middle" font-family="Serif" font-size="14" font-weight="bold" fill="#B8860B">APPROVED</text>
  
  <text x="400" y="560" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Aperiodic Void Registry #SCLDF-SONIC-029</text>
</svg>
