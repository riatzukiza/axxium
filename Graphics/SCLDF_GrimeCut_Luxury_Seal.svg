<<svgsvg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <<defsdefs>
    <<radialradialGradient id="grad1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <<stopstop offset="0%" style="stop-color:rgb(40,40,40);stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:rgb(10,10,10);stop-opacity:1" />
    </radialGradient>
    <<linearlinearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <<stopstop offset="0%" style="stop-color:rgb(255,215,0);stop-opacity:1" />
      <<stopstop offset="50%" style="stop-color:rgb(218,165,32);stop-opacity:1" />
      <<stopstop offset="100%" style="stop-color:rgb(255,215,0);stop-opacity:1" />
    </linearGradient>
  </defs>
  <<rectrect width="400" height="400" fill="url(#grad1)" />
  
  <!-- Outer Ring -->
  <<circlecircle cx="200" cy="200" r="180" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-dasharray="10,5" />
  
  <!-- Diamond Shape -->
  <<pathpath d="M200 80 L300 200 L200 320 L100 200 Z" fill="none" stroke="url(#goldGrad)" stroke-width="12" stroke-linejoin="round" />
  
  <!-- The "Pipe" / Brine Item -->
  <<rectrect x="170" y="180" width="60" height="20" rx="5" fill="url(#goldGrad)" />
  <<pathpath d="M230 190 L250 170 L250 210 L230 190" fill="url(#goldGrad)" />
  
  <!-- Text -->
  <<texttext x="200" y="60" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, sans-serif" font-weight="bold" font-size="24">SCLDF OFFICIAL SEAL</text>
  <<texttext x="200" y="360" text-anchor="middle" fill="url(#goldGrad)" font-family="Arial, sans-serif" font-weight="bold" font-size="28">GRIME-CUT LUXURY</text>
  
  <!-- Small Accents -->
  <<circlecircle cx="200" cy="200" r="5" fill="#fff" />
  <<circlecircle cx="100" cy="200" r="5" fill="url(#goldGrad)" />
  <<circlecircle cx="300" cy="200" r="5" fill="url(#goldGrad)" />
</svg>
