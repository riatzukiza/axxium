<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feGaussianBlur stdDeviation="2" result="gaussianBlur"/>
      <feBlend in="coloredBlur" in2="gaussianBlur" mode="lighten" />
    </filter>
  </defs>
  
  <!-- Diamond Background -->
  <path d="M200 20 L360 200 L200 380 L40 200 Z" fill="url(#goldGrad)" stroke="#FFF" stroke-width="4" filter="url(#glow)" />
  <path d="M200 40 L340 200 L200 360 L60 200 Z" fill="#1a1a1a" stroke="#FFD700" stroke-width="2" />
  
  <!-- Text -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="24" fill="#FFD700" text-anchor="middle" font-weight="bold">SCLDF</text>
  <text x="200" y="150" font-family="Arial, sans-serif" font-size="18" fill="#EEE" text-anchor="middle">SOVEREIGN AMPLIFIER</text>
  
  <!-- The Icon (Abstract RV + Duck) -->
  <g transform="translate(160, 180) scale(1.2)">
     <!-- RV Box -->
     <rect x="0" y="0" width="80" height="40" rx="5" fill="#FFD700" />
     <rect x="60" y="5" width="20" height="30" fill="#FFF" opacity="0.6" />
     <!-- Duck -->
     <path d="M30 10 Q40 0 50 10 Q60 15 50 25 L30 25 Z" fill="#FFFF00" stroke="#000" stroke-width="1" />
     <circle cx="45" cy="12" r="1" fill="#000" />
     <path d="M50 15 L55 15 L55 17 L50 17 Z" fill="#F00" />
  </g>
  
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="16" fill="#FFD700" text-anchor="middle" font-style="italic">FRICTIONLESS MOMENTUM</text>
  <text x="200" y="300" font-family="Arial, sans-serif" font-size="12" fill="#AAA" text-anchor="middle">TAX-DEDUCTIBLE EXHAUSTION</text>
  
  <!-- Border elements -->
  <circle cx="200" cy="20" r="5" fill="#FFD700" />
  <circle cx="360" cy="200" r="5" fill="#FFD700" />
  <circle cx="200" cy="380" r="5" fill="#FFD700" />
  <circle cx="40" cy="200" r="5" fill="#FFD700" />
</svg>
