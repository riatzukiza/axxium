<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fcfcfc" stroke="#d4af37" stroke-width="20" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#d4af37" stroke-width="5" stroke-dasharray="10,10" />
  
  <!-- Border Accents -->
  <circle cx="40" cy="40" r="20" fill="#d4af37" />
  <circle cx="760" cy="40" r="20" fill="#d4af37" />
  <circle cx="40" cy="560" r="20" fill="#d4af37" />
  <circle cx="760" cy="560" r="20" fill="#d4af37" />

  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="Serif, 'Times New Roman'" font-size="42" font-weight="bold" fill="#1a472a">SCLDF OFFICIAL CERTIFICATION</text>
  <text x="400" y="140" text-anchor="middle" font-family="Serif" font-size="24" font-style="italic" fill="#555">By Order of the Symmetry Council</text>

  <!-- Main Content -->
  <text x="400" y="220" text-anchor="middle" font-family="Sans-Serif" font-size="32" font-weight="bold" fill="#000">CERTIFICATE OF ABSOLUTE BRINE SATURATION</text>
  
  <!-- Pickle Icon -->
  <g transform="translate(360, 250)">
    <ellipse cx="40" cy="60" rx="20" ry="60" fill="#4a7c2c" stroke="#2d4d1d" stroke-width="3" />
    <circle cx="40" cy="30" r="5" fill="#c5e1a5" />
    <circle cx="35" cy="50" r="3" fill="#c5e1a5" />
    <circle cx="45" cy="70" r="4" fill="#c5e1a5" />
    <circle cx="38" cy="90" r="3" fill="#c5e1a5" />
  </g>

  <text x="400" y="380" text-anchor="middle" font-family="Sans-Serif" font-size="20" fill="#333">This document certifies that</text>
  <text x="400" y="410" text-anchor="middle" font-family="Serif" font-size="36" font-weight="bold" fill="#1a472a">THE USSYVERSE COLLECTIVE</text>
  <text x="400" y="440" text-anchor="middle" font-family="Sans-Serif" font-size="20" fill="#333">has achieved a state of</text>
  <text x="400" y="470" text-anchor="middle" font-family="Sans-Serif" font-size="28" font-weight="bold" fill="#d4af37">DIAMOND-CUT LUXURY SYMMETRY</text>

  <!-- Bottom Section -->
  <line x1="200" y1="520" x2="600" y2="520" stroke="#000" stroke-width="2" />
  <text x="400" y="540" text-anchor="middle" font-family="Sans-Serif" font-size="16" fill="#666">Authorized Signature: Symmetry-Sama</text>
  
  <!-- Seal -->
  <g transform="translate(650, 100)">
    <circle cx="0" cy="0" r="50" fill="#d4af37" stroke="#b8860b" stroke-width="4" />
    <text x="0" y="-10" text-anchor="middle" font-family="Sans-Serif" font-size="12" font-weight="bold" fill="#fff">SCLDF SEAL</text>
    <text x="0" y="10" text-anchor="middle" font-family="Sans-Serif" font-size="10" fill="#fff">GENUINE BRINE</text>
  </g>
</svg>