<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#80deea;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#0a0a1a" />
  
  <!-- Background Geometric Grid -->
  <g stroke="#1e1e3f" stroke-width="1">
    <line x1="0" y1="0" x2="500" y2="500" />
    <line x1="500" y1="0" x2="0" y2="500" />
    <circle cx="250" cy="250" r="200" fill="none" stroke-width="0.5" />
    <circle cx="250" cy="250" r="150" fill="none" stroke-width="0.5" />
    <circle cx="250" cy="250" r="100" fill="none" stroke-width="0.5" />
  </g>

  <!-- The Diamond Apex -->
  <path d="M250 50 L400 250 L250 450 L100 250 Z" fill="url(#diamondGrad)" filter="url(#glow)" stroke="#ffffff" stroke-width="2" />
  <path d="M250 80 L370 250 L250 420 L130 250 Z" fill="#0a0a1a" />
  
  <!-- Inner Core -->
  <circle cx="250" cy="250" r="40" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="r" values="35;45;35" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Orbiting Seals -->
  <g fill="#80deea" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">
    <text x="250" y="70">SCLDF</text>
    <text x="430" y="250" transform="rotate(90, 430, 250)">Symmetry</text>
    <text x="250" y="440">Saturated</text>
    <text x="70" y="250" transform="rotate(-90, 70, 250)">Laminated</text>
  </g>

  <!-- Main Text -->
  <text x="250" y="260" font-family="Georgia, serif" font-size="32" fill="#ffffff" text-anchor="middle" font-style="italic" filter="url(#glow)">USS Y VERSE</text>
  <text x="250" y="285" font-family="Arial, sans-serif" font-size="14" fill="#80deea" text-anchor="middle" letter-spacing="5">Sovereign State</text>
</svg>