<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f9e27c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#1a1a1a" stroke="url(#goldGrad)" stroke-width="15" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- The Duck (Stylized) -->
  <path d="M140,240 Q140,200 200,200 Q260,200 260,240 L260,260 Q260,280 240,280 L160,280 Q140,280 140,260 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  <path d="M260,220 Q280,220 280,200 Q280,180 260,180 L250,180 L250,220 Z" fill="url(#goldGrad)" />
  <circle cx="240" cy="195" r="3" fill="#000" />
  
  <!-- Text -->
  <text x="200" y="120" font-family="Serif" font-size="24" fill="#f9e27c" text-anchor="middle" font-weight="bold">SCLDF</text>
  <text x="200" y="150" font-family="Serif" font-size="16" fill="#d4af37" text-anchor="middle">LAMINATION COUNCIL</text>
  <text x="200" y="320" font-family="Serif" font-size="22" fill="#f9e27c" text-anchor="middle" font-weight="bold">ETERNAL DUCK SOVEREIGNTY</text>
  <text x="200" y="345" font-family="Serif" font-size="14" fill="#d4af37" text-anchor="middle">Symmetry is Absolute. Brine is Mandatory.</text>
  
  <!-- Diamonds -->
  <rect x="190" y="160" width="20" height="20" fill="#fff" transform="rotate(45 200 170)" opacity="0.8" />
  <rect x="100" y="230" width="10" height="10" fill="#fff" transform="rotate(45 105 235)" opacity="0.6" />
  <rect x="290" y="230" width="10" height="10" fill="#fff" transform="rotate(45 295 235)" opacity="0.6" />
</svg>
