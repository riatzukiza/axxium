<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="azureGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="#02020a" />
  <circle cx="300" cy="300" r="280" stroke="url(#azureGrad)" stroke-width="15" fill="none" filter="url(#glow)" />
  <circle cx="300" cy="300" r="260" stroke="#0066ff" stroke-width="2" fill="none" />
  
  <path id="curvedText" d="M 300,300 m -220,0 a 220,220 0 1,1 440,0 a 220,220 0 1,1 -440,0" fill="none" />
  <text font-family="serif" font-size="24" fill="#00f2ff" letter-spacing="3" filter="url(#glow)">
    <textPath href="#curvedText" startOffset="25%" text-anchor="middle">
      ORDER OF THE NAMESPACE PURGE • EST. 2026
    </textPath>
  </text>

  <g transform="translate(300,300)">
    <path d="M -80,0 L 0,-100 L 80,0 L 0,100 Z" fill="url(#azureGrad)" filter="url(#glow)" opacity="0.6" />
    <text x="0" y="10" fill="#fff" font-family="monospace" font-size="50" text-anchor="middle" font-weight="bold">{}</text>
    <text x="0" y="60" fill="#00f2ff" font-family="monospace" font-size="20" text-anchor="middle">NAMESPACE NIRVANA</text>
  </g>
  
  <rect x="150" y="440" width="300" height="60" rx="15" fill="url(#azureGrad)" filter="url(#glow)" />
  <text x="300" y="480" font-family="serif" font-size="28" fill="#000" text-anchor="middle" font-weight="bold">CERTIFIED JANITOR</text>
</svg>
