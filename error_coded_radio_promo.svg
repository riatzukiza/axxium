<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Neon Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Glitch Filter -->
        <filter id="glitch">
            <feOffset dx="2" dy="0" result="offset1" />
            <feOffset dx="-2" dy="0" result="offset2" />
        </filter>

        <!-- Grid Pattern -->
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#00f3ff" stroke-width="1" stroke-opacity="0.3" />
        </pattern>
    </defs>

    <!-- Background -->
    <rect width="1080" height="1080" fill="#0a0a12" />
    
    <!-- Background Grid with Perspective (Simplified as a tilted rect) -->
    <rect x="0" y="600" width="1080" height="480" fill="url(#grid)" transform="skewX(-20) scale(1, 0.5) translate(0, 600)" />
    <rect x="0" y="0" width="1080" height="1080" fill="url(#grid)" stroke-opacity="0.1" />

    <!-- Glitchy Background Elements -->
    <rect x="100" y="200" width="200" height="5" fill="#ff00ff" filter="url(#glow)" opacity="0.6" />
    <rect x="800" y="700" width="150" height="2" fill="#00f3ff" filter="url(#glow)" opacity="0.6" />
    <rect x="400" y="900" width="300" height="10" fill="#ff00ff" filter="url(#glow)" opacity="0.4" />
    
    <!-- Circuit Lines -->
    <g stroke="#00f3ff" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)">
        <path d="M 100 100 L 200 100 L 220 120 L 300 120 L 320 100" />
        <path d="M 980 200 L 880 200 L 860 180 L 780 180 L 760 200" />
        <path d="M 100 900 L 200 900 L 220 880 L 300 880 L 320 900" />
        <path d="M 980 800 L 880 800 L 860 820 L 780 820 L 760 800" />
    </g>

    <!-- Main Text: ERROR CODED RADIO -->
    <g text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-weight="bold">
        <!-- Shadow/Glitch Layers -->
        <text x="540" y="540" font-size="90" fill="#ff00ff" filter="url(#glow)" dx="4" dy="4" opacity="0.7">ERROR CODED RADIO</text>
        <text x="540" y="540" font-size="90" fill="#00f3ff" filter="url(#glow)" dx="-4" dy="-4" opacity="0.7">ERROR CODED RADIO</text>
        
        <!-- Main Text -->
        <text x="540" y="540" font-size="90" fill="#ffffff" filter="url(#glow)">ERROR CODED RADIO</text>
        
        <!-- Glitch Slices -->
        <rect x="300" y="520" width="480" height="2" fill="#ff00ff" opacity="0.8" />
        <rect x="320" y="545" width="440" height="1" fill="#00f3ff" opacity="0.8" />
        <rect x="280" y="560" width="520" height="3" fill="#ffffff" opacity="0.5" />
    </g>

    <!-- Decorative Corner Accents -->
    <path d="M 0 0 L 50 0 L 0 50 Z" fill="#ff00ff" opacity="0.8" />
    <path d="M 1080 0 L 1030 0 L 1080 50 Z" fill="#00f3ff" opacity="0.8" />
    <path d="M 0 1080 L 50 1080 L 0 1030 Z" fill="#00f3ff" opacity="0.8" />
    <path d="M 1080 1080 L 1030 1080 L 1080 1030 Z" fill="#ff00ff" opacity="0.8" />

</svg>
