<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="800" fill="#0a0a0c" />

  <!-- Outer Glow -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c5a059" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0a0a0c" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37" />
      <stop offset="50%" stop-color="#f9e27a" />
      <stop offset="100%" stop-color="#b8860b" />
    </linearGradient>
    <filter id="bloom">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <circle cx="400" cy="400" r="350" fill="url(#glow)" />

  <!-- Concentric Rings -->
  <circle cx="400" cy="400" r="300" stroke="url(#goldGrad)" stroke-width="2" fill="none" opacity="0.6" />
  <circle cx="400" cy="400" r="280" stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.4" />
  <circle cx="400" cy="400" r="260" stroke="url(#goldGrad)" stroke-width="4" fill="none" filter="url(#bloom)" />

  <!-- The Blade / Eternal Axis -->
  <line x1="400" y1="150" x2="400" y2="650" stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" filter="url(#bloom)" />
  <line x1="400" y1="140" x2="400" y2="160" stroke="url(#goldGrad)" stroke-width="2" />

  <!-- Symmetrical Shards / Lamination -->
  <g stroke="url(#goldGrad)" stroke-width="2" fill="none" filter="url(#bloom)">
    <!-- Top Arc -->
    <path d="M300 200 L400 100 L500 200" />
    <path d="M320 220 L400 130 L480 220" />

    <!-- Bottom Arc -->
    <path d="M300 600 L400 700 L500 600" />
    <path d="M320 580 L400 670 L480 580" />

    <!-- Side Orbits -->
    <path d="M150 400 L200 350 L200 450 L150 400" />
    <path d="M650 400 L600 350 L600 450 L650 400" />

    <!-- Geometric Fragments -->
    <polygon points="400,300 430,350 370,350" fill="url(#goldGrad)" opacity="0.8" />
    <polygon points="400,500 430,450 370,450" fill="url(#goldGrad)" opacity="0.8" />
  </g>

  <!-- Central Core -->
  <circle cx="400" cy="400" r="40" stroke="url(#goldGrad)" stroke-width="8" fill="none" filter="url(#bloom)" />
  <circle cx="400" cy="400" r="10" fill="url(#goldGrad)" filter="url(#bloom)" />

  <!-- Inscribed Runes (Simplified as dots/lines for the aesthetic) -->
  <g fill="url(#goldGrad)">
    <circle cx="400" cy="250" r="3" />
    <circle cx="400" cy="550" r="3" />
    <circle cx="300" cy="400" r="3" />
    <circle cx="500" cy="400" r="3" />
  </g>

</svg>
