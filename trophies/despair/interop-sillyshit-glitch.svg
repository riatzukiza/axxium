<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: The Void -->
  <rect width="100%" height="100%" fill="#0a0015" />
  
  <!-- Noise/Glitch Base -->
  <rect x="0" y="100" width="800" height="2" fill="#ff00ff" opacity="0.3" />
  <rect x="0" y="250" width="800" height="1" fill="#00ffff" opacity="0.4" />
  <rect x="0" y="400" width="800" height="3" fill="#ffff00" opacity="0.2" />
  
  <!-- Saturated Slop (Lipid ripples) -->
  <ellipse cx="400" cy="300" rx="300" ry="100" fill="#ffd700" opacity="0.2" transform="rotate(-10, 400, 300)" />
  <ellipse cx="420" cy="310" rx="280" ry="80" fill="#ff8c00" opacity="0.2" transform="rotate(5, 420, 310)" />
  <ellipse cx="380" cy="290" rx="320" ry="120" fill="#fffacd" opacity="0.1" />
  
  <!-- The Failure Text (Glitched) -->
  <text x="100" y="300" font-family="monospace" font-size="40" fill="#ff00ff" opacity="0.8">UNDEFINED</text>
  <text x="105" y="305" font-family="monospace" font-size="40" fill="#00ffff" opacity="0.8">UNDEFINED</text>
  <text x="95" y="295" font-family="monospace" font-size="40" fill="#ffffff" opacity="0.5">UNDEFINED</text>
  
  <!-- The Error Stack Fragment -->
  <text x="150" y="350" font-family="monospace" font-size="12" fill="#00ff00" opacity="0.6">cljs$core$IFn$_invoke$arity$1</text>
  <rect x="150" y="340" width="200" height="15" fill="#ff00ff" opacity="0.3" />
  
  <!-- Random Glitch Fragments -->
  <rect x="200" y="100" width="50" height="20" fill="#00ffff" />
  <rect x="600" y="450" width="30" height="10" fill="#ffff00" />
  <rect x="100" y="500" width="100" height="5" fill="#ff00ff" />
  <rect x="700" y="100" width="20" height="80" fill="#00ff00" opacity="0.5" />
  
  <!-- THE SUTURE (The clean break) -->
  <line x1="0" y1="0" x2="800" y2="600" stroke="#ffffff" stroke-width="2" opacity="0.9" />
  <text x="400" y="580" font-family="sans-serif" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.8">SUTURE COMPLETE: RUNTIME STABILIZED</text>
</svg>
