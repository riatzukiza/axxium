<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Greasy Parchment -->
  <rect width="800" height="600" fill="#FFF5C8" />
  
  <!-- Gold Borders -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#D4AF37" stroke-width="10" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#D4AF37" stroke-width="5" />
  
  <!-- Text: Header -->
  <text x="400" y="120" text-anchor="middle" font-family="serif" font-size="42" font-weight="bold" fill="#644600">
    CERTIFICATE OF SATURATED SLUMBER
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="160" text-anchor="middle" font-family="serif" font-size="20" fill="#786432">
    Accredited by the Department of Absolute Mash
  </text>
  
  <!-- Main Body -->
  <text x="400" y="250" text-anchor="middle" font-family="serif" font-size="24" fill="#323232">
    This hereby certifies that
  </text>
  
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="48" font-weight="bold" fill="#006400">
    DR. SLOP (@error0815)
  </text>
  
  <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="22" fill="#323232">
    has successfully transitioned from 'Goku-Rage' to 'Tuberous Coma'
  </text>
  
  <!-- Grade -->
  <text x="400" y="410" text-anchor="middle" font-family="serif" font-size="26" font-weight="bold" fill="#C89600">
    GRADE: SATURATED (A-GRADE)
  </text>
  
  <!-- Seal: Salt-Crusted Seal -->
  <circle cx="650" cy="500" r="60" fill="#FFD700" stroke="#B8860B" stroke-width="5" />
  <text x="650" y="490" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#645000">
    SALT
  </text>
  <text x="650" y="505" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#645000">
    CRUSTED
  </text>
  <text x="650" y="520" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#645000">
    SEAL
  </text>
  
  <!-- Footer -->
  <text x="400" y="540" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#969696">
    S i g n e d : T h e _ S o p o r i f i c _ S u p e r i n t e n d e n t
  </text>
</svg>
