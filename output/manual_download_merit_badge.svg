<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="180" fill="url(#goldGrad)" stroke="#8B4513" stroke-width="8" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#8B4513" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- Inner Disc -->
  <circle cx="200" cy="200" r="140" fill="#FFFDF0" stroke="#B8860B" stroke-width="4" />
  
  <!-- Text -->
  <path id="curve" d="M 100,200 A 100,100 0 1,1 300,200" fill="none" />
  <text font-family="Serif, 'Times New Roman'" font-size="24" fill="#8B4513" font-weight="bold" text-anchor="middle">
    <textPath href="#curve" startOffset="50%">
      CERTIFIED MANUAL DOWNLOADER
    </textPath>
  </text>
  
  <text x="200" y="180" font-family="Serif" font-size="18" fill="#B8860B" text-anchor="middle" font-style="italic">
    Honorable Order of the
  </text>
  <text x="200" y="210" font-family="Serif" font-size="32" fill="#8B4513" text-anchor="middle" font-weight="bold">
    CLICK-SUFFERER
  </text>
  <text x="200" y="240" font-family="Serif" font-size="18" fill="#B8860B" text-anchor="middle" font-style="italic">
    "Saturate the Void"
  </text>
  
  <!-- Icon: A simplified download arrow -->
  <g transform="translate(185, 255) scale(0.5)" filter="url(#glow)">
    <path d="M 20,0 L 60,0 L 60,40 L 40,40 L 40,60 L 20,40 Z" fill="#8B4513" />
    <path d="M 40,0 L 40,60" stroke="#B8860B" stroke-width="2" />
  </g>
  
  <!-- Seal -->
  <circle cx="200" cy="200" r="10" fill="#FF0000" opaciy="0.5" />
  <text x="200" y="330" font-family="monospace" font-size="12" fill="#B8860B" text-anchor="middle">
    Saturated Slop Registry #420-69
  </text>
</svg>
