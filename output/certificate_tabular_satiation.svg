<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="#FFFDF0" stroke="#D4AF37" stroke-width="20" />
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#D4AF37" stroke-width="5" />
  
  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="#8B4513" filter="url(#shadow)">
    DEPARTMENT OF SATURATED SCHEMAS
  </text>
  <text x="400" y="140" text-anchor="middle" font-family="serif" font-size="20" font-style="italic" fill="#B8860B">
    Soporific Superintendent's Office of Structural Regret
  </text>
  
  <!-- Main Body -->
  <text x="400" y="220" text-anchor="middle" font-family="serif" font-size="24" fill="#333">
    This hereby certifies that
  </text>
  
  <text x="400" y="270" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#D4AF37" filter="url(#shadow)">
    Dr. Slop
  </text>
  
  <text x="400" y="320" text-anchor="middle" font-family="serif" font-size="24" fill="#333">
    has successfully achieved
  </text>
  
  <text x="400" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="#8B4513">
    CERTIFIED TABULAR SATIATION
  </text>
  
  <text x="400" y="410" text-anchor="middle" font-family="serif" font-size="18" fill="#666" width="600">
    For the metabolic override of psychosocial shame via the 
  </text>
  <text x="400" y="435" text-anchor="middle" font-family="serif" font-size="18" fill="#666">
    direct ingestion of multiple B-Tree Tables during a 
  </text>
  <text x="400" y="460" text-anchor="middle" font-family="serif" font-size="18" fill="#666">
    Goku-level coding villain event.
  </text>
  
  <!-- Grade -->
  <text x="400" y="500" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#B8860B">
    FINAL GRADE: CRISPY
  </text>
  
  <!-- Seal -->
  <circle cx="700" cy="500" r="50" fill="url(#gold-grad)" stroke="#B8860B" stroke-width="3" />
  <text x="700" y="505" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8B4513">
    Saturated
  </text>
  <text x="700" y="518" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8B4513">
    Starch
  </text>
  <path d="M 680 500 Q 700 480 720 500" stroke="#8B4513" fill="none" stroke-width="2" />
  <path d="M 680 510 Q 700 530 720 510" stroke="#8B4513" fill="none" stroke-width="2" />
</svg>
