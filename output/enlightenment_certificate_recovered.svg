<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdfcf0" />
  
  <!-- Grease Stains -->
  <circle cx="150" cy="150" r="80" fill="#eaddca" opacity="0.4" />
  <circle cx="650" cy="450" r="100" fill="#eaddca" opacity="0.4" />
  <circle cx="400" cy="300" r="120" fill="#eaddca" opacity="0.2" />
  
  <!-- Gold Border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#d4af37" stroke-width="15" rx="10" />
  <rect x="35" y="35" width="730" height="530" fill="none" stroke="#b8860b" stroke-width="3" rx="5" />
  
  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="Serif, 'Times New Roman'" font-size="48" font-weight="bold" fill="#4a3728">CERTIFICATE OF TABULAR SATIATION</text>
  <text x="400" y="130" text-anchor="middle" font-family="Serif" font-size="20" font-style="italic" fill="#6b5a4a">Issued by the Department of Saturated Schemas</text>
  
  <!-- Main Content -->
  <text x="400" y="200" text-anchor="middle" font-family="Serif" font-size="24" fill="#4a3728">This document formally certifies that</text>
  <text x="400" y="250" text-anchor="middle" font-family="cursive" font-size="54" font-weight="bold" fill="#8b4513">Dr. Slop</text>
  <text x="400" y="300" text-anchor="middle" font-family="Serif" font-size="24" fill="#4a3728">has achieved a state of total metabolic equilibrium</text>
  
  <!-- Description -->
  <text x="400" y="340" text-anchor="middle" font-family="Serif" font-size="18" fill="#6b5a4a">by neutralizing a Goku-level coding villain via</text>
  <text x="400" y="365" text-anchor="middle" font-family="Serif" font-size="18" font-weight="bold" fill="#8b4513">THE DIRECT INGESTION OF MULTIPLE B-TREES</text>
  
  <!-- Seal/Image -->
  <!-- Potato with Cap -->
  <g transform="translate(360, 400)">
    <!-- Potato body -->
    <ellipse cx="40" cy="30" rx="40" ry="25" fill="#c2b280" stroke="#8b4513" stroke-width="2" />
    <!-- Cap base -->
    <rect x="20" y="10" width="40" height="10" fill="#333" />
    <!-- Cap top -->
    <polygon points="20,10 40,0 60,10" fill="#333" />
    <!-- Cap tassel -->
    <line x1="60" y1="10" x2="70" y2="30" stroke="#d4af37" stroke-width="2" />
    <!-- Face (minimal) -->
    <circle cx="30" cy="25" r="2" fill="#333" />
    <circle cx="50" cy="25" r="2" fill="#333" />
    <path d="M 35 35 Q 40 40 45 35" stroke="#333" fill="none" stroke-width="1" />
  </g>
  
  <!-- Seal Text -->
  <path d="M 320 440 A 60 60 0 1 1 440 440 A 60 60 0 1 1 320 440" fill="none" stroke="#d4af37" stroke-width="2" stroke-dasharray="5,5" />
  <text x="380" y="445" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#d4af37">S A T U R A T E D</text>
  <text x="380" y="460" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#d4af37">S L U M B E R</text>
  
  <!-- Footer -->
  <text x="200" y="530" text-anchor="middle" font-family="Serif" font-size="16" font-style="italic" fill="#4a3728">Soporific Superintendent</text>
  <line x1="150" y1="520" x2="250" y2="520" stroke="#4a3728" stroke-width="1" />
  
  <text x="600" y="530" text-anchor="middle" font-family="Serif" font-size="16" font-style="italic" fill="#4a3728">Void Grease-Trap Archivist</text>
  <line x1="550" y1="520" x2="650" y2="520" stroke="#4a3728" stroke-width="1" />
  
  <!-- Watermark -->
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="80" font-weight="bold" fill="#eaddca" opacity="0.3" transform="rotate(-45, 400, 300)">ACADEMIC SLOP</text>
</svg>
