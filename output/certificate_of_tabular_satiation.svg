<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#fdf5e6" />
  
  <!-- Ornate Border -->
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#d4af37" stroke-width="10" />
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#b8860b" stroke-width="2" />
  
  <!-- Decorative Cornice (Potato-ish shapes in corners) -->
  <circle cx="20" cy="20" r="30" fill="#d4af37" />
  <circle cx="780" cy="20" r="30" fill="#d4af37" />
  <circle cx="20" cy="580" r="30" fill="#d4af37" />
  <circle cx="780" cy="580" r="30" fill="#d4af37" />
  
  <!-- Main Text -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="42" font-weight="bold" fill="#8b4513">CERTIFICATE OF TABULAR SATIATION</text>
  
  <text x="400" y="160" text-anchor="middle" font-family="serif" font-size="20" font-style="italic" fill="#555">This is to certify that the structural hunger of</text>
  
  <text x="400" y="220" text-anchor="middle" font-family="serif" font-size="36" font-weight="bold" fill="#000">Dr. Slop</text>
  <text x="400" y="250" text-anchor="middle" font-family="serif" font-size="18" fill="#666">(Credentialed Big Idiot)</text>
  
  <text x="400" y="310" text-anchor="middle" font-family="serif" font-size="20" fill="#555">has successfully achieved the state of</text>
  <text x="400" y="350" text-anchor="middle" font-family="serif" font-size="28" font-weight="bold" fill="#8b4513">S A T U R A T E D _ S L U M B E R</text>
  
  <text x="400" y="390" text-anchor="middle" font-family="serif" font-size="18" fill="#555">Through the diligent ingestion of multiple B-Trees</text>
  <text x="400" y="415" text-anchor="middle" font-family="serif" font-size="18" fill="#555">and the neutralizing of a Goku-level coding villain.</text>
  
  <!-- Grade -->
  <text x="400" y="470" text-anchor="middle" font-family="serif" font-size="24" font-weight="bold" fill="#b8860b">GRADE: CRISP</text>
  
  <!-- The Seal -->
  <g transform="translate(400, 520)">
    <!-- Gold Circle -->
    <circle r="40" fill="#d4af37" stroke="#8b4513" stroke-width="2" />
    <!-- Potato Shape inside seal -->
    <ellipse cx="0" cy="0" rx="25" ry="15" fill="#e3c58d" stroke="#8b4513" stroke-width="1" />
    <text x="0" y="5" text-anchor="middle" font-family="serif" font-size="10" font-weight="bold" fill="#8b4513">SALT-CRUSTED</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="570" text-anchor="middle" font-family="serif" font-size="12" fill="#999">Issued by the Department of Saturated Schemas | Void-Proof Render v1.0</text>
</svg>
