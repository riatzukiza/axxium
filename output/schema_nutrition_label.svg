<svg width="300" height="500" viewBox="0 0 300 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="500" fill="white" stroke="black" stroke-width="3"/>
  
  <!-- Header -->
  <text x="10" y="30" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="black">Nutrition Facts</text>
  <line x1="10" y1="35" x2="290" y2="35" stroke="black" stroke-width="1"/>
  
  <text x="10" y="55" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="black">Serving size: 1 B-Tree Schema</text>
  <line x1="10" y1="60" x2="290" y2="60" stroke="black" stroke-width="1"/>
  
  <!-- Calories -->
  <text x="10" y="80" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="black">Amount per serving</text>
  <text x="10" y="100" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="bold" fill="black">Calories 1.2 TB of Shame</text>
  <line x1="10" y1="105" x2="290" y2="105" stroke="black" stroke-width="5"/>
  
  <!-- Nutrients -->
  <text x="10" y="125" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="black">% Daily Value*</text>
  <line x1="10" y1="130" x2="290" y2="130" stroke="black" stroke-width="1"/>
  
  <!-- Item 1 -->
  <text x="10" y="150" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Total Structural Fat 0g</text>
  <text x="250" y="150" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">0%</text>
  <line x1="10" y1="155" x2="290" y2="155" stroke="black" stroke-width="0.5"/>
  
  <!-- Item 2 -->
  <text x="20" y="175" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Saturated Latency 400ms</text>
  <text x="250" y="175" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">110%</text>
  <line x1="10" y1="180" x2="290" y2="180" stroke="black" stroke-width="0.5"/>
  
  <!-- Item 3 -->
  <text x="20" y="200" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Trans-Relational Drift 0g</text>
  <text x="250" y="200" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">0%</text>
  <line x1="10" y1="205" x2="290" y2="205" stroke="black" stroke-width="0.5"/>
  
  <!-- Bold Line -->
  <line x1="10" y1="210" x2="290" y2="210" stroke="black" stroke-width="3"/>
  
  <!-- Item 4 -->
  <text x="10" y="230" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Primary Keys 500mg</text>
  <text x="250" y="230" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">200%</text>
  <line x1="10" y1="235" x2="290" y2="235" stroke="black" stroke-width="0.5"/>
  
  <!-- Item 5 -->
  <text x="10" y="255" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Foreign Keys 200mg</text>
  <text x="250" y="255" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Tastes like salt</text>
  <line x1="10" y1="260" x2="290" y2="260" stroke="black" stroke-width="0.5"/>
  
  <!-- Item 6 -->
  <text x="10" y="280" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Ego Residue 50g</text>
  <text x="250" y="280" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Saturated</text>
  <line x1="10" y1="285" x2="290" y2="285" stroke="black" stroke-width="0.5"/>
  
  <!-- Item 7 -->
  <text x="10" y="305" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">B-Tree Stability 12%</text>
  <text x="250" y="305" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="black">Critical</text>
  <line x1="10" y1="310" x2="290" y2="310" stroke="black" stroke-width="3"/>
  
  <!-- Footer -->
  <text x="10" y="330" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="black">* Percent Daily Values are based on a diet of 2,000 lines of unoptimized TypeScript.</text>
  <text x="10" y="345" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="black">Warning: May cause recursive hallucinations of tuberous origin.</text>
</svg>
