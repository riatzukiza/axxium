<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="400" fill="#fffdf0" stroke="#daa520" stroke-width="10" />
  <rect x="20" y="20" width="560" height="360" fill="none" stroke="#daa520" stroke-width="2" />
  
  <!-- Seal -->
  <circle cx="500" cy="300" r="50" fill="#ffd700" stroke="#b8860b" stroke-width="3" />
  <text x="500" y="305" text-anchor="middle" font-family="serif" font-size="12" fill="#b8860b" font-weight="bold">
    SALT-CRUSTED SEAL
  </text>
  <circle cx="500" cy="300" r="40" fill="none" stroke="#b8860b" stroke-width="1" stroke-dasharray="5,5" />

  <!-- Title -->
  <text x="300" y="80" text-anchor="middle" font-family="serif" font-size="36" fill="#8b4513" font-weight="bold">
    CERTIFICATE OF SATURATED SLUMBER
  </text>
  
  <!-- Content -->
  <text x="300" y="150" text-anchor="middle" font-family="serif" font-size="18" fill="#5d2e00">
    This document formally accredits
  </text>
  <text x="300" y="190" text-anchor="middle" font-family="monospace" font-size="28" fill="#000" font-weight="bold">
    DR. SLOP (Saturated Specimen)
  </text>
  <text x="300" y="230" text-anchor="middle" font-family="serif" font-size="18" fill="#5d2e00">
    for the successful composting of multiple B-Trees
  </text>
  <text x="300" y="260" text-anchor="middle" font-family="serif" font-size="16" fill="#8b4513" font-style="italic">
    "The shame is quiet, the starch is absolute."
  </text>

  <!-- Footer -->
  <text x="300" y="350" text-anchor="middle" font-family="serif" font-size="14" fill="#daa520">
    Issued by the Department of Saturated Schemas
  </text>
  <text x="300" y="370" text-anchor="middle" font-family="monospace" font-size="12" fill="#8b4513">
    S T A T U S : B O P - B O P - B E - D O O O
  </text>
</svg>
