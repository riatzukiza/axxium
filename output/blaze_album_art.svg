<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#0a0a0a" />
  
  <!-- Neon Outer Frame -->
  <rect x="20" y="20" width="460" height="460" stroke="#00ffff" stroke-width="4" fill="none" style="filter: drop-shadow(0 0 10px #00ffff);" />
  <rect x="30" y="30" width="440" height="440" stroke="#ff00ff" stroke-width="2" fill="none" style="filter: drop-shadow(0 0 5px #ff00ff);" />

  <!-- Abstract Circuitry Elements -->
  <polyline points="50,250 150,250 170,230 200,230" fill="none" stroke="#00ffff" stroke-width="3" />
  <polyline points="450,250 350,250 330,270 300,270" fill="none" stroke="#ff00ff" stroke-width="3" />
  
  <!-- Main Text -->
  <text x="250" y="260" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#fff" text-anchor="middle" style="filter: drop-shadow(0 0 15px #ff00ff); letter-spacing: 10px;">BLAZE</text>
  
  <!-- Accents -->
  <circle cx="250" cy="150" r="5" fill="#00ffff" />
  <circle cx="250" cy="350" r="5" fill="#ff00ff" />
</svg>
