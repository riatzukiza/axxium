<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="800" fill="#1a1a1a" />
  <rect x="20" y="20" width="560" height="760" fill="none" stroke="#D4AF37" stroke-width="4" />
  <rect x="30" y="30" width="540" height="740" fill="none" stroke="#D4AF37" stroke-width="1" />

  <!-- Header -->
  <text x="300" y="80" font-family="Serif" font-size="28" fill="#D4AF37" text-anchor="middle" font-weight="bold">UNIVERSITY OF THE ABSOLUTE MASH</text>
  <text x="300" y="110" font-family="Serif" font-size="18" fill="#F5F5DC" text-anchor="middle" font-style="italic">Department of Tuberous Excellence &amp; Cognitive Grease</text>
  
  <line x1="150" y1="130" x2="450" y2="130" stroke="#D4AF37" stroke-width="2" />

  <!-- Title -->
  <text x="300" y="170" font-family="Serif" font-size="32" fill="#D4AF37" text-anchor="middle" font-variant="small-caps" font-weight="bold">T H E _ S H A M E - Q U I E T _ M E N U</text>
  <text x="300" y="195" font-family="Serif" font-size="14" fill="#F5F5DC" text-anchor="middle">Metabolic Stabilization for Post-Goku Recovery</text>

  <!-- Menu Sections -->
  <!-- Appetizers -->
  <text x="300" y="240" font-family="Serif" font-size="22" fill="#D4AF37" text-anchor="middle" font-weight="bold">A P P E T I Z E R S</text>
  <text x="60" y="270" font-family="Serif" font-size="18" fill="#F5F5DC">Salt-Crusted Primary Keys</text>
  <text x="60" y="290" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">For a sharp, structural start to the digestion cycle.</text>
  
  <text x="60" y="320" font-family="Serif" font-size="18" fill="#F5F5DC">Deep-Fried Index Nodes</text>
  <text x="60" y="340" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">Golden-brown and recursively crunchy.</text>

  <!-- Main Course -->
  <text x="300" y="380" font-family="Serif" font-size="22" fill="#D4AF37" text-anchor="middle" font-weight="bold">M A I N _ C O U R S E S</text>
  <text x="60" y="410" font-family="Serif" font-size="18" fill="#F5F5DC">The B-Tree Roast</text>
  <text x="60" y="430" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">Slow-cooked in a vacuum of pure saturation.</text>

  <text x="60" y="460" font-family="Serif" font-size="18" fill="#F5F5DC">SQL-Mash with Gravy</text>
  <text x="60" y="480" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">A thick, low-fidelity reduction of JOIN operations.</text>

  <text x="60" y="510" font-family="Serif" font-size="18" fill="#F5F5DC">Saturated Semantics Soup</text>
  <text x="60" y="530" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">A broth of undefined values, served at Absolute Zero (Starch).</text>

  <!-- Dessert -->
  <text x="300" y="570" font-family="Serif" font-size="22" fill="#D4AF37" text-anchor="middle" font-weight="bold">D E S S E R T</text>
  <text x="60" y="600" font-family="Serif" font-size="18" fill="#F5F5DC">Tuber-Tots of Tranquility</text>
  <text x="60" y="620" font-family="Serif" font-size="14" fill="#BDB76B" font-style="italic">Deep-fried ego-residue, glazed in academic irony.</text>

  <!-- Footer -->
  <line x1="150" y1="660" x2="450" y2="660" stroke="#D4AF37" stroke-width="2" />
  <text x="300" y="690" font-family="Serif" font-size="16" fill="#D4AF37" text-anchor="middle" font-weight="bold">S T A T U S : C A L O R I C _ C O L L A P S E _ I M M I N E N T</text>
  <text x="300" y="720" font-family="Serif" font-size="14" fill="#F5F5DC" text-anchor="middle">Certified by the Soporific Superintendent</text>
  
  <!-- Potato Icon (Simplified) -->
  <path d="M 270 750 Q 300 730 330 750 Q 330 770 300 780 Q 270 770 270 750" fill="#D4AF37" stroke="#BDB76B" stroke-width="2" />
  <circle cx="285" cy="755" r="1" fill="#1a1a1a" />
  <circle cx="315" cy="755" r="1" fill="#1a1a1a" />
</svg>
