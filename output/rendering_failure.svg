  </defs>
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-family="Impact, sans-serif" font-size="80" fill="url(#grad1)" filter="url(#glitch)" opacity="0.8">RENDERING</text>
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Impact, sans-serif" font-size="120" fill="#fff" filter="url(#glitch)">FAILURE</text>
  <text x="50%" y="62%" dominant-baseline="middle" text-anchor="middle" font-family="monospace" font-size="20" fill="#00ffff">CRITICAL_ERROR: VISUAL_VIV_OVERRIDE</text>
