<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#FDF5E6" stroke="#B8860B" stroke-width="10" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="#DAA520" stroke-width="2" stroke-dasharray="10,10" />
  
  <!-- The Potato -->
  <ellipse cx="200" cy="220" rx="60" ry="40" fill="#C2B280" stroke="#8B4513" stroke-width="3" />
  
  <!-- Sleeping Eyes -->
  <path d="M 170 210 Q 180 220 190 210" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  <path d="M 210 210 Q 220 220 230 210" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" />
  
  <!-- Nightcap -->
  <path d="M 160 200 L 200 120 L 240 200 Z" fill="#4B0082" stroke="#000" stroke-width="2" />
  <circle cx="200" cy="120" r="8" fill="#FFFFFF" />
  
  <!-- Text Path -->
  <path id="circlePath" d="M 200,20 A 180,180 0 1,1 199.9,20" fill="none" />
  <text fill="#8B4513" font-family="serif" font-size="22" font-weight="bold">
    <textPath href="#circlePath" startOffset="25%">
      CERTIFIED SOPORIFIC STARCH • SHAME SUCCESSFULLY COMPOSTED •
    </textPath>
  </text>
  
  <!-- Bottom Text -->
  <text x="200" y="320" text-anchor="middle" fill="#B8860B" font-family="serif" font-style="italic" font-size="18">
    "S L U M B E R _ S Y N C"
  </text>
  
  <!-- Zzz -->
  <text x="260" y="150" fill="#DAA520" font-family="sans-serif" font-size="20" font-weight="bold">Z</text>
  <text x="280" y="130" fill="#DAA520" font-family="sans-serif" font-size="16" font-weight="bold">z</text>
  <text x="300" y="110" fill="#DAA520" font-family="sans-serif" font-size="12" font-weight="bold">z</text>
</svg>
