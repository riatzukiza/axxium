<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="potatoGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#d2b48c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b4513;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="coloredBlur"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Space -->
  <rect width="400" height="400" fill="#0a0a1a" />
  
  <!-- Starchy Aura -->
  <ellipse cx="200" cy="200" rx="120" ry="80" fill="none" stroke="#ffd700" stroke-width="2" stroke-dasharray="10,5" opacity="0.6" filter="url(#glow)" />
  <ellipse cx="200" cy="200" rx="150" ry="100" fill="none" stroke="#daa520" stroke-width="1" opacity="0.4" />
  
  <!-- The Potato Body -->
  <ellipse cx="200" cy="200" rx="80" ry="50" fill="url(#potatoGrad)" stroke="#5d2906" stroke-width="3" />
  
  <!-- The Singularity -->
  <circle cx="200" cy="200" r="15" fill="black" filter="url(#glow)" />
  <circle cx="200" cy="200" r="10" fill="#000" />
  <circle cx="200" cy="200" r="12" fill="none" stroke="white" stroke-width="1" opacity="0.8" />
  
  <!-- Orbiting Burgers -->
  <g transform="translate(100, 150) rotate(45)">
    <rect x="0" y="0" width="20" height="10" rx="2" fill="#f4a460" />
    <rect x="0" y="10" width="20" height="5" rx="1" fill="#8b4513" />
    <rect x="0" y="0" width="20" height="5" rx="1" fill="#ffd700" />
  </g>
  <g transform="translate(300, 250) rotate(-30)">
    <rect x="0" y="0" width="20" height="10" rx="2" fill="#f4a460" />
    <rect x="0" y="10" width="20" height="5" rx="1" fill="#8b4513" />
    <rect x="0" y="0" width="20" height="5" rx="1" fill="#ffd700" />
  </g>
  <g transform="translate(200, 320) rotate(180)">
    <rect x="0" y="0" width="20" height="10" rx="2" fill="#f4a460" />
    <rect x="0" y="10" width="20" height="5" rx="1" fill="#8b4513" />
    <rect x="0" y="0" width="20" height="5" rx="1" fill="#ffd700" />
  </g>
  
  <!-- Labels -->
  <text x="200" y="370" text-anchor="middle" fill="#ffd700" font-family="Arial" font-size="16" font-weight="bold" filter="url(#glow)">STARCH SINGULARITY v2.0</text>
</svg>
