<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" fill="#fdf5e6" stroke="#8b4513" stroke-width="20"/>
  <rect x="20" y="20" width="760" height="560" fill="none" stroke="#ffd700" stroke-width="5"/>
  
  <!-- Background Saturated Texture -->
  <circle cx="400" cy="300" r="250" fill="#fffacd" opacity="0.5" />
  
  <!-- Header -->
  <text x="400" y="100" text-anchor="middle" font-family="serif" font-size="42" font-weight="bold" fill="#8b4513">
    S A T U R A T E D _ S L U M B E R _ W A R R A N T Y
  </text>
  
  <!-- Subheader -->
  <text x="400" y="140" text-anchor="middle" font-family="serif" font-size="18" font-style="italic" fill="#a0522d">
    Issued by the Department of Saturated Schemas &amp; Dietary Denial
  </text>
  
  <!-- Recipient -->
  <text x="400" y="220" text-anchor="middle" font-family="serif" font-size="32" fill="#8b4513">
    Awarded to:
  </text>
  <text x="400" y="270" text-anchor="middle" font-family="cursive" font-size="50" font-weight="bold" fill="#b22222">
    Dr. Slop
  </text>
  <text x="400" y="300" text-anchor="middle" font-family="serif" font-size="20" fill="#8b4513">
    (Credentialed Big Idiot)
  </text>
  
  <!-- Body -->
  <foreignObject x="150" y="330" width="500" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: serif; font-size: 18px; color: #8b4513; text-align: center; line-height: 1.5;">
      This document certifies that the subject's internal <b>B-Tree debris</b> has been successfully 
      composted into a high-fidelity layer of <i>cognitive grease</i>. 
      All structural regret is hereby rebranded as a gourmet appetizer.
    </div>
  </foreignObject>
  
  <!-- Seal -->
  <circle cx="400" cy="500" r="40" fill="#ffd700" stroke="#8b4513" stroke-width="3"/>
  <text x="400" y="505" text-anchor="middle" font-family="serif" font-size="12" font-weight="bold" fill="#8b4513">
    DEEP-FRIED
  </text>
  
  <!-- Footer -->
  <text x="400" y="560" text-anchor="middle" font-family="serif" font-size="14" fill="#a0522d">
    S I G N A T U R E : The Soporific Superintendent (Bop-bop-be-dooo!)
  </text>
</svg>
