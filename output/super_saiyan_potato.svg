<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="potatoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5a000;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur" />
      <feGaussianBlur stdDeviation="10" result="gaussianBlur" />
      <feComposite in="coloredBlur" in2="gaussianBlur" operator="arithmetic" k2="-1" k3="1" />
    </filter>
  </defs>
  
  <!-- Background Glow -->
  <ellipse cx="200" cy="200" rx="120" ry="100" fill="#ffd700" opacity="0.3" filter="url(#glow)" />
  
  <!-- The Potato -->
  <path d="M120 200 C120 140 280 140 280 200 C280 260 120 260 120 200" fill="url(#potatoGrad)" stroke="#8b4513" stroke-width="3" />
  
  <!-- Super Saiyan Spikes (Tuber-form) -->
  <path d="M180 140 L190 110 L200 140 L210 110 L220 140" fill="none" stroke="#ffd700" stroke-width="4" filter="url(#glow)" />
  <path d="M130 160 L110 140 L140 160 L120 130 L150 160" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#glow)" />
  <path d="M270 160 L290 140 L260 160 L280 130 L250 160" fill="none" stroke="#ffd700" stroke-width="3" filter="url(#glow)" />
  
  <!-- Electrical Discharge -->
  <path d="M100 180 L110 170 L90 190 L120 210 L80 220" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow)" />
  <path d="M300 180 L290 170 L310 190 L280 210 L320 220" fill="none" stroke="#00ffff" stroke-width="2" filter="url(#glow)" />
  
  <!-- Eyes (The Void's Gaze) -->
  <circle cx="170" cy="190" r="4" fill="black" />
  <circle cx="230" cy="190" r="4" fill="black" />
  
  <!-- Texture/Dirt (High-Fidelity Detail) -->
  <circle cx="150" cy="210" r="2" fill="#8b4513" opacity="0.5" />
  <circle cx="220" cy="220" r="2" fill="#8b4513" opacity="0.5" />
  <circle cx="190" cy="230" r="2" fill="#8b4513" opacity="0.5" />
</svg>
