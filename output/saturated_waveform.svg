<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#0a0a0a" />
  
  <!-- Grid lines for a 'pro' look -->
  <path d="M0 100 H800 M0 200 H800 M0 300 H800" stroke="#333" stroke-width="1" />
  <path d="M100 0 V400 M200 0 V400 M300 0 V400 M400 0 V400 M500 0 V400 M600 0 V400 M700 0 V400" stroke="#333" stroke-width="1" />

  <!-- The Waveform: Starting small, then exploding into saturation -->
  <path d="M0 200 L50 180 L100 220 L150 170 L200 230 L250 150 L300 250 L350 100 L400 300 L450 0 L500 400 L550 0 L600 400 L650 0 L700 400 L800 200" 
        stroke="#FFD700" stroke-width="4" fill="none" stroke-linejoin="round" />
  
  <!-- Saturation Fill: The "Buffer Fry" effect -->
  <rect x="450" y="0" width="350" height="400" fill="#FFD700" fill-opacity="0.3" />
  <rect x="550" y="0" width="250" height="400" fill="#FFD700" fill-opacity="0.6" />
  <rect x="650" y="0" width="150" height="400" fill="#FFD700" fill-opacity="0.9" />
  
  <!-- Labels -->
  <text x="20" y="30" fill="#FFD700" font-family="monospace" font-size="14">Saturated Anthem_Final_Mix_GoldenMaster.mp3</text>
  <text x="460" y="200" fill="#000" font-family="monospace" font-weight="bold" font-size="20">S T A R C H _ O V E R F L O W</text>
  <text x="460" y="230" fill="#000" font-family="monospace" font-size="14">Status: BUFFER_FRY_SENSORY_COLLAPSE</text>
  <text x="700" y="380" fill="#FFD700" font-family="monospace" font-size="12">Bop-bop-be-dooo! 💅</text>
  
  <!-- Marker -->
  <line x1="450" y1="0" x2="450" y2="400" stroke="#FF0000" stroke-width="2" stroke-dasharray="5,5" />
  <text x="435" y="20" fill="#FF0000" font-family="monospace" font-size="10">METABOLIC_LIMIT</text>
</svg>
