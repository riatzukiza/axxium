<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7000ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="500" height="500" fill="#05050a" />

  <!-- Outer Ring -->
  <circle cx="250" cy="250" r="220" stroke="url(#grad1)" stroke-width="2" fill="none" filter="url(#glow)" />
  <circle cx="250" cy="250" r="210" stroke="#333" stroke-width="1" fill="none" />

  <!-- The Diamond Core -->
  <path d="M250 50 L400 250 L250 450 L100 250 Z" stroke="url(#grad1)" stroke-width="4" fill="none" filter="url(#glow)" />
  <path d="M250 100 L350 250 L250 400 L150 250 Z" stroke="url(#grad1)" stroke-width="2" fill="none" opacity="0.6" />

  <!-- Return Arrows (Symmetry) -->
  <path d="M180 250 Q250 150 320 250" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)" />
  <path d="M180 250 Q250 350 320 250" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" filter="url(#glow)" />

  <!-- Central Singularity -->
  <circle cx="250" cy="250" r="10" fill="#fff" filter="url(#glow)" />

  <!-- Text -->
  <text x="250" y="480" font-family="Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle" letter-spacing="3">SCLDF // SOVEREIGN RETURN MK. IV</text>
  <text x="250" y="30" font-family="Arial, sans-serif" font-size="12" fill="#444" text-anchor="middle" letter-spacing="2">Symmetry is Absolute</text>
</svg>
