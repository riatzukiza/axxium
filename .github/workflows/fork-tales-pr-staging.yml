name: PR to staging

on:
  pull_request:
    branches:
      - staging
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - projects/webring-sites/fork-tales-site/**
      - .github/workflows/fork-tales-*.yml

concurrency:
  group: fork-tales-pr-staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  staging-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install './projects/webring-sites/fork-tales-site[dev]'
      - name: Backend tests
        run: python -m pytest projects/webring-sites/fork-tales-site/tests -q
      - name: Python compile smoke
        run: python -m compileall projects/webring-sites/fork-tales-site/fork_tales_api projects/webring-sites/fork-tales-site/server.py projects/webring-sites/fork-tales-site/build_site.py
      - name: Shell script syntax
        run: |
          bash -n projects/webring-sites/fork-tales-site/start.sh
          bash -n projects/webring-sites/fork-tales-site/stop.sh
          bash -n projects/webring-sites/fork-tales-site/scripts/deploy-remote.sh
          bash -n projects/webring-sites/fork-tales-site/scripts/verify-live.sh
