name: eta-mu-main-pr-gate

on:
  pull_request:
    branches:
      - main
    paths:
      - 'orgs/open-hax/eta-mu/**'
      - '.github/workflows/eta-mu*.yml'
      - 'src/github/eta-mu-rollout.ts'

jobs:
  main-lint:
    name: main-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - run: git submodule update --init --depth 1 orgs/open-hax/eta-mu
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: bash -n orgs/open-hax/eta-mu/services/eta-mu/scripts/deploy-remote.sh
      - run: shellcheck orgs/open-hax/eta-mu/services/eta-mu/scripts/deploy-remote.sh

  main-tests:
    name: main-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - run: git submodule update --init --depth 1 orgs/open-hax/eta-mu
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - run: node --test orgs/open-hax/eta-mu/packages/eta-mu-docs/tests/*.test.cjs
      - run: node --test orgs/open-hax/eta-mu/packages/eta-mu-truth/tests/*.test.cjs

  main-build:
    name: main-build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - run: git submodule update --init --depth 1 orgs/open-hax/eta-mu
      - run: docker compose --project-name eta-mu-main-ci -f orgs/open-hax/eta-mu/services/eta-mu/compose.yaml config >/tmp/eta-mu-compose.txt
      - run: docker build -f orgs/open-hax/eta-mu/services/eta-mu-truth-workbench/Dockerfile orgs/open-hax/eta-mu

  staging-promotion-gate:
    name: staging-promotion-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.pull_request.head.ref == 'staging' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: git fetch origin staging --depth=1
      - run: git merge-base --is-ancestor "${PR_HEAD_SHA}" origin/staging
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      - uses: actions/github-script@v8
        with:
          script: |
            const requiredChecks = ["eta-mu-deploy-staging", "eta-mu-staging-live-verify"];
            const { owner, repo } = context.repo;
            const ref = context.payload.pull_request.head.sha;
            const terminalFailures = new Set(["failure", "cancelled", "timed_out", "action_required", "startup_failure"]);
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const attempts = 30;

            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              const checks = await github.rest.checks.listForRef({ owner, repo, ref, per_page: 100 });
              const relevant = checks.data.check_runs.filter((run) => requiredChecks.includes(run.name));
              const byName = new Map(relevant.map((run) => [run.name, run]));
              const missing = requiredChecks.filter((name) => !byName.has(name));
              const pending = requiredChecks.filter((name) => byName.has(name) && byName.get(name).conclusion !== 'success');
              const failed = pending.filter((name) => terminalFailures.has(byName.get(name).conclusion));

              if (missing.length === 0 && pending.length === 0) {
                core.info(`All staging checks succeeded for ${ref}: ${requiredChecks.join(', ')}`);
                return;
              }

              if (failed.length > 0) {
                const details = failed.map((name) => `${name}=${byName.get(name).conclusion}`).join(', ');
                core.setFailed(`Failed staging checks for ${ref}: ${details}`);
                return;
              }

              if (attempt < attempts) {
                core.info(`Waiting for staging checks (${attempt}/${attempts}); missing=${missing.join(', ') || 'none'} pending=${pending.join(', ') || 'none'}`);
                await sleep(20000);
              }
            }

            core.setFailed(`Timed out waiting for staging checks for ${ref}: ${requiredChecks.join(', ')}`);
