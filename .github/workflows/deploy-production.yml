name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to production
        env:
          DEPLOY_HOST: axxium.promethean.rest
          DEPLOY_USER: error
          DEPLOY_KEY: ${{ secrets.PROMETHEAN_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST '
            mkdir -p ~/services/axxium
          '
          
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude node_modules \
            --exclude .git \
            --exclude .shadow-cljs \
            --exclude dist-dev \
            ./ $DEPLOY_USER@$DEPLOY_HOST:~/services/axxium/
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST '
            cd ~/services/axxium && docker compose -f docker-compose.yml up -d --build
          '

      - name: Create release tag
        run: |
          git tag "release-$(date +%Y%m%d-%H%M%S)"
          git push origin --tags
