name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: axxium-staging
  cancel-in-progress: true

jobs:
  staging-preflight:
    name: staging-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Axxium quality gates
        run: |
          npm run typecheck
          npm test
          npm run build

  deploy-staging:
    name: deploy-staging
    needs: staging-preflight
    uses: open-hax/services/.github/workflows/deploy-promethean.yml@main
    with:
      environment: staging
      service: axxium
      source_repository: ${{ github.repository }}
      source_ref: ${{ github.sha }}
    secrets: inherit
