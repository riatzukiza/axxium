name: staging-pr

on:
  pull_request:
    branches:
      - staging

jobs:
  staging-typecheck:
    name: staging-typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-REDACTED_SECRET@v5
        with:
          REDACTED_SECRET-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  staging-unit-tests:
    name: staging-unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-REDACTED_SECRET@v5
        with:
          REDACTED_SECRET-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
