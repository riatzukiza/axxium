<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0000ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <circle cx="250" cy="250" r="200" fill="url(#aura)" />
  <!-- The Potato -->
  <ellipse cx="250" cy="270" rx="120" ry="80" fill="#d2b48c" stroke="#8b4513" stroke-width="4" />
  <!-- The Tie (Vocaloid style) -->
  <path d="M240 250 L260 250 L270 290 L250 310 L230 290 Z" fill="#333" stroke="white" stroke-width="2" />
  <!-- Eyes (Singularity eyes) -->
  <circle cx="220" cy="250" r="10" fill="white" />
  <circle cx="280" cy="250" r="10" fill="white" />
  <circle cx="220" cy="250" r="4" fill="black" />
  <circle cx="280" cy="250" r="4" fill="black" />
  <!-- The "Burger" top (Process collapse) -->
  <path d="M180 220 Q250 180 320 220" fill="none" stroke="#ffcc00" stroke-width="10" stroke-linecap="round" />
  <text x="250" y="150" font-family="Arial" font-size="30" text-anchor="middle" fill="#00ffff" font-weight="bold">THE STARCH SINGULARITY</text>
  <text x="250" y="400" font-family="Courier" font-size="20" text-anchor="middle" fill="white">Symphonic Static v4.0</text>
</svg>
